<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NexSearch</title>

<link rel="icon" type="image/png" href="https://microsoft-edge77.github.io/NexSearchAssets/favicon-copilot-blue.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
/* ===== GLOBAL ===== */
body{
  margin:0;
  background:#000;
  color:#d0e2ff;
  font-family:"Poppins",system-ui,sans-serif;
  overflow:hidden;
}

/* ===== CANVAS FX ===== */
#fxCanvas{
  position:fixed;
  inset:0;
  pointer-events:none;
  z-index:5;
}

/* ===== LOADER ===== */
#loader{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fadeOut 0.8s ease forwards;
  animation-delay:2.4s;
}
#loader.hidden{display:none;}

.loader-logo{
  font-size:3.4rem;
  font-weight:600;
  letter-spacing:0.18em;
  background:linear-gradient(90deg,#6fa3ff,#9cc4ff);
  -webkit-background-clip:text;
  color:transparent;
  opacity:0.9;
  text-shadow:0 0 25px rgba(59,130,246,0.35);
  animation:glowPulse 2s infinite ease-in-out;
}

@keyframes glowPulse{
  0%,100%{text-shadow:0 0 25px rgba(59,130,246,0.35);}
  50%{text-shadow:0 0 45px rgba(59,130,246,0.6);}
}

.dots{
  margin-top:18px;
  display:flex;
  gap:10px;
}
.dot{
  width:10px;
  height:10px;
  border-radius:50%;
  background:#6fa3ff;
  opacity:0.4;
  animation:pulse 1.2s infinite ease-in-out;
}
.dot:nth-child(2){animation-delay:0.2s;}
.dot:nth-child(3){animation-delay:0.4s;}

@keyframes pulse{
  0%,100%{opacity:0.3;transform:scale(0.8);}
  50%{opacity:1;transform:scale(1.2);}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* ===== PAGE ===== */
.page{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:space-between;
  padding:40px 0;
  opacity:0;
  transform:translateY(40px) scale(0.96);
  filter:brightness(0.6);
  transition:1s ease;
}
.page.visible{
  opacity:1;
  transform:translateY(0) scale(1);
  filter:brightness(1);
}

/* ===== BACKGROUND GLOW ===== */
.glow{
  position:fixed;
  width:600px;
  height:600px;
  background:radial-gradient(circle,rgba(59,130,246,0.35),transparent 70%);
  top:-150px;
  left:50%;
  transform:translateX(-50%);
  filter:blur(80px);
  z-index:-1;
  animation:slowGlow 6s infinite alternate ease-in-out;
}
@keyframes slowGlow{
  0%{opacity:0.4;transform:translateX(-50%) scale(1);}
  100%{opacity:0.8;transform:translateX(-50%) scale(1.2);}
}

/* ===== NAV ===== */
.top-right{
  position:absolute;
  top:25px;
  right:30px;
  display:flex;
  gap:12px;
}
.nav-btn{
  padding:8px 16px;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:#9cc4ff;
  font-size:0.9rem;
  text-decoration:none;
  transition:0.25s;
  backdrop-filter:blur(12px) saturate(180%);
}
.nav-btn:hover{
  background:rgba(255,255,255,0.12);
  border-color:rgba(255,255,255,0.2);
  color:#d0e2ff;
  box-shadow:0 0 18px rgba(59,130,246,0.25);
  transform:scale(1.05);
}

/* ===== LOGO ===== */
.logo{
  font-size:2.8rem;
  font-weight:500;
  letter-spacing:0.10em;
  background:linear-gradient(90deg,#6fa3ff,#9cc4ff);
  -webkit-background-clip:text;
  color:transparent;
  opacity:0.85;
  text-shadow:0 0 18px rgba(59,130,246,0.25);
  transition:0.3s;
  user-select:none;
  margin-top:40px;
}
.logo:hover{
  opacity:1;
  text-shadow:0 0 30px rgba(59,130,246,0.45);
  transform:scale(1.05);
}

/* ===== TAGLINE ===== */
.tagline{
  font-size:1.1rem;
  color:#9cc4ff;
  opacity:0.8;
  margin-bottom:10px;
  animation:fadeSlide 2s ease forwards;
}
@keyframes fadeSlide{
  0%{opacity:0;transform:translateY(20px);}
  100%{opacity:1;transform:translateY(0);}
}

/* ===== SEARCH BOX ===== */
.search-box{
  backdrop-filter:blur(22px) saturate(200%);
  background:rgba(255,255,255,0.05);
  border-radius:18px;
  padding:2px;
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 0 25px rgba(59,130,246,0.15);
  transition:0.25s;
  position:relative;
  overflow:hidden;
}
.search-box:hover{
  box-shadow:0 0 40px rgba(59,130,246,0.25);
  transform:scale(1.02);
}

.search-form input{
  width:480px;
  max-width:90vw;
  padding:1rem 1.4rem;
  border-radius:14px;
  border:none;
  background:transparent;
  color:#d0e2ff;
  font-size:1.05rem;
  outline:none;
}
.search-form input::placeholder{
  color:#9cc4ff;
  opacity:0.6;
}

/* ===== FOOTER ===== */
.footer{
  font-size:0.85rem;
  color:#4f6fbf;
  opacity:0.7;
}
</style>
</head>

<body>

<canvas id="fxCanvas"></canvas>

<!-- LOADER -->
<div id="loader">
  <div class="loader-logo">NexSearch</div>
  <div class="dots">
    <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  </div>
</div>

<div class="glow"></div>

<div class="page" id="page">

  <div class="top-right">
    <a class="nav-btn" href="about.html">À propos</a>
    <a class="nav-btn" href="https://outlook.live.com" target="_blank">Outlook</a>
  </div>

  <header>
    <div class="logo">NexSearch</div>
  </header>

  <main class="main">
    <p class="tagline">Votre moteur de recherche intelligent.</p>

    <div class="search-box" id="searchBox">
      <form class="search-form" action="results.html" method="GET">
        <input type="text" name="q" placeholder="Rechercher..." autocomplete="off" id="searchInput">
      </form>
    </div>
  </main>

  <footer class="footer">
    <span class="powered">Powered by Bing</span>
  </footer>

</div>

<script>
/* Loader → Page */
setTimeout(()=>{
  document.getElementById("loader").classList.add("hidden");
  document.getElementById("page").classList.add("visible");
  document.body.style.overflow="auto";
},3000);

/* ===== CANVAS FX ENGINE ===== */
const canvas=document.getElementById("fxCanvas");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

class Particle{
  constructor(x,y,type){
    this.x=x;
    this.y=y;

    const angle=Math.random()*Math.PI*2;
    const speed=4+Math.random()*4;

    this.vx=Math.cos(angle)*speed;
    this.vy=Math.sin(angle)*speed;

    this.alpha=1;

    this.size = type===0
      ? 2+Math.random()*2   // petites (A)
      : 4+Math.random()*3;  // moyennes (B)

    this.gravity = type===0 ? 0.05 : 0.12;
    this.friction = 0.98;

    this.turbulence = 0.4;
  }

  update(){
    // turbulence
    this.vx += (Math.random()-0.5)*this.turbulence;
    this.vy += (Math.random()-0.5)*this.turbulence;

    // vortex
    const dx=this.x-centerX;
    const dy=this.y-centerY;
    this.vx += -dy*0.002;
    this.vy += dx*0.002;

    // gravité
    this.vy += this.gravity;

    // friction
    this.vx *= this.friction;
    this.vy *= this.friction;

    this.x += this.vx;
    this.y += this.vy;

    this.alpha -= 0.01;
  }

  draw(){
    ctx.globalAlpha=this.alpha;
    ctx.fillStyle="#8fbaff";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
  }
}

let particles=[];
let centerX=0;
let centerY=0;

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  particles=particles.filter(p=>p.alpha>0);

  for(const p of particles){
    p.update();
    p.draw();
  }

  requestAnimationFrame(animate);
}
animate();

/* ===== ONDE METRO UI ===== */
function drawWave(x,y){
  const wave=document.createElement("div");
  wave.style.position="fixed";
  wave.style.left=x+"px";
  wave.style.top=y+"px";
  wave.style.width="20px";
  wave.style.height="20px";
  wave.style.border="2px solid rgba(111,163,255,0.6)";
  wave.style.borderRadius="50%";
  wave.style.pointerEvents="none";
  wave.style.transform="translate(-50%,-50%) scale(0.2)";
  wave.style.filter="blur(2px)";
  wave.style.opacity="1";
  wave.style.transition="1.4s ease-out";
  wave.style.zIndex="4";

  document.body.appendChild(wave);

  requestAnimationFrame(()=>{
    wave.style.transform="translate(-50%,-50%) scale(3)";
    wave.style.filter="blur(12px)";
    wave.style.opacity="0";
  });

  setTimeout(()=>wave.remove(),1400);
}

/* ===== TRIGGER ===== */
const searchInput=document.getElementById("searchInput");
const searchBox=document.getElementById("searchBox");

searchInput.addEventListener("focus",()=>{
  const rect=searchBox.getBoundingClientRect();
  centerX=rect.left+rect.width/2;
  centerY=rect.top+rect.height/2;

  drawWave(centerX,centerY);

  // 300 particules : 150 type A + 150 type B
  for(let i=0;i<300;i++){
    const type = Math.random()<0.5 ? 0 : 1;
    particles.push(new Particle(centerX,centerY,type));
  }
});
</script>

</body>
</html>
