<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexSearch</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://microsoft-edge77.github.io/NexSearchAssets/favicon-copilot-blue.png">

  <!-- Police -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* GLOBAL */
    body {
      margin: 0;
      background: #000;
      color: #d0e2ff;
      font-family: "Poppins", system-ui, sans-serif;
      overflow-x: hidden;
    }

    .glow {
      position: fixed;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(59,130,246,0.35), transparent 70%);
      top: -150px;
      left: 50%;
      transform: translateX(-50%);
      filter: blur(80px);
      z-index: -1;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 40px 0;
    }

    /* LOGO (doux, premium) */
    .logo {
      font-size: 2.8rem;
      font-weight: 500;
      letter-spacing: 0.10em;
      background: linear-gradient(90deg, #6fa3ff, #9cc4ff);
      -webkit-background-clip: text;
      color: transparent;
      opacity: 0.85;
      text-shadow: 0 0 18px rgba(59,130,246,0.25);
      transition: 0.3s;
      user-select: none;
    }

    .logo:hover {
      opacity: 1;
      text-shadow: 0 0 30px rgba(59,130,246,0.45);
    }

    /* TAGLINE */
    .tagline {
      font-size: 1.1rem;
      color: #9cc4ff;
      opacity: 0.8;
      margin-bottom: 10px;
    }

    /* SEARCH BOX (liquid glass) */
    .search-box {
      backdrop-filter: blur(22px) saturate(200%);
      background: rgba(255,255,255,0.05);
      border-radius: 18px;
      padding: 2px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 0 25px rgba(59,130,246,0.15);
      transition: 0.25s;
    }

    .search-box:hover {
      box-shadow: 0 0 40px rgba(59,130,246,0.25);
    }

    .search-form input {
      width: 480px;
      max-width: 90vw;
      padding: 1rem 1.4rem;
      border-radius: 14px;
      border: none;
      background: transparent;
      color: #d0e2ff;
      font-size: 1.05rem;
      outline: none;
    }

    .search-form input::placeholder {
      color: #9cc4ff;
      opacity: 0.6;
    }

    /* FOOTER */
    .footer {
      font-size: 0.85rem;
      color: #4f6fbf;
      opacity: 0.7;
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="page">

    <header>
      <div class="logo">NexSearch</div>
    </header>

    <main class="main">
      <p class="tagline">Votre moteur de recherche intelligent.</p>

      <div class="search-box">
        <form class="search-form" action="results.html" method="GET">
          <input type="text" name="q" placeholder="Rechercher..." autocomplete="off" />
        </form>
      </div>
    </main>

    <footer class="footer">
      <span class="powered">Powered by Bing</span>
    </footer>

  </div>

</body>
</html>
