<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexSearch</title>

  <!-- Police propre et moderne -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    /* --- GLOBAL --- */
    body {
      margin: 0;
      background: #000000;
      color: #3B82F6;
      font-family: "Poppins", system-ui, sans-serif;
    }

    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
    }

    /* --- HEADER --- */
    .logo {
      font-size: 3rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      margin-top: 60px;
      color: #3B82F6;
      user-select: none;
    }

    /* --- MAIN --- */
    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .tagline {
      font-size: 1.1rem;
      color: #60A5FA;
      opacity: 0.8;
      user-select: none;
    }

    .search-form input {
      width: 480px;
      max-width: 90vw;
      padding: 0.9rem 1.2rem;
      border-radius: 999px;
      border: 1px solid #1F2937;
      background: #020617;
      color: #3B82F6;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    .search-form input::placeholder {
      color: #60A5FA;
    }

    .search-form input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 2px #2563EB;
    }

    /* --- FOOTER --- */
    .footer {
      margin-bottom: 40px;
      font-size: 0.8rem;
      color: #1E40AF;
      user-select: none;
    }

    .powered {
      opacity: 0.6;
    }
  </style>
</head>

<body>
  <div class="page">

    <header class="header">
      <div class="logo">NexSearch</div>
    </header>

    <main class="main">
      <p class="tagline">Ultra intelligent. Minimaliste. Futuriste.</p>

      <form class="search-form" action="results.html" method="GET">
        <input 
          type="text" 
          name="q" 
          placeholder="Rechercher avec NexSearch..."
          autocomplete="off"
        />
      </form>
    </main>

    <footer class="footer">
      <span class="powered">Powered by Bing</span>
    </footer>

  </div>
</body>
</html>
