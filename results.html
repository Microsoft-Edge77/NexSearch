<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche IA NexSearch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon Copilot+ -->
  <link rel="icon" type="image/png" href="https://microsoft-edge77.github.io/NexSearchAssets/favicon-copilot-blue.png">

  <style>
    :root{
      --bg:#05060a;
      --card:#0f1220;
      --card-soft:#141728;
      --accent:#4b7dff;
      --accent-soft:#7fd0ff;
      --text:#e5f0ff;
      --sub:#9fb7ff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Segoe UI,system-ui,-apple-system,sans-serif;
      overflow:hidden; /* pas de scrollbar globale */
    }
    header{
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:600;
      color:var(--text);
    }
    .layout{
      display:flex;
      height:calc(100vh - 52px - 56px); /* header + bottom bar */
      width:100%;
      overflow:hidden;
    }
    main{
      flex:1;
      padding:10px 12px;
      max-width:1100px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow-y:auto;
      scrollbar-width:none;
    }
    main::-webkit-scrollbar{display:none}

    .card{
      background:var(--card);
      border-radius:16px;
      padding:14px 16px;
      backdrop-filter:blur(18px);
      box-shadow:0 18px 40px rgba(0,0,0,0.55);
      transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
    }
    .card:hover{
      transform:translateY(-1px);
      box-shadow:0 22px 50px rgba(0,0,0,0.7);
      background:var(--card-soft);
    }
    .card-title{
      font-size:16px;
      font-weight:600;
      margin-bottom:4px;
    }
    .card-sub{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
    }

    #aiSummary{
      font-size:14px;
      line-height:1.6;
    }

    #resultsList{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:4px;
    }
    .result-item{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:9px 11px;
      border-radius:12px;
      background:#0a0c14;
      cursor:pointer;
      transition:transform .15s ease,box-shadow .15s ease,background .15s ease;
    }
    .result-item:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 26px rgba(0,0,0,0.6);
      background:#111425;
    }
    .result-logo{
      width:26px;
      height:26px;
      border-radius:50%;
      background:#111;
      flex-shrink:0;
    }
    .result-main{flex:1}
    .result-title{
      font-size:14px;
      font-weight:600;
      color:var(--accent-soft);
    }
    .result-url{
      font-size:11px;
      color:#7fa4ff;
      margin-top:1px;
      word-break:break-all;
    }
    .result-desc{
      font-size:12px;
      color:#c7d6ff;
      margin-top:3px;
    }

    #tabs{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-top:6px;
    }
    #tabs a{
      font-size:13px;
      color:var(--sub);
      text-decoration:none;
      transition:color .15s ease,transform .15s ease;
    }
    #tabs a:hover{
      color:var(--accent-soft);
      transform:translateY(-1px);
    }

      max-width:80vw;

      border-left:1px solid rgba(75,125,255,0.4);
      box-shadow:-12px 0 30px rgba(0,0,0,0.7);
      display:flex;
      flex-direction:column;
      transform:translateX(100%);
      opacity:0;
      pointer-events:none;
      transition:transform .22s ease,opacity .22s ease;
    }
    #nexaiPanel.open{
      transform:translateX(0);
      opacity:1;
      pointer-events:auto;
    }
    #nexaiHeader{

      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid rgba(75,125,255,0.4);
    }
    #nexaiTitle{

      font-weight:600;
    }
    #nexaiClose{
      border:none;
      background:transparent;
      color:var(--sub);
      font-size:16px;
      cursor:pointer;
      padding:4px 6px;
      border-radius:999px;

    }
    #nexaiClose:hover{

      color:var(--accent-soft);
      transform:translateY(-1px);
    }

      display:flex;

    #chatMessages{

    .chat-ai{

    }

      cursor:default;
      box-shadow:none;
      transform:none;

      left:0;
      width:100%;

<script>
/* ========= CONFIG APIFREELLM =========

*/
const APIFREELLM_KEY = "apf_s5ve09soqiz19d5qsf26spvk"; // entre guillemets
const APIFREELLM_URL = "https://api.apifreellm.com/v1/chat/completions"; // adapte si besoin

/* ========= PARAMS RECHERCHE ========= */

const query = (params.get("q") || "").trim();

const addressBar = document.getElementById("addressBar");
addressBar.value = query;

/* ========= UTILITAIRES ========= */
function blocked(text){
  return ["porn","porno","viol","gore","snuff","décapitation"].some(w=>text.toLowerCase().includes(w));
}

function detectCategory(q){
  q = q.toLowerCase();
  const cats = {
    microsoft:["microsoft","windows","office","word","excel","powerpoint","outlook","onedrive","teams","onenote"],
    education:["scratch","ent","pronote","ecoledirecte","moodle","cours","devoir","parcoursup","geogebra","khan","pix","lumni","openclassrooms"],
    social:["youtube","tiktok","instagram","facebook","snapchat","twitter","x ","discord","reddit","twitch","pinterest"],
    shopping:["amazon","fnac","cdiscount","darty","rueducommerce","acheter","prix","promo","deal"],
    gaming:["xbox","playstation","ps5","nintendo","switch","roblox","minecraft","jeu","gaming","steam","epic"],
    ai:["copilot","chatgpt","claude","gemini","ia","intelligence artificielle","openai","anthropic","perplexity"],
    providers:["orange","free","bouygues","sfr","red","sosh"],
    video:["netflix","prime video","disney","crunchyroll","film","série","serie","streaming"]
  };
  for(const k in cats) if(cats[k].some(w=>q.includes(w))) return k;
  return "general";
}

    ];

    sites = [

      {name:"ÉcoleDirecte",url:"https://www.ecoledirecte.com"},

      {name:"GeoGebra",url:"https://www.geogebra.org"},

    ];
  }else if(cat==="social"){
    sites = [
      {name:"YouTube",url:"https://www.youtube.com"},
      {name:"TikTok",url:"https://www.tiktok.com"},
      {name:"Instagram",url:"https://www.instagram.com"},
      {name:"Facebook",url:"https://www.facebook.com"},
      {name:"X (Twitter)",url:"https://twitter.com"},
      {name:"Snapchat",url:"https://www.snapchat.com"},
      {name:"Discord",url:"https://discord.com"},
      {name:"Reddit",url:"https://www.reddit.com"},
      {name:"Twitch",url:"https://www.twitch.tv"},
      {name:"Pinterest",url:"https://www.pinterest.fr"}
    ];
  }else if(cat==="shopping"){
    sites = [
      {name:"Amazon",url:"https://www.amazon.fr"},
      {name:"Fnac",url:"https://www.fnac.com"},
      {name:"Cdiscount",url:"https://www.cdiscount.com"},
      {name:"Darty",url:"https://www.darty.com"},

    ];
  }else if(cat==="gaming"){
    sites = [
      {name:"Xbox",url:"https://www.xbox.com"},
      {name:"PlayStation",url:"https://www.playstation.com"},
      {name:"Nintendo",url:"https://www.nintendo.com"},
      {name:"Steam",url:"https://store.steampowered.com"},

  }else if(cat==="ai"){

function faviconUrl(url){
  try{
    const u = new URL(url);
    return "https://www.google.com/s2/favicons?sz=64&domain="+u.hostname;
  }catch{
    return "";
  }
}

/* ========= RENDU RESULTATS ========= */
const resultsList = document.getElementById("resultsList");

function renderResults(sites){
  resultsList.innerHTML = "";
  sites.forEach(site=>{
    const div = document.createElement("div");
    div.className = "result-item";
    div.onclick = ()=>window.open(site.url,"_blank");
    div.innerHTML = `
      <img class="result-logo" src="${faviconUrl(site.url)}" alt="">
      <div class="result-main">
        <div class="result-title">${site.name}</div>
        <div class="result-url">${site.url}</div>
        <div class="result-desc">${site.desc || "Site lié à ta recherche."}</div>
      </div>
    `;
    resultsList.appendChild(div);
  });
}

/* ========= APPEL APIFREELLM ========= */
async function callApiFreeLLM(systemPrompt,userPrompt){
  const body = {
    model: APIFREELLM_MODEL,
    messages: [
      {role:"system",content:systemPrompt},
      {role:"user",content:userPrompt}
    ]
  };
  const res = await fetch(APIFREELLM_URL,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      "Authorization":"Bearer "+APIFREELLM_KEY
    },
    body:JSON.stringify(body)
  });
  if(!res.ok) throw new Error("HTTP "+res.status);
  const data = await res.json();
  const text = data.choices?.[0]?.message?.content || "";
  return text;
}

/* ========= RESUME NEXAI ========= */
const aiSummary = document.getElementById("aiSummary");

async function loadSummary(){
  if(!query){
    aiSummary.innerHTML = "<p>Entre une recherche pour que NexAI puisse te répondre.</p>";
    return;
  }
  if(blocked(query)){
    aiSummary.innerHTML = "<p>Contenu non autorisé pour NexAI.</p>";
    return;
  }
  aiSummary.innerHTML = "<p>Analyse NexAI en cours…</p>";
  try{
    const sys = `Tu es NexAI, IA premium NexSearch/Copilot+. 
Réponds toujours en français, en HTML simple (<p>, <b>, <ul>, <li>).
Tu dois :
1) saluer l’utilisateur (style moderne, amical).
2) expliquer brièvement ce qu’est la requête de recherche.
3) si la requête ressemble à un calcul (ex : "1+1", "3*5"), donne le résultat du calcul.
4) annoncer que des sites liés sont listés en dessous.
Ne produis pas de contenu violent ou pornographique.`;
    const user = `Requête de recherche : "${query}"`;
    const text = await callApiFreeLLM(sys,user);
    aiSummary.innerHTML = text || "<p>Salut ! Voici un résumé intelligent de ta recherche.</p>";
  }catch(e){
    aiSummary.innerHTML = "<p>Erreur IA, NexAI a eu un souci temporaire.</p>";
  }
}

/* ========= TRI + DESCRIPTION DES SITES PAR IA ========= */
async function loadSites(){
  const base = baseSites(query);
  if(!query || base.length===0){
    renderResults(base);
    return;
  }
  if(blocked(query)){
    renderResults(base);
    return;
  }
  // rendu provisoire
  renderResults(base.map(s=>({...s,desc:"Analyse IA en cours…"})));
  try{
    const sys = `Tu es NexAI, IA de tri de résultats pour NexSearch.
On te donne une requête utilisateur et une liste de sites (nom + URL).
Tu dois :
- trier les sites par pertinence pour la requête (site principal en premier),
- générer pour chaque site une description courte en français (1 phrase),
- renvoyer UNIQUEMENT du JSON valide de la forme :
[
  {"name":"Nom du site","url":"URL","desc":"Description courte"},
  ...
]
Aucun texte autour, aucun commentaire, seulement le JSON.`;
    const user = `Requête : "${query}"
Sites :
${base.map(s=>`- ${s.name} | ${s.url}`).join("\n")}`;
    const raw = await callApiFreeLLM(sys,user);
    let parsed;
    try{
      parsed = JSON.parse(raw);
    }catch{
      parsed = base.map(s=>({...s,desc:"Site lié à ta recherche."}));
    }
    // fallback si JSON incorrect
    if(!Array.isArray(parsed) || !parsed.length){
      parsed = base.map(s=>({...s,desc:"Site lié à ta recherche."}));
    }
    renderResults(parsed);
  }catch(e){
    renderResults(base.map(s=>({...s,desc:"Site lié à ta recherche."})));
  }
}

/* ========= CHAT NEXAI ========= */
const nexaiPanel = document.getElementById("nexaiPanel");

function addChatMessage(text,from){
  const div = document.createElement("div");
  div.className = "chat-msg";

  bubble.className = from==="user" ? "chat-user" : "chat-ai";

async function sendChat(){
  const msg = chatInput.value.trim();
  if(!msg) return;
  if(blocked(msg)){
    addChatMessage("<p>Contenu non autorisé.</p>","ai");
    chatInput.value = "";
    return;
  }
  addChatMessage(msg,"user");
  chatInput.value = "";
  chatSend.disabled = true;
  try{
    const sys = `Tu es NexAI, IA premium NexSearch/Copilot+.
Tu es en mode chat conversationnel.
Contexte de la recherche actuelle : "${query}".
Réponds toujours en français, en HTML simple (<p>, <b>, <ul>, <li>).
Style : amical, moderne, parfois complice, mais clair.
Tu peux répondre à des questions générales (ex : "ça va ?" -> "Oui et toi ?")
ou donner des explications sur la recherche en cours.
Ne produis pas de contenu violent ou pornographique.`;
    const user = msg;
    const text = await callApiFreeLLM(sys,user);
    addChatMessage(text || "<p>Je suis NexAI, et je suis là pour discuter avec toi 🙂</p>","ai");
  }catch(e){
    addChatMessage("<p>Erreur IA, NexAI a eu un petit souci technique.</p>","ai");
  }
  chatSend.disabled = false;
}

chatSend.addEventListener("click",sendChat);
chatInput.addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});

/* ========= INIT ========= */
loadSummary();
loadSites();
</script>
</body>
</html>
