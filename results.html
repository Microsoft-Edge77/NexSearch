function block(t){return["porn","porno","viol","gore","snuff","décapitation"].some(w=>t.toLowerCase().includes(w))}
function calc(t){t=t.toLowerCase().replace("calcule","").replace("calcul","").replace("=","").trim();if(/^[0-9+\-*/().\s]+$/.test(t)){try{let r=Function("return "+t)();if(typeof r==="number"&&isFinite(r))return"<p><b>Résultat du calcul :</b> "+r+"</p>";}catch{}}
return null}
function trad(t){
const d={manger:{en:"eat",es:"comer",de:"essen"},livre:{en:"book",es:"libro",de:"buch"},chat:{en:"cat",es:"gato",de:"katze"},chien:{en:"dog",es:"perro",de:"hund"},maison:{en:"house",es:"casa",de:"haus"},ordinateur:{en:"computer",es:"ordenador",de:"computer"},voiture:{en:"car",es:"coche",de:"auto"}};
t=t.toLowerCase();
if(t.includes("traduire")||t.includes("comment dit-on")){
for(const w in d){
if(t.includes(w)){
if(t.includes("anglais"))return`<p><b>Traduction en anglais de "${w}" :</b> ${d[w].en}</p>`;
if(t.includes("espagnol"))return`<p><b>Traduction en espagnol de "${w}" :</b> ${d[w].es}</p>`;
if(t.includes("allemand"))return`<p><b>Traduction en allemand de "${w}" :</b> ${d[w].de}</p>`;
if(t.includes("français"))return`<p><b>Traduction en français :</b> ${w}</p>`;
}}
return"<p>Mot inconnu pour NexAI.</p>";
}
return null}

general:"<p><b>Contexte détecté :</b> requête générale, analyse polyvalente.</p>"
}[c]}

function localGen(){
if(!q)return"<p>Entre une recherche pour que NexAI puisse répondre.</p>";
if(block(q))return"<p>Contenu non autorisé.</p>";
let r=calc(q);if(r)return r;
let t=trad(q);if(t)return t;
let c=detectCategory(q);
return"<p><b>"+intro[Math.random()*intro.length|0]+q+"</b></p>"+catSum(c)+"<p>"+extra[Math.random()*extra.length|0]+"</p>";
}

async function callGemini(){
if(!q){aiSummary.innerHTML="<b>Réponse de NEXAI :</b><br>"+localGen()+"<br><br><button class='nexai-btn' onclick='refresh()'>Réessayer</button>";return;}
if(block(q)){aiSummary.innerHTML="<b>Réponse de NEXAI :</b><br><p>Contenu non autorisé.</p><br><button class='nexai-btn' onclick='refresh()'>Réessayer</button>";return;}
aiSummary.innerHTML="<b>Réponse de NEXAI :</b><br><p>Analyse en cours avec Gemini 1.5 Flash…</p>";
try{
const prompt=`Tu es NexAI, IA premium NexSearch/Copilot+. Réponds en HTML enrichi (<p>, <ul>, <li>, <b>) en français, avec un ton clair, moderne, légèrement technique. Donne un résumé, des explications, des suggestions de sites ou d’actions, en te basant sur la requête suivante : "${q}". Ne produis pas de contenu violent, pornographique ou choquant.`;
const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+GEMINI_KEY,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
});
const data=await res.json();
let text=data?.candidates?.[0]?.content?.parts?.[0]?.text||null;
if(!text)text=localGen();
aiSummary.innerHTML="<b>Réponse de NEXAI :</b><br>"+text+"<br><br><button class='nexai-btn' onclick='refresh()'>Réessayer</button>";
}catch(e){
aiSummary.innerHTML="<b>Réponse de NEXAI :</b><br>"+localGen()+"<br><br><button class='nexai-btn' onclick='refresh()'>Réessayer</button>";
}
}
