<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Résultats-Recherche NexSearch</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #3B82F6;
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
    }

    /* Top search bar */
    .topbar {
      width: 100%;
      padding: 20px;
      background: #020617;
      border-bottom: 1px solid #1E3A8A;
      display: flex;
      justify-content: center;
      position: relative;
      box-sizing: border-box;
    }

    .search-box {
      width: 600px;
      max-width: 90%;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 1px solid #1F2937;
      background: #000;
      color: #3B82F6;
      font-size: 1rem;
      outline: none;
    }

    .search-box input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 2px #2563EB;
    }

    /* NexAI toggle button */
    .nexai-toggle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: #111827;
      border: 1px solid #1E3A8A;
      color: #3B82F6;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .nexai-toggle:hover {
      border-color: #2563EB;
    }

    /* Main results container */
    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      margin-top: 25px;
      padding-bottom: 40px;
      box-sizing: border-box;
    }

    .section-title {
      font-size: 1.4rem;
      margin-top: 30px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #3B82F6;
    }

    .result {
      background: #020617;
      border: 1px solid #1E3A8A;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 18px;
      transition: 0.2s;
    }

    .result:hover {
      border-color: #2563EB;
      transform: translateX(4px);
    }

    .title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #60A5FA;
      margin-bottom: 6px;
    }

    .url {
      font-size: 0.9rem;
      opacity: 0.85;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .url a {
      color: #60A5FA;
      text-decoration: none;
    }

    .url a:hover {
      text-decoration: underline;
      color: #93C5FD;
    }

    .snippet {
      font-size: 1rem;
      color: #93C5FD;
      white-space: pre-line;
    }

    /* NexAI sidebar */
    .nexai-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 340px;
      max-width: 100%;
      height: 100vh;
      background: #020617;
      border-left: 1px solid #1E3A8A;
      transform: translateX(100%);
      transition: transform 0.25s ease-out;
      display: flex;
      flex-direction: column;
      z-index: 999;
      box-sizing: border-box;
    }

    .nexai-panel.open {
      transform: translateX(0);
    }

    .nexai-header {
      padding: 16px;
      border-bottom: 1px solid #1E3A8A;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #3B82F6;
      font-weight: 600;
      box-sizing: border-box;
    }

    .nexai-close {
      cursor: pointer;
      font-size: 1.2rem;
      color: #60A5FA;
    }

    .nexai-status {
      font-size: 0.75rem;
      opacity: 0.7;
      padding: 0 12px 6px;
      color: #60A5FA;
      box-sizing: border-box;
    }

    .nexai-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-sizing: border-box;
    }

    .msg {
      max-width: 90%;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      box-sizing: border-box;
    }

    .msg-user {
      align-self: flex-end;
      background: #111827;
      color: #93C5FD;
    }

    .msg-ai {
      align-self: flex-start;
      background: #020617;
      border: 1px solid #1E3A8A;
      color: #BFDBFE;
    }

    .nexai-input-area {
      padding: 10px;
      border-top: 1px solid #1E3A8A;
      display: flex;
      gap: 8px;
      box-sizing: border-box;
    }

    .nexai-input-area input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 999px;
      border: 1px solid #1F2937;
      background: #000;
      color: #3B82F6;
      font-size: 0.9rem;
      outline: none;
    }

    .nexai-input-area input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 1px #2563EB;
    }

    .nexai-send {
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      border: 1px solid #1E3A8A;
      background: #111827;
      color: #3B82F6;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .nexai-send:hover {
      border-color: #2563EB;
    }

    @media (max-width: 768px) {
      .nexai-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <!-- BARRE DE RECHERCHE -->
  <div class="topbar">
    <form class="search-box" action="results.html" method="GET">
      <input type="text" name="q" id="searchInput" placeholder="Rechercher..." autocomplete="off" />
    </form>
    <button class="nexai-toggle" id="nexaiToggle">💬 NexAI</button>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">
    <div id="results"></div>
  </div>

  <!-- PANEL NEXAI -->
  <div class="nexai-panel" id="nexaiPanel">
    <div class="nexai-header">
      <span>NexAI (IA locale)</span>
      <span class="nexai-close" id="nexaiClose">×</span>
    </div>
    <div class="nexai-status" id="nexaiStatus">
      IA locale avancée (sans API) – comprend le contexte et propose des idées.
    </div>
    <div class="nexai-messages" id="nexaiMessages"></div>
    <div class="nexai-input-area">
      <input type="text" id="nexaiInput" placeholder="Écris un message..." autocomplete="off" />
      <button class="nexai-send" id="nexaiSend">Envoyer</button>
    </div>
  </div>

  <script>
    /* -----------------------------
       1. Récupération de la requête
    ------------------------------ */
    const params = new URLSearchParams(window.location.search);
    const query = (params.get("q") || "").trim();
    document.getElementById("searchInput").value = query;

    const resultsContainer = document.getElementById("results");

    /* -----------------------------
       2. Redirections directes
    ------------------------------ */
    const siteShortcuts = {
      "amazon": "https://www.amazon.fr",
      "shopify": "https://www.shopify.com",
      "youtube": "https://www.youtube.com",
      "yt": "https://www.youtube.com",
      "wikipedia": "https://fr.wikipedia.org",
      "wiki": "https://fr.wikipedia.org",
      "bing": "https://www.bing.com",
      "google": "https://www.google.com",
      "reddit": "https://www.reddit.com",
      "twitter": "https://x.com",
      "x": "https://x.com",
      "instagram": "https://instagram.com",
      "github": "https://github.com",
      "marmiton": "https://www.marmiton.org",
      "750g": "https://www.750g.com"
    };

    if (siteShortcuts[query.toLowerCase()]) {
      window.location.href = siteShortcuts[query.toLowerCase()];
    }

    /* -----------------------------
       3. Module calculatrice
    ------------------------------ */
    function isMathExpression(str) {
      return /^[0-9+\-*/().\s]+$/.test(str) && /[0-9]/.test(str);
    }

    function calculateExpression(str) {
      try {
        return Function("return " + str)();
      } catch {
        return null;
      }
    }

    /* -----------------------------
       4. Détection de site / marque
    ------------------------------ */
    function looksLikeSite(str) {
      const s = str.trim().toLowerCase();
      if (!s) return null;

      if (siteShortcuts[s]) {
        return siteShortcuts[s];
      }

      if (s.endsWith(".com") || s.endsWith(".fr") || s.endsWith(".net") || s.endsWith(".org")) {
        return "https://" + s;
      }

      if (/^[a-z0-9\-]+$/i.test(s)) {
        // tentative : marque ou site simple
        return "https://www." + s + ".com";
      }

      return null;
    }

    /* -----------------------------
       5. Résultats intelligents
    ------------------------------ */
    function buildSmartResults(q) {
      const list = [];

      // Si ça ressemble à un site, on le met en avant
      const siteGuess = looksLikeSite(q);
      if (siteGuess) {
        list.push({
          name: "Accès direct au site",
          url: siteGuess,
          snippet: "Lien direct vers ce site ou cette marque."
        });
      }

      // Bing
      list.push({
        name: "Bing – Résultats pour « " + q + " »",
        url: "https://www.bing.com/search?q=" + encodeURIComponent(q),
        snippet: "Résultats complets (sites, vidéos, actualités, forums) pour ta recherche."
      });

      // YouTube
      list.push({
        name: "YouTube – Vidéos sur « " + q + " »",
        url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(q),
        snippet: "Tutoriels, explications et contenus vidéo liés à ta requête."
      });

      // Wikipédia
      list.push({
        name: "Wikipédia – Article potentiel",
        url: "https://fr.wikipedia.org/wiki/" + encodeURIComponent(q),
        snippet: "Si un article existe, tu auras une vue d’ensemble structurée."
      });

      // Cas cuisine / gâteau
      const lower = q.toLowerCase();
      if (
        lower.includes("gateau") ||
        lower.includes("gâteau") ||
        lower.includes("cake") ||
        lower.includes("recette") ||
        lower.includes("cuisine")
      ) {
        list.push({
          name: "Marmiton – Recettes de gâteaux",
          url: "https://www.marmiton.org/recettes/recherche.aspx?aqt=" + encodeURIComponent(q),
          snippet: "Des dizaines de recettes de gâteaux notées et commentées."
        });
        list.push({
          name: "750g – Idées de gâteaux",
          url: "https://www.750g.com/recherche?q=" + encodeURIComponent(q),
          snippet: "Autres variantes de gâteaux, astuces de cuisson et idées originales."
        });
      }

      return list;
    }

    function renderMain() {
      if (!query) {
        resultsContainer.innerHTML = `
          <div class="section-title">Aucune requête</div>
          <div class="result">
            <div class="snippet">Tape quelque chose dans la barre de recherche pour lancer NexSearch.</div>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = "";

      // Calcul
      if (isMathExpression(query)) {
        const calc = calculateExpression(query);
        if (calc !== null && calc !== undefined && !Number.isNaN(calc)) {
          resultsContainer.innerHTML += `
            <div class="section-title">Calcul</div>
            <div class="result">
              <div class="title">${query} = ${calc}</div>
              <div class="snippet">Résultat calculé directement par NexSearch.</div>
            </div>
          `;
        }
      }

      // Résultats intelligents
      const smartResults = buildSmartResults(query);
      resultsContainer.innerHTML += `<div class="section-title">Résultats intelligents</div>`;
      smartResults.forEach(r => {
        resultsContainer.innerHTML += `
          <div class="result">
            <div class="title">${r.name}</div>
            <div class="url"><a href="${r.url}" target="_blank">${r.url}</a></div>
            <div class="snippet">${r.snippet}</div>
          </div>
        `;
      });
    }

    renderMain();

    /* -----------------------------
       6. NexAI – IA locale avancée
    ------------------------------ */

    const nexaiPanel = document.getElementById("nexaiPanel");
    const nexaiToggle = document.getElementById("nexaiToggle");
    const nexaiClose = document.getElementById("nexaiClose");
    const nexaiMessages = document.getElementById("nexaiMessages");
    const nexaiInput = document.getElementById("nexaiInput");
    const nexaiSend = document.getElementById("nexaiSend");
    const nexaiStatus = document.getElementById("nexaiStatus");

    let chatHistory = [];

    nexaiToggle.addEventListener("click", () => {
      nexaiPanel.classList.add("open");
      nexaiInput.focus();
      if (chatHistory.length === 0) {
        addAIMessage("Salut ! Je suis NexAI, une IA locale. Tu peux me demander une recette, un conseil, un calcul, ou une explication.");
      }
    });

    nexaiClose.addEventListener("click", () => {
      nexaiPanel.classList.remove("open");
    });

    nexaiSend.addEventListener("click", sendUserMessage);
    nexaiInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendUserMessage();
      }
    });

    function addUserMessage(text) {
      const div = document.createElement("div");
      div.className = "msg msg-user";
      div.textContent = text;
      nexaiMessages.appendChild(div);
      nexaiMessages.scrollTop = nexaiMessages.scrollHeight;
    }

    function addAIMessage(text) {
      const div = document.createElement("div");
      div.className = "msg msg-ai";
      div.textContent = text;
      nexaiMessages.appendChild(div);
      nexaiMessages.scrollTop = nexaiMessages.scrollHeight;
    }

    function sendUserMessage() {
      const text = nexaiInput.value.trim();
      if (!text) return;
      nexaiInput.value = "";
      addUserMessage(text);
      chatHistory.push({ role: "user", content: text });

      const reply = localAIReply(chatHistory);
      addAIMessage(reply);
      chatHistory.push({ role: "assistant", content: reply });
    }

    // IA locale : moteur d’intentions + contexte
    function localAIReply(history) {
      const lastMsg = history[history.length - 1].content;
      const last = lastMsg.toLowerCase();

      const context = {
        hasTalkedFood: history.some(m => m.role === "user" && /\b(manger|faim|recette|cuisine|gateau|gâteau|cake)\b/i.test(m.content)),
        hasTalkedCode: history.some(m => m.role === "user" && /\b(javascript|python|code|programmation|développeur|developer)\b/i.test(m.content)),
        hasAskedHow: history.some(m => m.role === "user" && /^comment\b/i.test(m.content.toLowerCase()))
      };

      // salutation
      if (/\b(bonjour|salut|yo|hey|coucou)\b/.test(last)) {
        if (context.hasTalkedFood) {
          return "Salut ! On parlait déjà de nourriture, tu veux une autre idée de recette ou quelque chose de différent ?";
        }
        if (context.hasTalkedCode) {
          return "Salut ! On discutait de code tout à l’heure. Tu veux continuer sur la programmation ou changer de sujet ?";
        }
        return "Salut ! Je suis NexAI. Tu peux me demander une recette, un site utile, un calcul ou une explication sur un sujet.";
      }

      // comment ça va
      if (last.includes("comment ça va") || last.includes("comment ca va")) {
        return "Je fonctionne bien, prêt à réfléchir avec toi. Dis-moi ce dont tu as besoin : une recette, un site, un tutoriel, un calcul…";
      }

      // faim / manger / recette
      if (/\b(manger|faim|j'ai faim|je veux manger|recette|cuisine|gateau|gâteau|cake)\b/.test(last)) {
        return (
          "Tu as envie de manger, parfait.\n\n" +
          "Voici un site qui propose des recettes de gâteaux : Marmiton (https://www.marmiton.org).\n" +
          "Tu peux aussi chercher « recette de gâteau » dans NexSearch pour plus de résultats.\n\n" +
          "Je te propose moi-même une recette de cake nature simple :\n" +
          "- Préchauffe ton four à 180°C.\n" +
          "- Mélange 3 œufs, 150 g de sucre et 100 g de beurre fondu.\n" +
          "- Ajoute 200 g de farine, 1 sachet de levure et une pincée de sel.\n" +
          "- Tu peux incorporer de la vanille, du citron ou des pépites de chocolat.\n" +
          "- Verse dans un moule beurré et enfourne 35 à 45 minutes.\n\n" +
          "Avec ça, tu as à la fois un site pour explorer d’autres recettes et une base pour faire ton propre gâteau."
        );
      }

      // calcul dans le chat
      if (last.startsWith("calcule ") || isMathExpression(last)) {
        const expr = last.replace(/^calcule\s+/i, "");
        const res = calculateExpression(expr);
        if (res !== null && !Number.isNaN(res)) {
          return `Si je calcule « ${expr} », j’obtiens : ${res}. Tu peux aussi taper cette expression directement dans NexSearch pour voir le résultat dans la zone de résultats.`;
        } else {
          return "Je n’arrive pas à calculer cette expression. Essaie avec quelque chose comme 3*(5+2) ou « calcule 12*4 ».";
        }
      }

      // tutoriel / code
      if (/\b(javascript|python|code|programmation|développeur|developer)\b/.test(last)) {
        return (
          "Tu t’intéresses à la programmation, bonne idée.\n\n" +
          "Pour apprendre efficacement :\n" +
          "- Choisis un langage (JavaScript pour le web, Python pour la polyvalence).\n" +
          "- Suis un tutoriel structuré étape par étape.\n" +
          "- Construis de petits projets concrets (un mini site, un script, un outil).\n\n" +
          "Pour JavaScript, tu peux consulter MDN Web Docs ou W3Schools.\n" +
          "Pour Python, la documentation officielle et des sites comme Real Python sont utiles.\n\n" +
          "Tu peux aussi taper « tutoriel JavaScript » ou « apprendre Python » dans NexSearch pour obtenir des liens cliquables vers ces ressources."
        );
      }

      // questions explicatives
      if (
        last.startsWith("comment ") ||
        last.startsWith("pourquoi ") ||
        last.startsWith("c'est quoi") ||
        last.startsWith("c est quoi") ||
        last.startsWith("qu'est-ce que") ||
        last.startsWith("qu est ce que")
      ) {
        return (
          "Tu poses une question explicative.\n\n" +
          "Une bonne façon de comprendre un sujet :\n" +
          "- Commencer par une définition simple.\n" +
          "- Identifier les éléments importants ou les étapes.\n" +
          "- Chercher un exemple concret ou une analogie.\n\n" +
          "Pour approfondir, tu peux taper ta question ou le mot-clé principal dans NexSearch : tu auras des liens vers Wikipédia, des tutoriels, des vidéos, etc."
        );
      }

      // recherche de site / marque
      if (last.includes("site") || last.includes("sites") || last.includes("marque")) {
        return (
          "Si tu cherches des sites précis, tu peux :\n" +
          "- Taper directement le nom du site dans NexSearch (ex : « shopify », « amazon », « marmiton »).\n" +
          "- NexSearch essaiera de te proposer un lien direct vers ce site.\n\n" +
          "Pour des recettes : Marmiton, 750g.\n" +
          "Pour des tutoriels vidéo : YouTube.\n" +
          "Pour des définitions : Wikipédia.\n" +
          "Pour une recherche générale : Bing ou Google."
        );
      }

      // contexte : déjà parlé de nourriture
      if (context.hasTalkedFood && !/\b(manger|faim|recette|cuisine|gateau|gâteau|cake)\b/.test(last)) {
        return (
          "On a déjà parlé de recettes et de nourriture. Si tu veux, je peux te proposer une autre idée :\n" +
          "- Un cake salé (avec fromage, jambon, olives).\n" +
          "- Un gâteau au yaourt très simple.\n\n" +
          "Tu peux aussi me dire un ingrédient que tu as (ex : chocolat, citron, banane) et je t’inspire une recette rapide."
        );
      }

      // fallback générique
      return (
        "Je suis une IA locale, donc je ne peux pas lire les sites en temps réel, " +
        "mais je peux t’aider à réfléchir, te proposer des idées, des recettes simples, des conseils ou des explications.\n\n" +
        "Essaie de préciser ce que tu veux : une recette, un site, un tutoriel, un calcul, ou une définition sur un sujet."
      );
    }
  </script>
</body>
</html>
