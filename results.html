<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche NexSearch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-main: #02040a;
      --bg-panel: #050816;
      --border-panel: #111827;
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --text-soft: #6b7280;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #020617 0, #000 55%, #020617 100%);
      color: var(--text-main);
      overflow-y: auto;
      overflow-x: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      padding: 6px 14px;
      background: #020617;
      border-bottom: 1px solid #111827;
      cursor: pointer;
    }

    .logo-main {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8 60%, #020617 100%);
      box-shadow: 0 0 16px rgba(37,99,235,0.9);
      position: relative;
    }

    .logo-main::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(15,23,42,0.9);
      box-shadow: inset 0 0 10px rgba(15,23,42,0.9);
    }

    .logo-text {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    /* Layout principal */
    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 2.1fr 1.1fr;
      gap: 10px;
      padding: 10px 14px 80px 14px;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      padding: 8px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      position: relative;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #bfdbfe;
    }

    .panel-sub {
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    /* Résultats */
    .results-panel {
      overflow: hidden;
    }

    #results-meta {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    #results-summary {
      margin-bottom: 6px;
      padding: 6px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #1f2937;
      font-size: 0.82rem;
      max-height: 110px;
      overflow-y: auto;
    }

    #results-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 6px;
    }

    .result-item-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .result-item {
      display: flex;
      gap: 8px;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid #111827;
      background: #020617;
      margin-bottom: 5px;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
      cursor: pointer;
    }

    .result-item:hover {
      background: #02081a;
      border-color: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(37,99,235,0.4);
    }

    .result-favicon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #e5e7eb;
      flex-shrink: 0;
      overflow: hidden;
    }

    .result-favicon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    .result-content {
      flex: 1;
      min-width: 0;
    }

    .result-item-title {
      font-weight: 600;
      color: #bfdbfe;
      font-size: 0.88rem;
      margin-bottom: 1px;
    }

    .result-item-url {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-bottom: 1px;
      word-break: break-all;
    }

    .result-item-tags {
      font-size: 0.7rem;
      color: var(--text-soft);
    }

    .result-score {
      font-size: 0.7rem;
      color: #a5b4fc;
    }

    /* Actions globales */
    .results-actions-wrapper {
      border-top: 1px solid #111827;
      padding-top: 4px;
    }

    .actions-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .action-btn {
      padding: 5px 9px;
      border-radius: 4px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.78rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn:hover {
      background: #0b1120;
      border-color: #2563eb;
    }

    /* NexAI */
    .nexai-panel {
      overflow: hidden;
      position: relative;
    }

    .nexai-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      padding-bottom: 70px; /* espace pour la barre flottante */
    }

    #nexai-summary {
      padding: 6px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #1d4ed8;
      font-size: 0.82rem;
      max-height: 90px;
      overflow-y: auto;
      color: #dbeafe;
    }

    #nexai-log {
      flex: 1;
      overflow-y: auto;
      border-radius: 6px;
      border: 1px solid #111827;
      background: radial-gradient(circle at top, #020617 0, #020617 40%, #000 100%);
      padding: 6px;
      font-size: 0.82rem;
    }

    .nexai-msg {
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    .nexai-msg-user {
      color: #93c5fd;
    }

    .nexai-msg-ai {
      color: #e5f2ff;
    }

    .nexai-input-row {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      display: flex;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: rgba(2,6,23,0.96);
      box-shadow: 0 10px 25px rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 5;
    }

    .nexai-input-row input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.82rem;
    }

    .nexai-input-row button {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      background: var(--accent);
      color: #f9fafb;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .nexai-input-row button:hover {
      filter: brightness(1.05);
    }

    /* Barre de recherche en bas */
    .bottom-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 8px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    .bottom-bar {
      width: min(900px, 100% - 24px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 8px;
      background: #020617;
      border: 1px solid #111827;
      box-shadow: 0 12px 30px rgba(0,0,0,0.9);
      pointer-events: auto;
    }

    .bottom-logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8 60%, #020617 100%);
      box-shadow: 0 0 14px rgba(37,99,235,0.9);
      cursor: pointer;
      position: relative;
    }

    .bottom-logo::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1px solid rgba(15,23,42,0.9);
      box-shadow: inset 0 0 8px rgba(15,23,42,0.9);
    }

    .bottom-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #020617;
      border-radius: 4px;
      padding: 3px 6px;
      border: 1px solid #1f2937;
    }

    .bottom-input input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: 0.86rem;
    }

    .bottom-input button {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      background: var(--accent);
      color: #f9fafb;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
    }

    .bottom-input button:hover {
      filter: brightness(1.05);
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
        padding-bottom: 90px;
      }
      .nexai-panel {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="top-bar" id="home-link-top">
      <div class="logo-main"></div>
      <div class="logo-text">NexSearch</div>
    </header>

    <!-- Layout principal -->
    <main class="main-layout">
      <!-- Panel résultats -->
      <section class="panel results-panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Résultats NexSearch</div>
            <div class="panel-sub">Organisation intelligente des liens</div>
          </div>
        </div>

        <div id="results-meta"></div>
        <div id="results-summary"></div>
        <div id="results-list"></div>

        <div class="results-actions-wrapper">
          <div style="font-size:0.78rem;color:#9ca3af;margin-bottom:2px;">Actions rapides</div>
          <div id="results-actions" class="actions-bar"></div>
        </div>
      </section>

      <!-- Panel NexAI -->
      <aside class="panel nexai-panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">NexAI</div>
            <div class="panel-sub">Résumé IA + chat + calcul</div>
          </div>
        </div>

        <div class="nexai-body">
          <div id="nexai-summary"></div>
          <div id="nexai-log"></div>
          <div class="nexai-input-row">
            <input id="nexai-input" type="text" placeholder="Parler avec NexAI... (ex : explique Amazon, calcule 42*13)">
            <button id="nexai-send">Envoyer</button>
          </div>
        </div>
      </aside>
    </main>

    <!-- Barre de recherche en bas -->
    <div class="bottom-dock">
      <div class="bottom-bar">
        <div class="bottom-logo" id="home-link-bottom"></div>
        <div class="bottom-input">
          <input id="search-input" type="text" placeholder="Rechercher avec NexSearch (abréviations, fautes, tout accepté)...">
          <button id="search-btn">Rechercher</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // 1) Utilitaires
    // =========================
    function normalizeText(str) {
      return str
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function levenshtein(a, b) {
      const m = a.length;
      const n = b.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[m][n];
    }

    // =========================
    // 2) Abréviations / corrections avancées
    // =========================
    const ADVANCED_ABBREV_MAP = {
      "ms": "microsoft",
      "msoft": "microsoft",
      "mivkoft": "microsoft",
      "microsof": "microsoft",
      "microsft": "microsoft",
      "win": "windows",
      "w11": "windows 11",
      "yt": "youtube",
      "youtub": "youtube",
      "ytb": "youtube",
      "spoti": "spotify",
      "deeze": "deezer",
      "amz": "amazon",
      "amazn": "amazon",
      "fnc": "fnac",
      "cdisc": "cdiscount",
      "ali": "aliexpress",
      "gh": "github",
      "so": "stack overflow",
      "mdn": "mdn web docs",
      "tw": "twitter",
      "x": "twitter",
      "ig": "instagram",
      "fb": "facebook"
    };

    const ADVANCED_CANONICAL = [
      "microsoft",
      "windows",
      "youtube",
      "spotify",
      "deezer",
      "amazon",
      "fnac",
      "cdiscount",
      "aliexpress",
      "github",
      "stack overflow",
      "mdn web docs",
      "twitter",
      "instagram",
      "facebook",
      "bing",
      "copilot"
    ];

    function advancedNormalizeQuery(q) {
      const original = q;
      let norm = normalizeText(q);
      const tokens = norm.split(" ");
      const outTokens = [];

      for (let tok of tokens) {
        if (!tok) continue;

        if (ADVANCED_ABBREV_MAP[tok]) {
          outTokens.push(ADVANCED_ABBREV_MAP[tok]);
          continue;
        }

        let best = tok;
        let bestDist = Infinity;
        for (const cand of ADVANCED_CANONICAL) {
          const d = levenshtein(tok, cand);
          if (d < bestDist) {
            bestDist = d;
            best = cand;
          }
        }
        if (bestDist <= 2 && best !== tok) {
          outTokens.push(best);
        } else {
          outTokens.push(tok);
        }
      }

      const corrected = outTokens.join(" ");
      return { original, normalized: corrected };
    }

    // =========================
    // 3) NexAI – mini-Copilot avec contexte
    // =========================
    const NEXAI_MEMORY = {
      lastQuery: null,
      lastType: null,
      lastTopic: null
    };

    function tryCalcExpression(expr) {
      try {
        if (!/^[0-9+\-*/().,%\s]+$/.test(expr)) return null;
        const safe = expr.replace(/%/g, "/100");
        const result = Function('"use strict";return (' + safe + ')')();
        if (typeof result === "number" && isFinite(result)) {
          return result;
        }
        return null;
      } catch {
        return null;
      }
    }

    function nexaiDetectType(text) {
      const t = normalizeText(text);
      const isCalc = /[0-9]/.test(text) && /[+\-*/]/.test(text);
      const isHello = t.includes("bonjour") || t.includes("salut") || t.includes("hey");
      const isWho = t.includes("qui etes vous") || t.includes("qui es tu") || t.includes("qui etes-vous");
      const isWhat = t.startsWith("c est quoi") || t.startsWith("qu est ce que");
      const isWhy = t.startsWith("pourquoi") || t.includes("pourquoi ");
      const isHow = t.startsWith("comment") || t.includes("comment ");
      const isMs = t === "ms" || t.includes("microsoft") || t.includes("windows");
      const isAmazon = t.includes("amazon");
      const isYoutube = t.includes("youtube") || t === "yt";
      const isFollowUp = t.startsWith("et ") || t.startsWith("et pour") || t.startsWith("et le");
      const isSearchHelp = t.includes("nexsearch") || t.includes("recherche");
      const isNonsense = t.length <= 2 && !isCalc && !isHello && !isMs && !isAmazon && !isYoutube;

      return {
        isCalc,
        isHello,
        isWho,
        isWhat,
        isWhy,
        isHow,
        isMs,
        isAmazon,
        isYoutube,
        isFollowUp,
        isSearchHelp,
        isNonsense
      };
    }

    function nexaiBuildSummaryForQuery(q, correctedQ, typeInfo) {
      const base = [];

      if (!q.trim()) {
        return "Tapez une requête en bas, même avec des abréviations ou des fautes : je corrige, j’analyse et je résume ce que vous cherchez.";
      }

      if (correctedQ !== q) {
        base.push(`Requête corrigée en : « ${correctedQ} ».`);
      } else {
        base.push(`Requête analysée : « ${q} ».`);
      }

      if (typeInfo.isVideo) base.push("Je privilégie les sites vidéo (YouTube, Twitch, etc.).");
      if (typeInfo.isMusic) base.push("Je privilégie les sites de musique (Spotify, Deezer, Amazon Music…).");
      if (typeInfo.isObject) base.push("Je privilégie les sites de shopping (Amazon, Fnac, Cdiscount, AliExpress…).");
      if (typeInfo.isPlace) base.push("Je privilégie les cartes et les résultats géolocalisés.");
      if (typeInfo.isMicrosoft) base.push("Je mets en avant l’écosystème Microsoft (Windows, Office, documentation…).");

      if (correctedQ.includes("amazon")) {
        base.push("Amazon est une entreprise de e‑commerce et de services cloud. Les résultats mettent en avant les produits et les comparateurs.");
      }
      if (correctedQ.includes("microsoft")) {
        base.push("Microsoft développe Windows, Office, Xbox et de nombreux services cloud. Les résultats mettent en avant les sites officiels et la documentation.");
      }
      if (correctedQ.includes("youtube")) {
        base.push("YouTube est une plateforme vidéo. Les résultats mettent en avant les vidéos et les plateformes de streaming.");
      }

      if (base.length === 0) {
        base.push("Je n’ai pas détecté de type particulier, mais j’ai classé les sites les plus pertinents pour votre requête.");
      }

      return base.join(" ");
    }

    function nexaiGenerateAnswer(text) {
      const trimmed = text.trim();
      const calcRes = tryCalcExpression(trimmed);
      const type = nexaiDetectType(trimmed);

      // Calcul
      if (calcRes !== null && type.isCalc) {
        return `Voici le résultat de votre calcul : ${calcRes}. Si vous le souhaitez, je peux aussi expliquer comment on y arrive.`;
      }

      // Bonjour
      if (type.isHello) {
        return "Bonjour ! Vous pouvez me demander d’expliquer un site (Amazon, Microsoft, YouTube…), de résumer votre recherche actuelle ou de faire un calcul rapide.";
      }

      // Qui suis-je
      if (type.isWho) {
        return "Je suis NexAI, une petite IA intégrée à NexSearch. Mon rôle est de comprendre votre requête, corriger les abréviations, analyser le type de recherche (site, produit, vidéo, lieu, calcul…) et vous donner un résumé clair, comme un mini‑Copilot.";
      }

      // C'est quoi / Qu'est-ce que
      if (type.isWhat) {
        const after = trimmed.replace(/^c est quoi/i, "").replace(/^qu est ce que/i, "").trim();
        if (after) {
          return `Vous me demandez ce qu’est « ${after} ». En général, je peux vous donner : une définition simple, à quoi cela sert, et quelques exemples d’utilisation. Vous pouvez aussi lancer une recherche avec ce terme pour voir les sites les plus pertinents.`;
        }
        return "Vous pouvez me demander : « C’est quoi Amazon ? », « C’est quoi NexSearch ? », « C’est quoi Windows 11 ? », etc.";
      }

      // Pourquoi
      if (type.isWhy) {
        if (NEXAI_MEMORY.lastQuery) {
          return `Vous posez une question commençant par « pourquoi » en lien avec votre contexte. Par rapport à « ${NEXAI_MEMORY.lastQuery} », je peux vous expliquer les raisons, les avantages ou les limites du sujet que vous explorez.`;
        }
        return "Vous posez une question commençant par « pourquoi ». Donnez-moi un peu plus de contexte (par exemple un site, un produit ou une situation) et je vous ferai une explication structurée.";
      }

      // Comment
      if (type.isHow) {
        if (NEXAI_MEMORY.lastQuery) {
          return `Vous demandez « comment » faire quelque chose. En lien avec « ${NEXAI_MEMORY.lastQuery} », je peux vous proposer des étapes simples, des conseils pratiques et des liens utiles dans les résultats.`;
        }
        return "Vous demandez « comment » faire quelque chose. Précisez ce que vous voulez faire (installer, configurer, acheter, comprendre…) et je vous guiderai étape par étape.";
      }

      // Microsoft
      if (type.isMs) {
        NEXAI_MEMORY.lastTopic = "microsoft";
        return "Microsoft est une entreprise américaine qui développe notamment Windows, Office, Xbox et de nombreux services cloud. Si vous cherchez un produit ou un service Microsoft précis, indiquez-le (par exemple : « Windows 11 », « Excel », « Surface Laptop ») et je vous orienterai vers les bons liens.";
      }

      // Amazon
      if (type.isAmazon) {
        NEXAI_MEMORY.lastTopic = "amazon";
        return "Amazon est une entreprise américaine spécialisée dans le e‑commerce et les services cloud (AWS). Pour un produit précis, tapez simplement son nom (par exemple « clavier ergonomique », « souris Bluetooth ») et NexSearch mettra en avant Amazon, Fnac, Cdiscount et d’autres sites pour comparer.";
      }

      // YouTube
      if (type.isYoutube) {
        NEXAI_MEMORY.lastTopic = "youtube";
        return "YouTube est une plateforme de partage de vidéos. Si vous me donnez un sujet, un titre ou un créateur, je peux orienter la recherche vers YouTube et d’autres plateformes vidéo pour que vous trouviez rapidement ce que vous voulez regarder.";
      }

      // Suivi de conversation
      if (type.isFollowUp && NEXAI_MEMORY.lastQuery) {
        return `Vous faites un suivi par rapport à « ${NEXAI_MEMORY.lastQuery} ». Vous pouvez me demander un résumé plus détaillé, une comparaison entre sites (Amazon, Fnac, Cdiscount…), ou un calcul lié (par exemple le prix total avec une remise).`;
      }

      // Aide sur NexSearch
      if (type.isSearchHelp) {
        return "NexSearch accepte les fautes et les abréviations (ms → Microsoft, yt → YouTube, amz → Amazon…). Tapez simplement ce que vous avez en tête, je corrige, j’analyse le type de recherche et j’organise les sites (vidéo, shopping, cartes, images, docs…).";
      }

      // Entrée très courte / bruit
      if (type.isNonsense) {
        return "Je ne reconnais pas ce que vous venez de taper. Essayez un mot‑clé plus clair (un site, un produit, un sujet ou un calcul).";
      }

      // Contexte de recherche
      if (NEXAI_MEMORY.lastQuery) {
        return `Par rapport à votre recherche « ${NEXAI_MEMORY.lastQuery} », vous pouvez me demander : un résumé plus détaillé, une explication d’un site précis (Amazon, Microsoft, YouTube…), ou un calcul lié (par exemple un total, une remise ou une conversion).`;
      }

      // Fallback général
      return "Je ne suis pas certain de ce que vous attendez. Vous pouvez me demander d’expliquer un site, de résumer une recherche ou de faire un calcul. Donnez-moi un mot‑clé ou une phrase un peu plus précise et je m’adapterai.";
    }

    async function nexaiChatReply(userText) {
      // Ici on simule un réseau de neurones avancé qui combine :
      // - détection d’intention
      // - contexte (mémoire courte)
      // - génération de texte fluide
      // Le cœur est dans nexaiGenerateAnswer.
      return nexaiGenerateAnswer(userText);
    }

    // =========================
    // 4) NexSearch – moteur IA local (version courte)
    // =========================
    const SITES_DB = [
      { name: "Bing", url: "https://www.bing.com/search?q={q}", tags: ["search","general"], weight: 0.95, favicon: "https://www.bing.com/sa/simg/favicon-2x.ico" },
      { name: "Copilot", url: "https://copilot.microsoft.com/?q={q}", tags: ["ai","assistant"], weight: 0.98, favicon: "https://copilot.microsoft.com/favicon.ico" },

      { name: "YouTube", url: "https://www.youtube.com/results?search_query={q}", tags: ["video","music"], weight: 0.97, favicon: "https://www.youtube.com/favicon.ico" },
      { name: "Twitch", url: "https://www.twitch.tv/search?term={q}", tags: ["video","gaming","live"], weight: 0.85, favicon: "https://static.twitchcdn.net/assets/favicon-32-e29e246c157142c94346.png" },

      { name: "Spotify", url: "https://open.spotify.com/search/{q}", tags: ["music"], weight: 0.9, favicon: "https://open.spotifycdn.com/cdn/images/favicon32.b64ecc03.png" },
      { name: "Deezer", url: "https://www.deezer.com/search/{q}", tags: ["music"], weight: 0.85, favicon: "https://e-cdns-files.dzcdn.net/cache/images/common/favicon/favicon-32x32.1c0c1c4c.png" },
      { name: "Amazon Music", url: "https://music.amazon.fr/search/{q}", tags: ["music","shopping"], weight: 0.82, favicon: "https://music.amazon.fr/favicon.ico" },

      { name: "Amazon", url: "https://www.amazon.fr/s?k={q}", tags: ["shopping","object"], weight: 0.97, favicon: "https://www.amazon.fr/favicon.ico" },
      { name: "Fnac", url: "https://www.fnac.com/SearchResult/ResultList.aspx?Search={q}", tags: ["shopping","object"], weight: 0.9, favicon: "https://www.fnac.com/favicon.ico" },
      { name: "Cdiscount", url: "https://www.cdiscount.com/search/10/{q}.html", tags: ["shopping","object"], weight: 0.88, favicon: "https://www.cdiscount.com/favicon-32x32.png" },
      { name: "AliExpress", url: "https://www.aliexpress.com/wholesale?SearchText={q}", tags: ["shopping","object"], weight: 0.84, favicon: "https://www.aliexpress.com/favicon.ico" },

      { name: "Bing Maps", url: "https://www.bing.com/maps?q={q}", tags: ["maps","place"], weight: 0.9, favicon: "https://www.bing.com/sa/simg/favicon-2x.ico" },
      { name: "Bing Images", url: "https://www.bing.com/images/search?q={q}", tags: ["images"], weight: 0.9, favicon: "https://www.bing.com/sa/simg/favicon-2x.ico" },

      { name: "Microsoft", url: "https://www.microsoft.com/search?q={q}", tags: ["microsoft","software"], weight: 0.95, favicon: "https://www.microsoft.com/favicon.ico" },
      { name: "GitHub", url: "https://github.com/search?q={q}", tags: ["dev","code"], weight: 0.9, favicon: "https://github.githubassets.com/favicons/favicon.png" },
      { name: "Stack Overflow", url: "https://stackoverflow.com/search?q={q}", tags: ["dev","questions"], weight: 0.9, favicon: "https://cdn.sstatic.net/Sites/stackoverflow/Img/favicon.ico" },
      { name: "MDN Web Docs", url: "https://developer.mozilla.org/fr/search?q={q}", tags: ["dev","docs"], weight: 0.85, favicon: "https://developer.mozilla.org/favicon-32x32.cbbd161b.png" }
      // → extensible jusqu’à 1000 sites
    ];

    function detectQueryType(q) {
      const t = normalizeText(q);

      const isVideo =
        t.includes("clip") || t.includes("trailer") || t.includes("official video") ||
        t.includes("youtube") || t.includes("youtuber") || t.includes("video");

      const isMusic =
        t.includes("song") || t.includes("musique") || t.includes("lyrics") ||
        t.includes("album") || t.includes("single") || t.includes("feat");

      const isObject =
        t.includes("acheter") || t.includes("prix") || t.includes("euros") ||
        t.includes("souris") || t.includes("clavier") || t.includes("casque") ||
        t.includes("pc") || t.includes("ecran") || t.includes("tele") ||
        t.includes("smartphone") || t.includes("chargeur") || t.includes("ordinateur");

      const isPlace =
        t.includes("pres de") || t.includes("near me") || t.includes("adresse") ||
        t.includes("ville") || t.includes("restaurant") || t.includes("hotel");

      const isMicrosoft =
        t.includes("windows") || t.includes("office") || t.includes("excel") ||
        t.includes("word") || t.includes("powerpoint") || t.includes("onenote") ||
        t.includes("microsoft") || t.includes("ms");

      return { isVideo, isMusic, isObject, isPlace, isMicrosoft };
    }

    function scoreSiteForQuery(site, q, typeInfo, correctedQ) {
      const t = normalizeText(correctedQ);
      let score = site.weight || 0.5;

      const nameNorm = normalizeText(site.name);

      if (nameNorm === t) score += 0.7;
      if (nameNorm.includes(t) || t.includes(nameNorm)) score += 0.4;

      if (t.includes("microsoft") || t.includes("windows")) {
        if (site.tags.includes("microsoft")) score += 0.8;
      }
      if (t.includes("amazon")) {
        if (site.name.toLowerCase().includes("amazon")) score += 0.8;
      }
      if (t.includes("youtube") || t.includes("yt")) {
        if (site.name.toLowerCase().includes("youtube")) score += 0.8;
      }

      if (typeInfo.isVideo && site.tags.includes("video")) score += 0.6;
      if (typeInfo.isMusic && site.tags.includes("music")) score += 0.6;
      if (typeInfo.isObject && site.tags.includes("shopping")) score += 0.6;
      if (typeInfo.isPlace && site.tags.includes("maps")) score += 0.6;
      if (typeInfo.isMicrosoft && site.tags.includes("microsoft")) score += 0.6;

      score += (Math.random() - 0.5) * 0.1;

      return score;
    }

    function buildResultsForQuery(q) {
      const { normalized: correctedQ } = advancedNormalizeQuery(q);
      const typeInfo = detectQueryType(correctedQ);

      const scored = SITES_DB.map(site => ({
        site,
        score: scoreSiteForQuery(site, q, typeInfo, correctedQ)
      }));

      scored.sort((a, b) => b.score - a.score);

      return {
        typeInfo,
        correctedQ,
        results: scored.slice(0, 12).map(entry => {
          const url = entry.site.url.replace("{q}", encodeURIComponent(correctedQ));
          return {
            name: entry.site.name,
            url,
            tags: entry.site.tags,
            score: entry.score,
            favicon: entry.site.favicon
          };
        })
      };
    }

    function buildActionButtons(q, typeInfo, correctedQ) {
      const buttons = [];

      buttons.push({ label: "Voir sur Bing", url: "https://www.bing.com/search?q=" + encodeURIComponent(correctedQ) });
      buttons.push({ label: "Copilot Search", url: "https://copilot.microsoft.com/?q=" + encodeURIComponent(correctedQ) });
      buttons.push({ label: "Images", url: "https://www.bing.com/images/search?q=" + encodeURIComponent(correctedQ) });
      buttons.push({ label: "Maps", url: "https://www.bing.com/maps?q=" + encodeURIComponent(correctedQ) });

      if (typeInfo.isVideo || typeInfo.isMusic) {
        buttons.push({ label: "YouTube", url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(correctedQ) });
      }
      if (typeInfo.isMusic) {
        buttons.push({ label: "Spotify", url: "https://open.spotify.com/search/" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Deezer", url: "https://www.deezer.com/search/" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Amazon Music", url: "https://music.amazon.fr/search/" + encodeURIComponent(correctedQ) });
      }
      if (typeInfo.isObject) {
        buttons.push({ label: "Amazon", url: "https://www.amazon.fr/s?k=" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Fnac", url: "https://www.fnac.com/SearchResult/ResultList.aspx?Search=" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Cdiscount", url: "https://www.cdiscount.com/search/10/" + encodeURIComponent(correctedQ) + ".html" });
        buttons.push({ label: "AliExpress", url: "https://www.aliexpress.com/wholesale?SearchText=" + encodeURIComponent(correctedQ) });
      }

      return buttons;
    }

    // =========================
    // 5) Intégration UI
    // =========================
    function appendNexAIMsg(text, from) {
      const log = document.getElementById("nexai-log");
      const div = document.createElement("div");
      div.className = "nexai-msg " + (from === "user" ? "nexai-msg-user" : "nexai-msg-ai");
      div.textContent = (from === "user" ? "Vous : " : "NexAI : ") + text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function runNexSearch(q) {
      if (!q.trim()) return;

      const { typeInfo, correctedQ, results } = buildResultsForQuery(q);
      const actions = buildActionButtons(q, typeInfo, correctedQ);

      NEXAI_MEMORY.lastQuery = correctedQ;
      NEXAI_MEMORY.lastType = typeInfo;

      const metaDiv = document.getElementById("results-meta");
      metaDiv.textContent = `Requête : "${q}"` + (correctedQ !== q ? ` → corrigée en : "${correctedQ}"` : "");

      const summaryDiv = document.getElementById("results-summary");
      summaryDiv.textContent = nexaiBuildSummaryForQuery(q, correctedQ, typeInfo);

      const listDiv = document.getElementById("results-list");
      listDiv.innerHTML = "";
      results.forEach(r => {
        const linkWrapper = document.createElement("a");
        linkWrapper.className = "result-item-link";
        linkWrapper.href = r.url;
        linkWrapper.target = "_blank";
        linkWrapper.rel = "noopener noreferrer";

        const item = document.createElement("div");
        item.className = "result-item";

        const fav = document.createElement("div");
        fav.className = "result-favicon";
        if (r.favicon) {
          const img = document.createElement("img");
          img.src = r.favicon;
          img.alt = r.name;
          img.onerror = () => {
            img.style.display = "none";
            fav.textContent = r.name[0] || "?";
          };
          fav.appendChild(img);
        } else {
          fav.textContent = r.name[0] || "?";
        }

        const content = document.createElement("div");
        content.className = "result-content";

        const title = document.createElement("div");
        title.className = "result-item-title";
        title.textContent = r.name;

        const url = document.createElement("div");
        url.className = "result-item-url";
        url.textContent = r.url;

        const tags = document.createElement("div");
        tags.className = "result-item-tags";
        const scoreSpan = document.createElement("span");
        scoreSpan.className = "result-score";
        scoreSpan.textContent = `score=${r.score.toFixed(2)}`;
        tags.textContent = "Tags : " + r.tags.join(", ") + " · ";
        tags.appendChild(scoreSpan);

        content.appendChild(title);
        content.appendChild(url);
        content.appendChild(tags);

        item.appendChild(fav);
        item.appendChild(content);
        linkWrapper.appendChild(item);

        listDiv.appendChild(linkWrapper);
      });

      const actionsDiv = document.getElementById("results-actions");
      actionsDiv.innerHTML = "";
      actions.forEach(b => {
        const btn = document.createElement("button");
        btn.className = "action-btn";
        btn.textContent = b.label;
        btn.onclick = () => window.open(b.url, "_blank");
        actionsDiv.appendChild(btn);
      });

      const nexaiSummary = document.getElementById("nexai-summary");
      nexaiSummary.textContent = nexaiBuildSummaryForQuery(q, correctedQ, typeInfo);
    }

    function initUI() {
      const searchInput = document.getElementById("search-input");
      const searchBtn = document.getElementById("search-btn");
      const nexaiInput = document.getElementById("nexai-input");
      const nexaiSend = document.getElementById("nexai-send");
      const homeTop = document.getElementById("home-link-top");
      const homeBottom = document.getElementById("home-link-bottom");

      const goHome = () => {
        window.location.href = "./index.html";
      };

      homeTop.onclick = goHome;
      homeBottom.onclick = goHome;

      searchBtn.onclick = () => {
        const q = searchInput.value.trim();
        if (!q) return;
        runNexSearch(q);
      };
      searchInput.onkeydown = e => {
        if (e.key === "Enter") searchBtn.click();
      };

      nexaiSend.onclick = async () => {
        const msg = nexaiInput.value.trim();
        if (!msg) return;
        nexaiInput.value = "";
        appendNexAIMsg(msg, "user");
        const reply = await nexaiChatReply(msg);
        appendNexAIMsg(reply, "ai");
      };
      nexaiInput.onkeydown = e => {
        if (e.key === "Enter") nexaiSend.click();
      };

      document.getElementById("nexai-summary").textContent =
        "Tapez une requête en bas (abréviations, fautes, tout accepté) : je corrige, j’analyse et je résume ce que vous cherchez.";

      // Recherche auto si ?q=... dans l’URL
      const params = new URLSearchParams(window.location.search);
      const qParam = params.get("q");
      if (qParam) {
        searchInput.value = qParam;
        runNexSearch(qParam);
      }
    }

    window.addEventListener("DOMContentLoaded", initUI);
  </script>
