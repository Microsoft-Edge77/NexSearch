<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche NexSearch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
    }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .top-bar {
      display: flex;
      align-items: center;
      padding: 8px 16px;
      background: #020617;
      border-bottom: 1px solid #1f2937;
    }
    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      margin-right: 16px;
    }
    .search-box {
      flex: 1;
      display: flex;
      gap: 8px;
    }
    .search-box input {
      flex: 1;
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
    }
    .search-box button {
      padding: 8px 14px;
      border-radius: 6px;
      border: none;
      background: #2563eb;
      color: #f9fafb;
      cursor: pointer;
    }
    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 2fr 1.2fr;
      gap: 12px;
      padding: 12px;
      box-sizing: border-box;
    }
    .results-panel, .nexai-panel {
      background: #020617;
      border-radius: 10px;
      border: 1px solid #1f2937;
      padding: 10px;
      box-sizing: border-box;
      overflow: hidden;
    }
    #results-list {
      margin-top: 8px;
    }
    .result-item {
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      margin-bottom: 6px;
      background: #030712;
      cursor: pointer;
    }
    .result-item-title {
      font-weight: 600;
      color: #93c5fd;
    }
    .result-item-url {
      font-size: 0.85rem;
      color: #9ca3af;
    }
    .result-item-tags {
      font-size: 0.8rem;
      color: #6b7280;
    }
    .actions-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
    }
    .action-btn {
      padding: 6px 10px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #111827;
      color: #e5e7eb;
      font-size: 0.8rem;
      cursor: pointer;
    }
    .action-btn:hover {
      background: #1f2937;
    }
    .nexai-log {
      height: calc(100% - 40px);
      overflow-y: auto;
      border-radius: 6px;
      border: 1px solid #1f2937;
      padding: 8px;
      background: #030712;
      font-size: 0.9rem;
    }
    .nexai-msg {
      margin-bottom: 6px;
      white-space: pre-wrap;
    }
    .nexai-msg-user {
      color: #93c5fd;
    }
    .nexai-msg-ai {
      color: #a7f3d0;
    }
    .nexai-input-row {
      display: flex;
      gap: 6px;
      margin-top: 6px;
    }
    .nexai-input-row input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid #374151;
      background: #020617;
      color: #e5e7eb;
    }
    .nexai-input-row button {
      padding: 6px 10px;
      border-radius: 6px;
      border: none;
      background: #22c55e;
      color: #022c22;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="logo">NexSearch</div>
      <div class="search-box">
        <input id="search-input" type="text" placeholder="Rechercher avec NexSearch...">
        <button id="search-btn">Rechercher</button>
      </div>
    </header>

    <main class="main-layout">
      <section class="results-panel">
        <h2>Résultats NexSearch</h2>
        <div id="results-meta"></div>
        <div id="results-list"></div>

        <h3>Actions intelligentes</h3>
        <div id="results-actions" class="actions-bar"></div>
      </section>

      <aside class="nexai-panel">
        <h2>NexAI – IA locale</h2>
        <div id="nexai-log" class="nexai-log"></div>
        <div class="nexai-input-row">
          <input id="nexai-input" type="text" placeholder="Parler avec NexAI...">
          <button id="nexai-send">Envoyer</button>
        </div>
      </aside>
    </main>
  </div>

  <script>
    // =========================
    // 1) NexAI – mini réseau de neurones ~100 000 paramètres
    // =========================

    const NEXAI_VOCAB = "abcdefghijklmnopqrstuvwxyz0123456789 ?!.,";
    const EMBED_DIM = 192;   // ↑ pour augmenter le nombre de paramètres
    const HIDDEN_DIM = 512;  // ↑ idem
    const N_INTENTS = 16;

    // Approx params:
    // embed: 40 * 192 = 7680
    // hidden: 192 * 512 = 98304
    // output: 512 * 16 = 8192
    // biases ~ 528
    // total ≈ 114 000 paramètres

    function randn() {
      return (Math.random() * 2 - 1) * 0.1;
    }

    const W_embed = Array.from({ length: NEXAI_VOCAB.length }, () =>
      Array.from({ length: EMBED_DIM }, randn)
    );

    const W_hidden = Array.from({ length: EMBED_DIM }, () =>
      Array.from({ length: HIDDEN_DIM }, randn)
    );
    const b_hidden = Array.from({ length: HIDDEN_DIM }, randn);

    const W_out = Array.from({ length: HIDDEN_DIM }, () =>
      Array.from({ length: N_INTENTS }, randn)
    );
    const b_out = Array.from({ length: N_INTENTS }, randn);

    function textToIndices(text) {
      text = text.toLowerCase();
      const idxs = [];
      for (const ch of text) {
        const i = NEXAI_VOCAB.indexOf(ch);
        if (i >= 0) idxs.push(i);
      }
      return idxs;
    }

    function embedAverage(text) {
      const idxs = textToIndices(text);
      if (idxs.length === 0) return Array(EMBED_DIM).fill(0);
      const v = Array(EMBED_DIM).fill(0);
      for (const i of idxs) {
        for (let d = 0; d < EMBED_DIM; d++) {
          v[d] += W_embed[i][d];
        }
      }
      for (let d = 0; d < EMBED_DIM; d++) v[d] /= idxs.length;
      return v;
    }

    function relu(v) {
      return v.map(x => Math.max(0, x));
    }

    function matVec(W, v, b) {
      const out = Array(W[0].length).fill(0);
      for (let j = 0; j < W[0].length; j++) {
        let s = b ? b[j] : 0;
        for (let i = 0; i < W.length; i++) {
          s += W[i][j] * v[i];
        }
        out[j] = s;
      }
      return out;
    }

    function softmax(logits) {
      const m = Math.max(...logits);
      const exps = logits.map(x => Math.exp(x - m));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map(x => x / sum);
    }

    function nexaiInferIntents(text) {
      const emb = embedAverage(text);
      const h = relu(matVec(W_hidden, emb, b_hidden));
      const logits = matVec(W_out, h, b_out);
      return softmax(logits);
    }

    const NEXAI_INTENTS = [
      "system_help",
      "os_windows",
      "recipe",
      "definition",
      "search_help",
      "tech_general",
      "smalltalk",
      "music",
      "video",
      "shopping",
      "object_info",
      "place",
      "software",
      "web_general",
      "greeting",
      "fallback"
    ];

    const NEXAI_KB = {
      os_windows: [
        "Windows est un système d’exploitation développé par Microsoft, utilisé sur la plupart des PC.",
        "Windows, c’est le système qui gère ton PC : fichiers, programmes, interface, pilotes, etc."
      ],
      system_help: [
        "Je suis NexAI, une petite IA intégrée à NexSearch. J’analyse ta question et je te réponds au mieux.",
        "Je fonctionne avec un mini réseau de neurones + une base de connaissances codée à la main."
      ],
      recipe: [
        "Recette de cake simple : farine, œufs, sucre, beurre, levure, lait. Tu mélanges, tu enfournes ~180°C 30–40 min.",
        "Pour un cake basique : 3 œufs, 150g de sucre, 150g de beurre fondu, 200g de farine, 1 sachet de levure."
      ],
      definition: [
        "Tu me demandes une définition. Reformule avec : « c’est quoi X ? » et je vais essayer de détailler.",
        "Pour une définition claire, précise ce que tu veux : « c’est quoi Windows ? », « c’est quoi NexSearch ? », etc."
      ],
      search_help: [
        "Tu peux taper ce que tu veux dans NexSearch, je classe les résultats et je te propose des liens utiles.",
        "NexSearch essaie de détecter si tu cherches des vidéos, de la musique, des objets ou des logiciels."
      ],
      tech_general: [
        "En informatique, tout tourne autour de systèmes d’exploitation, logiciels, matériel et réseaux.",
        "Le monde numérique repose sur des OS (Windows, Linux, macOS), des navigateurs, des applis et des services en ligne."
      ],
      smalltalk: [
        "On peut discuter de tech, de Windows, de sites web, de jeux, de musique…",
        "Tu peux me poser des questions sur la technologie, les systèmes, les outils, ou juste parler."
      ],
      music: [
        "Tu sembles parler de musique. Tu peux chercher un titre ou un artiste dans NexSearch, je te proposerai YouTube, Spotify, Deezer, etc.",
        "Pour la musique, NexSearch peut t’envoyer vers YouTube, Spotify, Deezer ou Amazon Music."
      ],
      video: [
        "Tu sembles parler de vidéos. NexSearch peut te proposer YouTube, Twitch ou Bing Vidéos.",
        "Pour les vidéos, tape le nom de la chaîne, du clip ou du film, et NexSearch te proposera les bons liens."
      ],
      shopping: [
        "Tu sembles chercher un produit. NexSearch peut te proposer Amazon, Fnac, Cdiscount, AliExpress, etc.",
        "Pour acheter un objet, NexSearch peut t’envoyer vers plusieurs sites de shopping pour comparer les prix."
      ],
      object_info: [
        "Tu sembles parler d’un objet. Tu peux préciser la marque, le modèle ou l’usage pour que je t’aide mieux.",
        "Pour un objet précis, NexSearch peut te proposer des liens vers des fiches produits et des comparateurs."
      ],
      place: [
        "Tu sembles parler d’un lieu. NexSearch peut t’envoyer vers Bing Maps pour voir l’emplacement.",
        "Pour les lieux, NexSearch peut te proposer des cartes, des itinéraires et des infos locales."
      ],
      software: [
        "Tu sembles parler d’un logiciel. NexSearch peut te proposer des liens vers Microsoft, des docs ou des téléchargements.",
        "Pour les logiciels, précise le nom (par ex. Excel, Word, PowerPoint) et NexSearch te proposera les bons liens."
      ],
      web_general: [
        "Tu sembles faire une recherche générale. NexSearch peut te proposer des moteurs, des sites populaires et des outils.",
        "Pour une recherche générale, NexSearch combine plusieurs sites (Bing, Copilot, etc.) pour te donner des points de départ."
      ],
      greeting: [
        "Salut ! Tu peux me poser des questions sur Windows, la tech, les sites, les objets, la musique…",
        "Hey ! Dis-moi ce que tu veux chercher ou comprendre, et on voit ce que NexAI peut faire."
      ],
      fallback: [
        "Je ne suis pas sûr de bien comprendre. Reformule ta question ou sois un peu plus précis.",
        "Là tu me poses une colle. Essaie de détailler ce que tu veux savoir."
      ]
    };

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function nexaiClassifyIntent(text) {
      const probs = nexaiInferIntents(text);
      let bestIdx = 0;
      let bestVal = probs[0];
      for (let i = 1; i < probs.length; i++) {
        if (probs[i] > bestVal) {
          bestVal = probs[i];
          bestIdx = i;
        }
      }
      return { intent: NEXAI_INTENTS[bestIdx], confidence: bestVal };
    }

    function nexaiRuleIntentOverride(text, intent) {
      const t = text.toLowerCase();

      if (t.includes("bonjour") || t.includes("salut") || t.includes("hey")) return "greeting";
      if (t.includes("windows")) return "os_windows";
      if (t.includes("recette") || t.includes("cake") || t.includes("gâteau")) return "recipe";
      if (t.startsWith("c'est quoi") || t.startsWith("qu'est-ce que")) return "definition";
      if (t.includes("comment tu marche") || t.includes("comment tu marches") || t.includes("qui es-tu")) return "system_help";
      if (t.includes("nexsearch") || t.includes("recherche")) return "search_help";

      if (t.includes("musique") || t.includes("song") || t.includes("lyrics") || t.includes("album")) return "music";
      if (t.includes("youtube") || t.includes("vidéo") || t.includes("video") || t.includes("clip")) return "video";
      if (t.includes("acheter") || t.includes("prix") || t.includes("€")) return "shopping";
      if (t.includes("souris") || t.includes("clavier") || t.includes("casque") || t.includes("écran") || t.includes("télé") || t.includes("smartphone")) return "object_info";
      if (t.includes("adresse") || t.includes("ville") || t.includes("restaurant") || t.includes("hôtel")) return "place";
      if (t.includes("excel") || t.includes("word") || t.includes("powerpoint") || t.includes("logiciel")) return "software";

      return intent;
    }

    function nexaiAnswer(text) {
      const { intent, confidence } = nexaiClassifyIntent(text);
      const finalIntent = nexaiRuleIntentOverride(text, intent);

      let bucket = NEXAI_KB[finalIntent] || NEXAI_KB.fallback;
      let answer = pickRandom(bucket);

      const meta = `\n\n[Intent=${finalIntent}, conf=${confidence.toFixed(2)}]`;
      return answer + meta;
    }

    async function nexaiChatReply(userText) {
      return nexaiAnswer(userText);
    }

    // =========================
    // 2) NexSearch – moteur IA local
    // =========================

    // NOTE : pour ne pas exploser la taille du fichier ici,
    // je mets une base représentative. Tu peux dupliquer ce format
    // et ajouter autant de sites que tu veux (jusqu’à 1000/2000).
    const SITES_DB = [
      // Général / moteurs
      { name: "Bing", url: "https://www.bing.com/search?q={q}", tags: ["search","general"], weight: 0.9 },
      { name: "Copilot", url: "https://copilot.microsoft.com/?q={q}", tags: ["ai","assistant"], weight: 0.95 },

      // Vidéo
      { name: "YouTube", url: "https://www.youtube.com/results?search_query={q}", tags: ["video","music"], weight: 0.95 },
      { name: "Twitch", url: "https://www.twitch.tv/search?term={q}", tags: ["video","gaming","live"], weight: 0.8 },

      // Musique
      { name: "Spotify", url: "https://open.spotify.com/search/{q}", tags: ["music"], weight: 0.9 },
      { name: "Deezer", url: "https://www.deezer.com/search/{q}", tags: ["music"], weight: 0.85 },
      { name: "Amazon Music", url: "https://music.amazon.fr/search/{q}", tags: ["music","shopping"], weight: 0.8 },

      // Shopping
      { name: "Amazon", url: "https://www.amazon.fr/s?k={q}", tags: ["shopping","object"], weight: 0.95 },
      { name: "Fnac", url: "https://www.fnac.com/SearchResult/ResultList.aspx?Search={q}", tags: ["shopping","object"], weight: 0.9 },
      { name: "Cdiscount", url: "https://www.cdiscount.com/search/10/{q}.html", tags: ["shopping","object"], weight: 0.85 },
      { name: "AliExpress", url: "https://www.aliexpress.com/wholesale?SearchText={q}", tags: ["shopping","object"], weight: 0.8 },

      // Maps / images
      { name: "Bing Maps", url: "https://www.bing.com/maps?q={q}", tags: ["maps","place"], weight: 0.9 },
      { name: "Bing Images", url: "https://www.bing.com/images/search?q={q}", tags: ["images"], weight: 0.9 },

      // Microsoft / logiciels
      { name: "Microsoft", url: "https://www.microsoft.com/search?q={q}", tags: ["microsoft","software"], weight: 0.9 },
      { name: "Excel", url: "https://www.microsoft.com/search?q=Excel", tags: ["microsoft","excel","software"], weight: 1.0 },
      { name: "Word", url: "https://www.microsoft.com/search?q=Word", tags: ["microsoft","word","software"], weight: 0.95 },
      { name: "PowerPoint", url: "https://www.microsoft.com/search?q=PowerPoint", tags: ["microsoft","powerpoint","software"], weight: 0.95 },

      // Réseaux sociaux (exemples)
      { name: "X (Twitter)", url: "https://twitter.com/search?q={q}", tags: ["social","news"], weight: 0.8 },
      { name: "Facebook", url: "https://www.facebook.com/search/top?q={q}", tags: ["social"], weight: 0.7 },
      { name: "Instagram", url: "https://www.instagram.com/explore/tags/{q}/", tags: ["social","images"], weight: 0.7 },
      { name: "Reddit", url: "https://www.reddit.com/search/?q={q}", tags: ["social","forum"], weight: 0.8 },

      // Tech / dev (exemples)
      { name: "GitHub", url: "https://github.com/search?q={q}", tags: ["dev","code"], weight: 0.9 },
      { name: "Stack Overflow", url: "https://stackoverflow.com/search?q={q}", tags: ["dev","questions"], weight: 0.9 },
      { name: "MDN Web Docs", url: "https://developer.mozilla.org/fr/search?q={q}", tags: ["dev","docs"], weight: 0.85 },

      // Jeux (exemples)
      { name: "Steam", url: "https://store.steampowered.com/search/?term={q}", tags: ["games","shopping"], weight: 0.85 },
      { name: "Epic Games Store", url: "https://store.epicgames.com/fr/browse?q={q}", tags: ["games","shopping"], weight: 0.8 },

      // News (exemples)
      { name: "Le Monde", url: "https://www.lemonde.fr/recherche/?search_keywords={q}", tags: ["news"], weight: 0.7 },
      { name: "Le Figaro", url: "https://recherche.lefigaro.fr/recherche/{q}", tags: ["news"], weight: 0.7 },
      { name: "France Info", url: "https://www.francetvinfo.fr/recherche/?query={q}", tags: ["news"], weight: 0.7 },

      // Outils (exemples)
      { name: "Google Drive", url: "https://drive.google.com/drive/search?q={q}", tags: ["cloud","files"], weight: 0.7 },
      { name: "OneDrive", url: "https://onedrive.live.com/?q={q}", tags: ["cloud","files"], weight: 0.7 },

      // etc. → tu peux continuer à ajouter des sites ici
    ];

    // Pour atteindre 1000+ sites, duplique ce format :
    // { name: "Nom", url: "https://...", tags: ["tag1","tag2"], weight: 0.8 },

    function detectQueryType(q) {
      const t = q.toLowerCase();

      const isVideo =
        t.includes("clip") || t.includes("trailer") || t.includes("official video") ||
        t.includes("youtube") || t.includes("youtuber") || t.includes("vidéo") || t.includes("video");

      const isMusic =
        t.includes("song") || t.includes("musique") || t.includes("lyrics") ||
        t.includes("album") || t.includes("single") || t.includes("feat");

      const isObject =
        t.includes("acheter") || t.includes("prix") || t.includes("€") ||
        t.includes("souris") || t.includes("clavier") || t.includes("casque") ||
        t.includes("pc") || t.includes("écran") || t.includes("télé") ||
        t.includes("smartphone") || t.includes("chargeur") || t.includes("ordinateur");

      const isPlace =
        t.includes("près de") || t.includes("near me") || t.includes("adresse") ||
        t.includes("ville") || t.includes("restaurant") || t.includes("hôtel");

      const isMicrosoft =
        t.includes("windows") || t.includes("office") || t.includes("excel") ||
        t.includes("word") || t.includes("powerpoint") || t.includes("onenote") ||
        t.includes("microsoft");

      return { isVideo, isMusic, isObject, isPlace, isMicrosoft };
    }

    function scoreSiteForQuery(site, q, typeInfo) {
      const t = q.toLowerCase();
      let score = site.weight || 0.5;

      if (site.name.toLowerCase() === t) score += 0.5;
      if (site.name.toLowerCase().includes(t)) score += 0.3;

      if (typeInfo.isVideo && site.tags.includes("video")) score += 0.6;
      if (typeInfo.isMusic && site.tags.includes("music")) score += 0.6;
      if (typeInfo.isObject && site.tags.includes("shopping")) score += 0.6;
      if (typeInfo.isPlace && site.tags.includes("maps")) score += 0.6;
      if (typeInfo.isMicrosoft && site.tags.includes("microsoft")) score += 0.6;

      score += (Math.random() - 0.5) * 0.1;

      return score;
    }

    function buildResultsForQuery(q) {
      const typeInfo = detectQueryType(q);

      const scored = SITES_DB.map(site => ({
        site,
        score: scoreSiteForQuery(site, q, typeInfo)
      }));

      scored.sort((a, b) => b.score - a.score);

      return { typeInfo, results: scored.slice(0, 12).map(entry => {
        const url = entry.site.url.replace("{q}", encodeURIComponent(q));
        return {
          name: entry.site.name,
          url,
          tags: entry.site.tags,
          score: entry.score
        };
      })};
    }

    function buildActionButtons(q, typeInfo) {
      const buttons = [];

      buttons.push({ label: "Voir sur Bing", url: "https://www.bing.com/search?q=" + encodeURIComponent(q) });
      buttons.push({ label: "Copilot Search", url: "https://copilot.microsoft.com/?q=" + encodeURIComponent(q) });

      buttons.push({ label: "Images", url: "https://www.bing.com/images/search?q=" + encodeURIComponent(q) });
      buttons.push({ label: "Maps", url: "https://www.bing.com/maps?q=" + encodeURIComponent(q) });

      if (typeInfo.isVideo || typeInfo.isMusic) {
        buttons.push({ label: "YouTube", url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(q) });
      }
      if (typeInfo.isMusic) {
        buttons.push({ label: "Spotify", url: "https://open.spotify.com/search/" + encodeURIComponent(q) });
        buttons.push({ label: "Deezer", url: "https://www.deezer.com/search/" + encodeURIComponent(q) });
        buttons.push({ label: "Amazon Music", url: "https://music.amazon.fr/search/" + encodeURIComponent(q) });
      }
      if (typeInfo.isObject) {
        buttons.push({ label: "Amazon", url: "https://www.amazon.fr/s?k=" + encodeURIComponent(q) });
        buttons.push({ label: "Fnac", url: "https://www.fnac.com/SearchResult/ResultList.aspx?Search=" + encodeURIComponent(q) });
        buttons.push({ label: "Cdiscount", url: "https://www.cdiscount.com/search/10/" + encodeURIComponent(q) + ".html" });
        buttons.push({ label: "AliExpress", url: "https://www.aliexpress.com/wholesale?SearchText=" + encodeURIComponent(q) });
      }

      return buttons;
    }

    // =========================
    // 3) Intégration UI
    // =========================

    function appendNexAIMsg(text, from) {
      const log = document.getElementById("nexai-log");
      const div = document.createElement("div");
      div.className = "nexai-msg " + (from === "user" ? "nexai-msg-user" : "nexai-msg-ai");
      div.textContent = (from === "user" ? "Tu: " : "NexAI: ") + text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function runNexSearch(q) {
      const { typeInfo, results } = buildResultsForQuery(q);
      const actions = buildActionButtons(q, typeInfo);

      const metaDiv = document.getElementById("results-meta");
      metaDiv.textContent = `Requête : "${q}" – type détecté : `
        + (typeInfo.isVideo ? "vidéo " : "")
        + (typeInfo.isMusic ? "musique " : "")
        + (typeInfo.isObject ? "objet " : "")
        + (typeInfo.isPlace ? "lieu " : "")
        + (typeInfo.isMicrosoft ? "Microsoft " : "");

      const listDiv = document.getElementById("results-list");
      listDiv.innerHTML = "";
      results.forEach(r => {
        const item = document.createElement("div");
        item.className = "result-item";

        const title = document.createElement("div");
        title.className = "result-item-title";
        title.textContent = r.name;

        const url = document.createElement("div");
        url.className = "result-item-url";
        url.textContent = r.url;

        const tags = document.createElement("div");
        tags.className = "result-item-tags";
        tags.textContent = "Tags : " + r.tags.join(", ") + ` | score=${r.score.toFixed(2)}`;

        item.appendChild(title);
        item.appendChild(url);
        item.appendChild(tags);

        item.onclick = () => {
          window.open(r.url, "_blank");
        };

        listDiv.appendChild(item);
      });

      const actionsDiv = document.getElementById("results-actions");
      actionsDiv.innerHTML = "";
      actions.forEach(b => {
        const btn = document.createElement("button");
        btn.className = "action-btn";
        btn.textContent = b.label;
        btn.onclick = () => window.open(b.url, "_blank");
        actionsDiv.appendChild(btn);
      });
    }

    function initUI() {
      const searchInput = document.getElementById("search-input");
      const searchBtn = document.getElementById("search-btn");
      const nexaiInput = document.getElementById("nexai-input");
      const nexaiSend = document.getElementById("nexai-send");

      searchBtn.onclick = () => {
        const q = searchInput.value.trim();
        if (!q) return;
        runNexSearch(q);
      };
      searchInput.onkeydown = e => {
        if (e.key === "Enter") searchBtn.click();
      };

      nexaiSend.onclick = async () => {
        const msg = nexaiInput.value.trim();
        if (!msg) return;
        nexaiInput.value = "";
        appendNexAIMsg(msg, "user");
        const reply = await nexaiChatReply(msg);
        appendNexAIMsg(reply, "ai");
      };
      nexaiInput.onkeydown = e => {
        if (e.key === "Enter") nexaiSend.click();
      };
    }

    window.addEventListener("DOMContentLoaded", initUI);
  </script>
</body>
</html>
