<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche NexSearch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-main: #02040a;
      --bg-panel: #050816;
      --border-panel: #111827;
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --text-soft: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #020617;
      color: var(--text-main);
      overflow-x: hidden;
    }

    #app {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 14px;
      background: #020617;
      border-bottom: 1px solid #111827;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-main {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8 60%, #020617 100%);
      box-shadow: 0 0 14px rgba(37,99,235,0.9);
      position: relative;
    }

    .logo-main::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(15,23,42,0.9);
      box-shadow: inset 0 0 8px rgba(15,23,42,0.9);
    }

    .logo-text {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .nexai-toggle {
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .nexai-toggle:hover {
      background: #0b1120;
      border-color: var(--accent);
    }

    /* Layout principal */
    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(0, 1.7fr) minmax(0, 1fr);
      gap: 10px;
      padding: 10px 14px 80px 14px;
      position: relative;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 8px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #bfdbfe;
    }

    .panel-sub {
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    /* Résultats */
    .results-panel {
      overflow: hidden;
    }

    #results-meta {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    #results-summary {
      margin-bottom: 6px;
      padding: 6px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #1f2937;
      font-size: 0.82rem;
      max-height: 110px;
      overflow-y: auto;
    }

    #results-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 6px;
    }

    .result-item-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .result-item {
      display: flex;
      gap: 8px;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid #111827;
      background: #020617;
      margin-bottom: 5px;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease, box-shadow 0.12s ease;
      cursor: pointer;
    }

    .result-item:hover {
      background: #02081a;
      border-color: #2563eb;
      transform: translateY(-1px);
      box-shadow: 0 0 0 1px rgba(37,99,235,0.4);
    }

    .result-favicon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #e5e7eb;
      flex-shrink: 0;
      overflow: hidden;
    }

    .result-favicon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    .result-content {
      flex: 1;
      min-width: 0;
    }

    .result-item-title {
      font-weight: 600;
      color: #bfdbfe;
      font-size: 0.88rem;
      margin-bottom: 1px;
    }

    .result-item-url {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-bottom: 1px;
      word-break: break-all;
    }

    .result-item-tags {
      font-size: 0.7rem;
      color: var(--text-soft);
    }

    /* Actions globales */
    .results-actions-wrapper {
      border-top: 1px solid #111827;
      padding-top: 4px;
    }

    .actions-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .action-btn {
      padding: 5px 9px;
      border-radius: 4px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.78rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn:hover {
      background: #0b1120;
      border-color: #2563eb;
    }

    /* NexAI volet latéral dépliant */
    .nexai-panel-wrapper {
      position: relative;
    }

    .nexai-panel {
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      max-width: 360px;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-panel);
      box-shadow: -10px 0 30px rgba(0,0,0,0.7);
      transform: translateX(100%);
      transition: transform 0.18s ease-out;
      display: flex;
      flex-direction: column;
      padding: 8px;
      z-index: 10;
    }

    .nexai-panel.open {
      transform: translateX(0);
    }

    .nexai-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .nexai-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #bfdbfe;
    }

    .nexai-close {
      border: none;
      background: transparent;
      color: var(--text-soft);
      cursor: pointer;
      font-size: 0.9rem;
    }

    .nexai-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
      padding-bottom: 60px;
    }

    #nexai-summary {
      padding: 6px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #1d4ed8;
      font-size: 0.82rem;
      max-height: 90px;
      overflow-y: auto;
      color: #dbeafe;
    }

    #nexai-log {
      flex: 1;
      overflow-y: auto;
      border-radius: 6px;
      border: 1px solid #111827;
      background: #020617;
      padding: 6px;
      font-size: 0.82rem;
    }

    .nexai-msg {
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    .nexai-msg-user {
      color: #93c5fd;
    }

    .nexai-msg-ai {
      color: #e5f2ff;
    }

    .nexai-input-row {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 10px;
      display: flex;
      gap: 6px;
      padding: 6px 8px;
      border-radius: 8px;
      border: 1px solid #1f2937;
      background: rgba(2,6,23,0.96);
      box-shadow: 0 10px 25px rgba(0,0,0,0.9);
      backdrop-filter: blur(10px);
      z-index: 15;
    }

    .nexai-input-row input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.82rem;
    }

    .nexai-input-row button {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      background: var(--accent);
      color: #f9fafb;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .nexai-input-row button:hover {
      filter: brightness(1.05);
    }

    /* Barre de recherche en bas */
    .bottom-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 8px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    .bottom-bar {
      width: min(900px, 100% - 24px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 8px;
      background: #020617;
      border: 1px solid #111827;
      box-shadow: 0 12px 30px rgba(0,0,0,0.9);
      pointer-events: auto;
    }

    .bottom-logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8 60%, #020617 100%);
      box-shadow: 0 0 14px rgba(37,99,235,0.9);
      cursor: pointer;
      position: relative;
    }

    .bottom-logo::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1px solid rgba(15,23,42,0.9);
      box-shadow: inset 0 0 8px rgba(15,23,42,0.9);
    }

    .bottom-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #020617;
      border-radius: 4px;
      padding: 3px 6px;
      border: 1px solid #1f2937;
    }

    .bottom-input input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: 0.86rem;
    }

    .bottom-input button {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      background: var(--accent);
      color: #f9fafb;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
    }

    .bottom-input button:hover {
      filter: brightness(1.05);
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: minmax(0, 1fr);
        padding-bottom: 90px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="top-bar">
      <div class="top-left" id="home-link-top">
        <div class="logo-main"></div>
        <div class="logo-text">NexSearch</div>
      </div>
      <div class="top-right">
        <button class="nexai-toggle" id="nexai-toggle-btn">NexAI</button>
      </div>
    </header>

    <!-- Layout principal -->
    <main class="main-layout">
      <!-- Panel résultats -->
      <section class="panel results-panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">Résultats</div>
            <div class="panel-sub">Sites filtrés selon votre requête</div>
          </div>
        </div>

        <div id="results-meta"></div>
        <div id="results-summary"></div>
        <div id="results-list"></div>

        <div class="results-actions-wrapper">
          <div style="font-size:0.78rem;color:#9ca3af;margin-bottom:2px;">Actions rapides</div>
          <div id="results-actions" class="actions-bar"></div>
        </div>
      </section>

      <!-- Volet NexAI (dépliant) -->
      <section class="nexai-panel-wrapper">
        <div class="nexai-panel" id="nexai-panel">
          <div class="nexai-header">
            <div class="nexai-title">NexAI</div>
            <button class="nexai-close" id="nexai-close-btn">✕</button>
          </div>
          <div class="nexai-body">
            <div id="nexai-summary"></div>
            <div id="nexai-log"></div>
            <div class="nexai-input-row">
              <input id="nexai-input" type="text" placeholder="Parler avec NexAI... (ex : explique Word, calcule 42*13)">
              <button id="nexai-send">Envoyer</button>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Barre de recherche en bas -->
    <div class="bottom-dock">
      <div class="bottom-bar">
        <div class="bottom-logo" id="home-link-bottom"></div>
        <div class="bottom-input">
          <input id="search-input" type="text" placeholder="Rechercher avec NexSearch (abréviations, fautes, tout accepté)...">
          <button id="search-btn">Rechercher</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // 1) Utilitaires
    // =========================
    function normalizeText(str) {
      return str
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function levenshtein(a, b) {
      const m = a.length;
      const n = b.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[m][n];
    }

    // =========================
    // 2) Abréviations / corrections avancées
    // =========================
    const ADVANCED_ABBREV_MAP = {
      "ms": "microsoft",
      "msoft": "microsoft",
      "mivkoft": "microsoft",
      "microsof": "microsoft",
      "microsft": "microsoft",
      "win": "windows",
      "w11": "windows 11",
      "yt": "youtube",
      "youtub": "youtube",
      "ytb": "youtube",
      "spoti": "spotify",
      "deeze": "deezer",
      "amz": "amazon",
      "amazn": "amazon",
      "fnc": "fnac",
      "cdisc": "cdiscount",
      "ali": "aliexpress",
      "gh": "github",
      "so": "stack overflow",
      "mdn": "mdn web docs",
      "tw": "twitter",
      "x": "twitter",
      "ig": "instagram",
      "fb": "facebook"
    };

    const ADVANCED_CANONICAL = [
      "microsoft",
      "windows",
      "word",
      "office",
      "copilot",
      "youtube",
      "spotify",
      "deezer",
      "amazon",
      "fnac",
      "cdiscount",
      "aliexpress",
      "github",
      "stack overflow",
      "mdn web docs",
      "twitter",
      "instagram",
      "facebook",
      "bing"
    ];

    function advancedNormalizeQuery(q) {
      const original = q;
      let norm = normalizeText(q);
      const tokens = norm.split(" ");
      const outTokens = [];

      for (let tok of tokens) {
        if (!tok) continue;

        if (ADVANCED_ABBREV_MAP[tok]) {
          outTokens.push(ADVANCED_ABBREV_MAP[tok]);
          continue;
        }

        let best = tok;
        let bestDist = Infinity;
        for (const cand of ADVANCED_CANONICAL) {
          const d = levenshtein(tok, cand);
          if (d < bestDist) {
            bestDist = d;
            best = cand;
          }
        }
        if (bestDist <= 2 && best !== tok) {
          outTokens.push(best);
        } else {
          outTokens.push(tok);
        }
      }

      const corrected = outTokens.join(" ");
      return { original, normalized: corrected };
    }

    // =========================
    // 3) NexAI – mini LLM simulée
    // =========================
    const NEXAI_MEMORY = {
      lastQuery: null,
      lastType: null
    };

    function tryCalcExpression(expr) {
      try {
        if (!/^[0-9+\-*/().,%\s]+$/.test(expr)) return null;
        const safe = expr.replace(/%/g, "/100");
        const result = Function('"use strict";return (' + safe + ')')();
        if (typeof result === "number" && isFinite(result)) {
          return result;
        }
        return null;
      } catch {
        return null;
      }
    }

    function nexaiDetectIntent(text) {
      const t = normalizeText(text);
      const isCalc = /[0-9]/.test(text) && /[+\-*/]/.test(text);
      const isHello = t.includes("bonjour") || t.includes("salut") || t.includes("hey");
      const isExplain = t.startsWith("explique") || t.includes("explique moi") || t.includes("c est quoi") || t.includes("qu est ce que");
      const isHelp = t.includes("aide") || t.includes("comment utiliser") || t.includes("comment marche");
      const isSearch = t.includes("recherche") || t.includes("nexsearch");
      return { isCalc, isHello, isExplain, isHelp, isSearch };
    }

    function nexaiAnswer(userText) {
      const trimmed = userText.trim();
      const calcRes = tryCalcExpression(trimmed);
      const intent = nexaiDetectIntent(trimmed);

      if (calcRes !== null && intent.isCalc) {
        return `Le résultat de votre calcul est ${calcRes}. Vous pouvez enchaîner avec un autre calcul ou une question sur un site.`;
      }

      if (intent.isHello) {
        return "Bonjour ! Vous pouvez me demander d’expliquer un site (Word, Microsoft, Amazon…), de résumer votre recherche actuelle ou de faire un calcul rapide.";
      }

      if (intent.isExplain) {
        const after = trimmed
          .replace(/^explique moi/i, "")
          .replace(/^explique/i, "")
          .replace(/^c est quoi/i, "")
          .replace(/^qu est ce que/i, "")
          .trim();
        if (after) {
          return `Vous souhaitez une explication sur « ${after} ». En général, je peux vous donner : une définition simple, à quoi cela sert, et dans quel contexte vous le verrez apparaître dans les résultats de NexSearch.`;
        }
        return "Vous pouvez me demander : « Explique Word », « C’est quoi Copilot ? », « Qu’est-ce que NexSearch ? », etc.";
      }

      if (intent.isHelp) {
        return "NexSearch accepte les fautes et les abréviations (ms → Microsoft, yt → YouTube, amz → Amazon…). Tapez simplement ce que vous avez en tête, je corrige, j’analyse le type de recherche et j’organise les sites les plus pertinents. Vous pouvez ensuite me demander un résumé ou une explication.";
      }

      if (intent.isSearch) {
        return "Pour lancer une recherche, utilisez la barre en bas de l’écran. Vous pouvez taper un site, un produit, un sujet ou même une expression approximative : je corrigerai et filtrerai les sites pour ne garder que ceux qui ont du sens.";
      }

      if (NEXAI_MEMORY.lastQuery) {
        return `Par rapport à votre dernière recherche « ${NEXAI_MEMORY.lastQuery} », vous pouvez me demander un résumé plus détaillé, une explication d’un site précis (Word, Microsoft, Copilot, Amazon…) ou un calcul lié (par exemple un prix total ou une remise).`;
      }

      return "Je ne suis pas certain de ce que vous attendez. Donnez-moi un mot‑clé (Word, Microsoft, Amazon…), une question (« explique Word ») ou un calcul, et je vous répondrai de manière adaptée.";
    }

    async function nexaiChatReply(userText) {
      // Mini LLM simulée : détection d’intention + contexte + génération de texte fluide
      return nexaiAnswer(userText);
    }

    function nexaiBuildSummaryForResults(q, correctedQ, results, calcResult) {
      if (!q.trim()) {
        return "Tapez une requête en bas, même avec des abréviations ou des fautes : je corrige, je filtre les sites et je vous donne un aperçu rapide.";
      }

      if (calcResult !== null) {
        return `Votre requête ressemble à un calcul. Résultat : ${calcResult}. Vous pouvez maintenant lancer une recherche sur un site ou un produit si vous le souhaitez.`;
      }

      if (!results.length) {
        return `Requête analysée : « ${correctedQ} ». Aucun site très pertinent n’a été trouvé dans la base actuelle. Essayez de préciser un peu votre demande (par exemple « Microsoft Word », « Word téléchargement », « Word tutoriel »).`;
      }

      const names = results.slice(0, 4).map(r => r.name);
      const uniqueNames = [...new Set(names)];
      let desc = `Requête analysée : « ${correctedQ} ». J’ai sélectionné principalement : ${uniqueNames.join(", ")}. `;

      if (correctedQ.includes("word")) {
        desc += "Word est le traitement de texte de la suite Microsoft Office. Vous verrez surtout des liens vers Microsoft et la documentation associée.";
      } else if (correctedQ.includes("microsoft")) {
        desc += "Microsoft regroupe Windows, Office, Xbox et d’autres services. Les liens proposés pointent vers l’écosystème Microsoft et les ressources utiles.";
      } else if (correctedQ.includes("copilot")) {
        desc += "Copilot est un assistant IA de Microsoft. Les liens mettent en avant l’accès à Copilot et la documentation.";
      } else if (correctedQ.includes("amazon")) {
        desc += "Amazon est une plateforme de e‑commerce. Les liens proposés sont orientés shopping et produits.";
      } else {
        desc += "Les sites affichés sont filtrés pour rester cohérents avec votre requête, sans résultats hors sujet.";
      }

      return desc;
    }

    // =========================
    // 4) NexSearch – base de sites + filtrage strict
    // =========================
    const SITES_DB = [
      // Microsoft / Office / Word / Copilot
      { name: "Microsoft", url: "https://www.microsoft.com/search?q={q}", tags: ["microsoft","office","windows"], weight: 0.98, favicon: "https://www.microsoft.com/favicon.ico" },
      { name: "Microsoft Word", url: "https://www.microsoft.com/search?q=word%20{q}", tags: ["word","office","microsoft"], weight: 0.99, favicon: "https://www.microsoft.com/favicon.ico" },
      { name: "Office.com", url: "https://www.office.com/search?auth=1&query={q}", tags: ["office","word","microsoft"], weight: 0.96, favicon: "https://www.office.com/favicon.ico" },
      { name: "Microsoft Copilot", url: "https://copilot.microsoft.com/?q={q}", tags: ["copilot","ai","microsoft"], weight: 0.97, favicon: "https://copilot.microsoft.com/favicon.ico" },

      // Dev / docs
      { name: "GitHub", url: "https://github.com/search?q={q}", tags: ["dev","code"], weight: 0.9, favicon: "https://github.githubassets.com/favicons/favicon.png" },
      { name: "Stack Overflow", url: "https://stackoverflow.com/search?q={q}", tags: ["dev","questions"], weight: 0.88, favicon: "https://cdn.sstatic.net/Sites/stackoverflow/Img/favicon.ico" },
      { name: "MDN Web Docs", url: "https://developer.mozilla.org/fr/search?q={q}", tags: ["dev","docs"], weight: 0.86, favicon: "https://developer.mozilla.org/favicon-32x32.cbbd161b.png" },

      // Shopping
      { name: "Amazon", url: "https://www.amazon.fr/s?k={q}", tags: ["shopping","amazon"], weight: 0.9, favicon: "https://www.amazon.fr/favicon.ico" },
      { name: "Fnac", url: "https://www.fnac.com/SearchResult/ResultList.aspx?Search={q}", tags: ["shopping","fnac"], weight: 0.86, favicon: "https://www.fnac.com/favicon.ico" },
      { name: "Cdiscount", url: "https://www.cdiscount.com/search/10/{q}.html", tags: ["shopping","cdiscount"], weight: 0.84, favicon: "https://www.cdiscount.com/favicon-32x32.png" },

      // Général
      { name: "Bing", url: "https://www.bing.com/search?q={q}", tags: ["search","general"], weight: 0.8, favicon: "https://www.bing.com/sa/simg/favicon-2x.ico" }
      // → extensible vers beaucoup plus de sites, mais filtrés par tags
    ];

    function detectQueryType(q) {
      const t = normalizeText(q);
      const isWord = t.includes("word");
      const isMicrosoft = t.includes("microsoft") || t.includes("windows") || t.includes("office");
      const isCopilot = t.includes("copilot");
      const isAmazon = t.includes("amazon");
      const isDev = t.includes("github") || t.includes("code") || t.includes("dev") || t.includes("programmation");
      return { isWord, isMicrosoft, isCopilot, isAmazon, isDev };
    }

    function isSiteRelevant(site, q, typeInfo, correctedQ) {
      const t = normalizeText(correctedQ);
      const nameNorm = normalizeText(site.name);
      const tags = site.tags || [];

      // Match direct sur le nom ou les tags
      const directMatch =
        nameNorm.includes(t) ||
        t.includes(nameNorm) ||
        tags.some(tag => t.includes(tag));

      // Règles spécifiques
      if (typeInfo.isWord) {
        return tags.includes("word") || tags.includes("office") || tags.includes("microsoft");
      }
      if (typeInfo.isMicrosoft) {
        return tags.includes("microsoft") || tags.includes("office") || tags.includes("windows") || tags.includes("word") || tags.includes("copilot");
      }
      if (typeInfo.isCopilot) {
        return tags.includes("copilot") || tags.includes("microsoft");
      }
      if (typeInfo.isAmazon) {
        return tags.includes("amazon") || tags.includes("shopping");
      }
      if (typeInfo.isDev) {
        return tags.includes("dev") || tags.includes("docs") || tags.includes("questions");
      }

      // Sinon, on reste strict : nom ou tag doit coller
      return directMatch;
    }

    function buildResultsForQuery(q) {
      const { normalized: correctedQ } = advancedNormalizeQuery(q);
      const typeInfo = detectQueryType(correctedQ);

      const relevant = SITES_DB.filter(site => isSiteRelevant(site, q, typeInfo, correctedQ));

      const scored = relevant.map(site => {
        const t = normalizeText(correctedQ);
        let score = site.weight || 0.5;
        const nameNorm = normalizeText(site.name);
        if (nameNorm === t) score += 0.5;
        if (nameNorm.includes(t) || t.includes(nameNorm)) score += 0.3;
        return { site, score };
      });

      scored.sort((a, b) => b.score - a.score);

      return {
        typeInfo,
        correctedQ,
        results: scored.map(entry => {
          const url = entry.site.url.replace("{q}", encodeURIComponent(correctedQ));
          return {
            name: entry.site.name,
            url,
            tags: entry.site.tags,
            score: entry.score,
            favicon: entry.site.favicon
          };
        })
      };
    }

    function buildActionButtons(q, typeInfo, correctedQ) {
      const buttons = [];
      buttons.push({ label: "Voir sur Bing", url: "https://www.bing.com/search?q=" + encodeURIComponent(correctedQ) });

      if (typeInfo.isMicrosoft || typeInfo.isWord || typeInfo.isCopilot) {
        buttons.push({ label: "Microsoft", url: "https://www.microsoft.com/search?q=" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Copilot", url: "https://copilot.microsoft.com/?q=" + encodeURIComponent(correctedQ) });
      }
      if (typeInfo.isAmazon) {
        buttons.push({ label: "Amazon", url: "https://www.amazon.fr/s?k=" + encodeURIComponent(correctedQ) });
      }
      if (typeInfo.isDev) {
        buttons.push({ label: "GitHub", url: "https://github.com/search?q=" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Stack Overflow", url: "https://stackoverflow.com/search?q=" + encodeURIComponent(correctedQ) });
      }

      return buttons;
    }

    // =========================
    // 5) Intégration UI
    // =========================
    function appendNexAIMsg(text, from) {
      const log = document.getElementById("nexai-log");
      const div = document.createElement("div");
      div.className = "nexai-msg " + (from === "user" ? "nexai-msg-user" : "nexai-msg-ai");
      div.textContent = (from === "user" ? "Vous : " : "NexAI : ") + text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function runNexSearch(q) {
      if (!q.trim()) return;

      const calcRes = tryCalcExpression(q);
      const { typeInfo, correctedQ, results } = buildResultsForQuery(q);
      const actions = buildActionButtons(q, typeInfo, correctedQ);

      NEXAI_MEMORY.lastQuery = correctedQ;
      NEXAI_MEMORY.lastType = typeInfo;

      const metaDiv = document.getElementById("results-meta");
      metaDiv.textContent = `Requête : "${q}"` + (correctedQ !== q ? ` → corrigée en : "${correctedQ}"` : "");

      const summaryDiv = document.getElementById("results-summary");
      summaryDiv.textContent = nexaiBuildSummaryForResults(q, correctedQ, results, calcRes);

      const listDiv = document.getElementById("results-list");
      listDiv.innerHTML = "";
      results.forEach(r => {
        const linkWrapper = document.createElement("a");
        linkWrapper.className = "result-item-link";
        linkWrapper.href = r.url;
        linkWrapper.target = "_blank";
        linkWrapper.rel = "noopener noreferrer";

        const item = document.createElement("div");
        item.className = "result-item";

        const fav = document.createElement("div");
        fav.className = "result-favicon";
        if (r.favicon) {
          const img = document.createElement("img");
          img.src = r.favicon;
          img.alt = r.name;
          img.onerror = () => {
            img.style.display = "none";
            fav.textContent = r.name[0] || "?";
          };
          fav.appendChild(img);
        } else {
          fav.textContent = r.name[0] || "?";
        }

        const content = document.createElement("div");
        content.className = "result-content";

        const title = document.createElement("div");
        title.className = "result-item-title";
        title.textContent = r.name;

        const url = document.createElement("div");
        url.className = "result-item-url";
        url.textContent = r.url;

        const tags = document.createElement("div");
        tags.className = "result-item-tags";
        tags.textContent = "Tags : " + r.tags.join(", ");

        content.appendChild(title);
        content.appendChild(url);
        content.appendChild(tags);

        item.appendChild(fav);
        item.appendChild(content);
        linkWrapper.appendChild(item);

        listDiv.appendChild(linkWrapper);
      });

      const actionsDiv = document.getElementById("results-actions");
      actionsDiv.innerHTML = "";
      actions.forEach(b => {
        const btn = document.createElement("button");
        btn.className = "action-btn";
        btn.textContent = b.label;
        btn.onclick = () => window.open(b.url, "_blank");
        actionsDiv.appendChild(btn);
      });

      const nexaiSummary = document.getElementById("nexai-summary");
      nexaiSummary.textContent = nexaiBuildSummaryForResults(q, correctedQ, results, calcRes);
    }

    function initUI() {
      const searchInput = document.getElementById("search-input");
      const searchBtn = document.getElementById("search-btn");
      const nexaiInput = document.getElementById("nexai-input");
      const nexaiSend = document.getElementById("nexai-send");
      const homeTop = document.getElementById("home-link-top");
      const homeBottom = document.getElementById("home-link-bottom");
      const nexaiPanel = document.getElementById("nexai-panel");
      const nexaiToggleBtn = document.getElementById("nexai-toggle-btn");
      const nexaiCloseBtn = document.getElementById("nexai-close-btn");

      const goHome = () => {
        window.location.href = "./index.html";
      };

      homeTop.onclick = goHome;
      homeBottom.onclick = goHome;

      searchBtn.onclick = () => {
        const q = searchInput.value.trim();
        if (!q) return;
        runNexSearch(q);
      };
      searchInput.onkeydown = e => {
        if (e.key === "Enter") searchBtn.click();
      };

      nexaiSend.onclick = async () => {
        const msg = nexaiInput.value.trim();
        if (!msg) return;
        nexaiInput.value = "";
        appendNexAIMsg(msg, "user");
        const reply = await nexaiChatReply(msg);
        appendNexAIMsg(reply, "ai");
      };
      nexaiInput.onkeydown = e => {
        if (e.key === "Enter") nexaiSend.click();
      };

      nexaiToggleBtn.onclick = () => {
        nexaiPanel.classList.add("open");
      };
      nexaiCloseBtn.onclick = () => {
        nexaiPanel.classList.remove("open");
      };

      document.getElementById("nexai-summary").textContent =
        "Tapez une requête en bas, je corrige, je filtre les sites pour ne garder que les plus pertinents et je vous donne un aperçu rapide.";

      // Recherche auto si ?q=... dans l’URL
      const params = new URLSearchParams(window.location.search);
      const qParam = params.get("q");
      if (qParam) {
        searchInput.value = qParam;
        runNexSearch(qParam);
      }
    }

    window.addEventListener("DOMContentLoaded", initUI);
  </script>
</body>
