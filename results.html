<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>NexSearch – Résultats</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon Copilot+ -->
  <link rel="icon" type="image/png" href="https://microsoft-edge77.github.io/NexSearchAssets/favicon-copilot-blue.png">

  <style>
    :root{
      --bg:#05060a;
      --card:#0f1220;
      --card-soft:#141728;
      --accent:#4b7dff;
      --accent-soft:#7fd0ff;
      --text:#e5f0ff;
      --sub:#9fb7ff;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
      font-family:Segoe UI,system-ui,-apple-system,sans-serif;
      overflow:hidden; /* pas de scrollbar globale */
    }
    header{
      height:52px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:20px;
      font-weight:600;
      color:var(--text);
    }
    .layout{
      display:flex;
      height:calc(100vh - 52px - 56px); /* header + bottom bar */
      width:100%;
      overflow:hidden;
    }
    main{
      flex:1;
      padding:10px 12px;
      max-width:1100px;
      margin:0 auto;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow-y:auto;
      scrollbar-width:none;
    }
    main::-webkit-scrollbar{display:none}

    .card{
      background:var(--card);
      border-radius:16px;
      padding:14px 16px;
      backdrop-filter:blur(18px);
      box-shadow:0 18px 40px rgba(0,0,0,0.55);
      transition:transform .18s ease,box-shadow .18s ease,background .18s ease;
    }
    .card:hover{
      transform:translateY(-1px);
      box-shadow:0 22px 50px rgba(0,0,0,0.7);
      background:var(--card-soft);
    }
    .card-title{
      font-size:16px;
      font-weight:600;
      margin-bottom:4px;
    }
    .card-sub{
      font-size:12px;
      color:var(--sub);
      margin-bottom:6px;
    }

    #aiSummary{
      font-size:14px;
      line-height:1.6;
    }

    #resultsList{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:4px;
    }
    .result-item{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:9px 11px;
      border-radius:12px;
      background:#0a0c14;
      cursor:pointer;
      transition:transform .15s ease,box-shadow .15s ease,background .15s ease;
    }
    .result-item:hover{
      transform:translateY(-1px);
      box-shadow:0 10px 26px rgba(0,0,0,0.6);
      background:#111425;
    }
    .result-logo{
      width:26px;
      height:26px;
      border-radius:50%;
      background:#111;
      flex-shrink:0;
    }
    .result-main{flex:1}
    .result-title{
      font-size:14px;
      font-weight:600;
      color:var(--accent-soft);
    }
    .result-url{
      font-size:11px;
      color:#7fa4ff;
      margin-top:1px;
      word-break:break-all;
    }
    .result-desc{
      font-size:12px;
      color:#c7d6ff;
      margin-top:3px;
    }

    #tabs{
      display:flex;
      justify-content:center;
      gap:16px;
      margin-top:6px;
    }
    #tabs a{
      font-size:13px;
      color:var(--sub);
      text-decoration:none;
      transition:color .15s ease,transform .15s ease;
    }
    #tabs a:hover{
      color:var(--accent-soft);
      transform:translateY(-1px);
    }

    /* Volet latéral NexAI */
    #nexaiPanel{
      width:320px;
      max-width:80vw;
      background:rgba(10,12,20,0.98);
      border-left:1px solid rgba(75,125,255,0.4);
      box-shadow:-12px 0 30px rgba(0,0,0,0.7);
      display:flex;
      flex-direction:column;
      transform:translateX(100%);
      opacity:0;
      pointer-events:none;
      transition:transform .22s ease,opacity .22s ease;
    }
    #nexaiPanel.open{
      transform:translateX(0);
      opacity:1;
      pointer-events:auto;
    }
    #nexaiHeader{
      padding:10px 12px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      border-bottom:1px solid rgba(75,125,255,0.4);
    }
    #nexaiTitle{
      font-size:14px;
      font-weight:600;
    }
    #nexaiClose{
      border:none;
      background:transparent;
      color:var(--sub);
      font-size:16px;
      cursor:pointer;
      padding:4px 6px;
      border-radius:999px;
      transition:background .15s ease,color .15s ease,transform .15s ease;
    }
    #nexaiClose:hover{
      background:#15182a;
      color:var(--accent-soft);
      transform:translateY(-1px);
    }
    #nexaiBody{
      flex:1;
      display:flex;
      flex-direction:column;
      padding:10px 10px 8px;
      overflow:hidden;
    }
    #chatMessages{
      flex:1;
      overflow-y:auto;
      scrollbar-width:none;
      padding-right:4px;
      font-size:13px;
    }
    #chatMessages::-webkit-scrollbar{display:none}
    .chat-msg{margin-bottom:8px;display:flex}
    .chat-user,.chat-ai{
      display:inline-block;
      padding:7px 9px;
      border-radius:14px;
      max-width:100%;
      transition:transform .15s ease,background .15s ease;
    }
    .chat-user{
      background:rgba(40,60,120,0.9);
      color:var(--text);
      margin-left:auto;
    }
    .chat-ai{
      background:#111425;
      color:var(--text);
      border:1px solid rgba(90,130,255,0.4);
      margin-right:auto;
    }
    .chat-user:hover,.chat-ai:hover{transform:translateY(-1px)}
    #chatInputRow{
      display:flex;
      gap:6px;
      margin-top:6px;
    }
    #chatInput{
      flex:1;
      border-radius:999px;
      border:1px solid rgba(90,130,255,0.6);
      background:#05060a;
      color:var(--text);
      padding:7px 10px;
      font-size:13px;
      transition:border-color .15s ease,box-shadow .15s ease;
    }
    #chatInput:focus{
      outline:none;
      border-color:var(--accent-soft);
      box-shadow:0 0 0 1px rgba(127,208,255,0.6);
    }
    #chatSend{
      border-radius:999px;
      border:none;
      background:linear-gradient(135deg,var(--accent),var(--accent-soft));
      color:#05060a;
      padding:7px 11px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      transition:transform .15s ease,box-shadow .15s ease,opacity .15s ease;
    }
    #chatSend:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(75,125,255,0.6);
    }
    #chatSend:disabled{
      opacity:.5;
      cursor:default;
      box-shadow:none;
      transform:none;
    }

    /* Barre du bas */
    #bottomBar{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:56px;
      background:rgba(5,6,10,0.96);
      backdrop-filter:blur(16px);
      padding:8px 10px;
      display:flex;
      align-items:center;
      gap:8px;
      border-top:1px solid rgba(70,110,255,0.4);
    }
    #logo{
      font-size:15px;
      font-weight:600;
      color:var(--text);
      text-decoration:none;
      white-space:nowrap;
      transition:color .15s ease,transform .15s ease;
    }
    #logo:hover{
      color:var(--accent-soft);
      transform:translateY(-1px);
    }
    #addressBar{
      flex:1;
      border-radius:999px;
      border:1px solid rgba(90,130,255,0.7);
      background:#05060a;
      color:var(--text);
      padding:7px 11px;
      font-size:14px;
      transition:border-color .15s ease,box-shadow .15s ease;
    }
    #addressBar:focus{
      outline:none;
      border-color:var(--accent-soft);
      box-shadow:0 0 0 1px rgba(127,208,255,0.6);
    }
    #nexaiToggle{
      border-radius:999px;
      border:none;
      background:rgba(20,26,60,0.9);
      color:var(--accent-soft);
      padding:7px 11px;
      font-size:13px;
      font-weight:600;
      cursor:pointer;
      white-space:nowrap;
      transition:transform .15s ease,box-shadow .15s ease,background .15s ease,color .15s ease;
    }
    #nexaiToggle:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(75,125,255,0.6);
      background:rgba(30,36,80,0.95);
      color:#ffffff;
    }

    @media(max-width:800px){
      .layout{
        height:calc(100vh - 52px - 56px);
      }
      #nexaiPanel{
        position:fixed;
        right:0;
        top:52px;
        height:calc(100vh - 52px - 56px);
        z-index:20;
      }
    }
  </style>
</head>

<script>
/* ========= PARAMS RECHERCHE ========= */
const params = new URLSearchParams(location.search);
const query = (params.get("q") || "").trim();

const addressBar = document.getElementById("addressBar");
addressBar.value = query;
addressBar.addEventListener("keydown", e=>{
  if(e.key==="Enter"){
    location.href = "results.html?q="+encodeURIComponent(addressBar.value);
  }
});

const imgTab = document.getElementById("imgTab");
const mapTab = document.getElementById("mapTab");
const bingTab = document.getElementById("bingTab");
imgTab.href = "https://www.bing.com/images/search?q="+encodeURIComponent(query);
mapTab.href = "https://www.bing.com/maps?q="+encodeURIComponent(query);
bingTab.href = "https://www.bing.com/search?q="+encodeURIComponent(query);

/* ========= UTILITAIRES ========= */
function blocked(text){
  return ["porn","porno","viol","gore","snuff","décapitation"].some(w=>text.toLowerCase().includes(w));
}

function detectCategory(q){
  q = q.toLowerCase();
  const cats = {
    microsoft:["microsoft","windows","office","word","excel","powerpoint","outlook","onedrive","teams","onenote"],
    education:["scratch","ent","pronote","ecoledirecte","moodle","cours","devoir","parcoursup","geogebra","khan","pix","lumni","openclassrooms"],
    social:["youtube","tiktok","instagram","facebook","snapchat","twitter","x ","discord","reddit","twitch","pinterest"],
    shopping:["amazon","fnac","cdiscount","darty","rueducommerce","acheter","prix","promo","deal"],
    gaming:["xbox","playstation","ps5","nintendo","switch","roblox","minecraft","jeu","gaming","steam","epic"],
    ai:["copilot","chatgpt","claude","gemini","ia","intelligence artificielle","openai","anthropic","perplexity"],
    providers:["orange","free","bouygues","sfr","red","sosh"],
    video:["netflix","prime video","disney","crunchyroll","film","série","serie","streaming"]
  };
  for(const k in cats) if(cats[k].some(w=>q.includes(w))) return k;
  return "general";
}

function faviconUrl(url){

    const u = new URL(url);

/* ========= NEXAI LOCAL : RÉSUMÉ ========= */
const aiSummary = document.getElementById("aiSummary");

function isCalc(str){
  return /^[0-9+\-*/().\s]+$/.test(str);
}
function safeCalc(str){
  try{
    if(!isCalc(str)) return null;
    // très simple, pas sécurisé pour tout, mais suffisant ici
    // eslint-disable-next-line no-eval
    const r = eval(str);
    if(typeof r==="number" && isFinite(r)) return r;
    return null;
  }catch{return null;}
}

function summarizeQuery(q){
  if(!q) return "<p>Entre une recherche pour que NexAI puisse te répondre.</p>";
  if(blocked(q)) return "<p>Contenu non autorisé pour NexAI.</p>";

  const lower = q.toLowerCase();
  const calc = safeCalc(q);
  let intro = "<p><b>Salut !</b> Tu as recherché <b>"+q+"</b>.</p>";
  let core = "";
  if(calc!==null){
    core += "<p>Ça ressemble à un calcul. Résultat : <b>"+calc+"</b>.</p>";
  }

  const cat = detectCategory(q);
  if(cat==="microsoft"){
    core += "<p>Microsoft est une multinationale fondée en 1975 par Bill Gates et Paul Allen, connue pour Windows, Office, Xbox et de nombreux services cloud.</p>";
  }else if(cat==="education"){
    core += "<p>Ta recherche semble liée à l’éducation ou aux outils scolaires : plateformes de cours, ENT, exercices, etc.</p>";
  }else if(cat==="social"){
    core += "<p>On est clairement dans l’univers des réseaux sociaux, du partage de contenu et des créateurs.</p>";
  }else if(cat==="shopping"){
    core += "<p>Ça ressemble à une recherche orientée shopping : produits, prix, promos, sites marchands.</p>";
  }else if(cat==="gaming"){
    core += "<p>On est dans le domaine du gaming : consoles, jeux, plateformes et communautés de joueurs.</p>";
  }else if(cat==="ai"){
    core += "<p>Tu touches au monde de l’IA : assistants, modèles, outils intelligents et services cloud.</p>";
  }else if(cat==="providers"){
    core += "<p>Ta recherche semble liée aux opérateurs ou fournisseurs d’accès : offres, box, mobile, etc.</p>";
  }else if(cat==="video"){
    core += "<p>On est dans la vidéo en ligne : streaming, séries, films, plateformes de contenu.</p>";
  }else{
    core += "<p>C’est une recherche assez générale. NexSearch te propose des sites utiles et variés autour de ce sujet.</p>";
  }

  const outro = "<p>Juste en dessous, tu as une sélection de sites liés à ta recherche, triés par pertinence.</p>";
  return intro+core+outro;
}

/* ========= NEXAI LOCAL : DESCRIPTION DES SITES ========= */
function describeSite(site, q){
  const name = site.name.toLowerCase();
  const query = q.toLowerCase();

  if(name.includes("microsoft") && query.includes("microsoft")){
    if(name.includes("365") || name.includes("office")) return "Suite bureautique en ligne de Microsoft (Word, Excel, PowerPoint, etc.).";
    if(name.includes("outlook")) return "Service de messagerie et agenda de Microsoft.";
    if(name.includes("onedrive")) return "Stockage cloud de Microsoft pour tes fichiers et sauvegardes.";
    if(name.includes("teams")) return "Plateforme de collaboration et visioconférence de Microsoft.";
    if(name.includes("learn")) return "Documentation et ressources techniques officielles Microsoft.";
    if(name.includes("support")) return "Centre d’aide et de support officiel Microsoft.";
    return "Site principal de Microsoft, avec produits, services et informations officielles.";
  }

  if(name.includes("scratch")) return "Plateforme pour apprendre la programmation visuelle avec des blocs, idéale pour débuter.";
  if(name.includes("pronote") || name.includes("ent")) return "Outil scolaire pour suivre les notes, devoirs et la vie de classe.";
  if(name.includes("ecoledirecte")) return "Portail scolaire pour élèves, parents et enseignants.";
  if(name.includes("khan")) return "Plateforme de cours gratuits en ligne sur de nombreux sujets.";
  if(name.includes("pix")) return "Service pour évaluer et développer tes compétences numériques.";
  if(name.includes("lumni")) return "Ressources éducatives en ligne pour réviser et découvrir de nouveaux contenus.";
  if(name.includes("openclassrooms")) return "Plateforme de formation en ligne avec des parcours et projets concrets.";
  if(name.includes("geogebra")) return "Outil interactif pour les maths, la géométrie et les fonctions.";
  if(name.includes("wolfram")) return "Moteur de calcul avancé pour maths, sciences et données.";

  if(name.includes("youtube")) return "Plateforme vidéo pour regarder, publier et suivre des créateurs.";
  if(name.includes("tiktok")) return "Réseau social centré sur les vidéos courtes et créatives.";
  if(name.includes("instagram")) return "Réseau social orienté photos, stories et reels.";
  if(name.includes("facebook")) return "Réseau social généraliste pour amis, groupes et pages.";
  if(name.includes("discord")) return "Plateforme de discussion (texte, vocal) pour communautés et gamers.";
  if(name.includes("twitch")) return "Plateforme de streaming en direct, surtout pour le gaming.";
  if(name.includes("reddit")) return "Forum géant organisé en communautés thématiques.";

  if(name.includes("amazon")) return "Grand site d’e-commerce pour acheter presque tout (livres, objets, tech, etc.).";
  if(name.includes("fnac")) return "Magasin en ligne pour livres, high-tech, culture et plus.";
  if(name.includes("cdiscount")) return "Site d’e-commerce avec beaucoup de promos et de produits variés.";
  if(name.includes("darty")) return "Magasin spécialisé dans l’électroménager et le high-tech.";
  if(name.includes("rueducommerce")) return "Site d’e-commerce orienté high-tech et équipements.";

  if(name.includes("xbox")) return "Écosystème de consoles et services de jeu de Microsoft.";
  if(name.includes("playstation")) return "Console et services de jeu de Sony.";
  if(name.includes("nintendo")) return "Constructeur de consoles et jeux emblématiques (Switch, Mario, Zelda…).";
  if(name.includes("steam")) return "Plateforme de jeux PC dématérialisés.";
  if(name.includes("epic")) return "Boutique de jeux en ligne et créateur de Fortnite.";
  if(name.includes("roblox")) return "Plateforme de jeux créés par la communauté.";
  if(name.includes("minecraft")) return "Jeu de construction et d’aventure en blocs, très populaire.";

  if(name.includes("copilot")) return "Assistant IA de Microsoft pour la recherche, la productivité et la créativité.";
  if(name.includes("chatgpt")) return "Assistant conversationnel IA développé par OpenAI.";
  if(name.includes("claude")) return "Assistant IA conversationnel avancé.";
  if(name.includes("gemini")) return "Suite d’outils IA de Google.";
  if(name.includes("perplexity")) return "Moteur de recherche IA orienté réponses détaillées.";
  if(name.includes("hugging face")) return "Plateforme de modèles IA et de projets open source.";

  if(name.includes("orange") || name.includes("free") || name.includes("sfr") || name.includes("bouygues") || name.includes("sosh") || name.includes("red")){
    return "Site d’un opérateur télécom pour offres internet, mobile et services associés.";
  }

  if(name.includes("netflix")) return "Plateforme de streaming pour séries, films et documentaires.";
  if(name.includes("prime video")) return "Service de streaming vidéo inclus avec Amazon Prime.";
  if(name.includes("disney")) return "Plateforme de streaming pour contenus Disney, Marvel, Star Wars, etc.";
  if(name.includes("crunchyroll")) return "Plateforme de streaming spécialisée dans les animés.";

  if(name.includes("wikipedia")) return "Encyclopédie collaborative en ligne, utile pour une vue d’ensemble.";
  if(name.includes("bing")) return "Moteur de recherche généraliste de Microsoft.";
  if(name.includes("qwant")) return "Moteur de recherche européen axé sur la vie privée.";
  if(name.includes("duckduckgo")) return "Moteur de recherche qui met en avant la confidentialité.";

  // fallback
  if(query.includes("microsoft") && !name.includes("microsoft")){
    return "Site en rapport avec l’écosystème Microsoft ou des services associés.";
  }
  if(query.includes("youtube") && name.includes("youtube")){
    return "Accès direct à la plateforme YouTube pour ta recherche.";
  }
  return "Site lié à ta recherche, potentiellement utile pour explorer ce sujet.";
}

/* ========= RENDU RESULTATS ========= */
const resultsList = document.getElementById("resultsList");

function renderResults(){
  const base = baseSites(query);
  const enriched = base.map(s=>({
    ...s,
    desc: describeSite(s, query)
  }));
  resultsList.innerHTML = "";
  enriched.forEach(site=>{
    const div = document.createElement("div");
    div.className = "result-item";
    div.onclick = ()=>window.open(site.url,"_blank");
    div.innerHTML = `
      <img class="result-logo" src="${faviconUrl(site.url)}" alt="">
      <div class="result-main">
        <div class="result-title">${site.name}</div>
        <div class="result-url">${site.url}</div>
        <div class="result-desc">${site.desc}</div>
      </div>
    `;
    resultsList.appendChild(div);
  });
}

/* ========= NEXAI LOCAL : CHAT ========= */
const nexaiPanel = document.getElementById("nexaiPanel");
const nexaiToggle = document.getElementById("nexaiToggle");
const nexaiClose = document.getElementById("nexaiClose");
const chatMessages = document.getElementById("chatMessages");
const chatInput = document.getElementById("chatInput");
const chatSend = document.getElementById("chatSend");

function openPanel(){nexaiPanel.classList.add("open");}
function closePanel(){nexaiPanel.classList.remove("open");}

nexaiToggle.onclick = openPanel;
nexaiClose.onclick = closePanel;

function addChatMessage(text,from){
  const div = document.createElement("div");
  div.className = "chat-msg";
  const bubble = document.createElement("div");
  bubble.className = from==="user" ? "chat-user" : "chat-ai";
  bubble.innerHTML = text;
  div.appendChild(bubble);
  chatMessages.appendChild(div);
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

function nexaiChatReply(msg){
  const m = msg.toLowerCase().trim();
  if(blocked(m)) return "<p>Contenu non autorisé.</p>";

  // small talk
  if(m.includes("ça va") || m.includes("ca va")){
    return "<p>Oui, ça va super, merci ! Et toi ? 😄</p>";
  }
  if(m==="salut" || m==="bonjour" || m==="yo" || m==="cc" || m==="coucou"){
    return "<p>Salut ! Je suis NexAI, ton IA locale NexSearch. Tu veux qu’on parle de <b>"+(query||"quelque chose")+"</b> ?</p>";
  }
  if(m.includes("tu es qui") || m.includes("t'es qui") || m.includes("qui es-tu") || m.includes("qui es tu")){
    return "<p>Je suis <b>NexAI</b>, une IA locale intégrée à NexSearch. Je t’aide à comprendre ta recherche et à explorer les sites proposés.</p>";
  }

  // calcul
  const calc = safeCalc(msg);
  if(calc!==null){
    return "<p>Si je calcule <b>"+msg+"</b>, j’obtiens <b>"+calc+"</b>.</p>";
  }

  // contexte recherche
  if(query){
    const cat = detectCategory(query);
    if(cat==="microsoft"){
      return "<p>On est sur une recherche autour de <b>Microsoft</b>. Tu peux me demander des infos sur Windows, Office, Xbox, ou même des conseils pour choisir un service.</p>";
    }
    if(cat==="education"){
      return "<p>Ta recherche tourne autour de l’école ou des outils éducatifs. Je peux t’orienter vers des plateformes de cours, des ENT ou des outils pour réviser.</p>";
    }
    if(cat==="gaming"){
      return "<p>On est dans le gaming. Tu peux me demander des infos sur des consoles, des jeux, ou des plateformes comme Steam ou Xbox.</p>";
    }
    if(cat==="ai"){
      return "<p>Tu explores l’IA. Je peux t’expliquer les différences entre Copilot, ChatGPT, Gemini, etc., ou comment les utiliser au quotidien.</p>";
    }
  }

  // fallback
  return "<p>Bonne question ! Je suis une version locale de NexAI, donc je ne vais pas chercher sur internet, mais je peux t’aider à réfléchir, expliquer des concepts simples ou te guider parmi les sites listés.</p>";
}

function sendChat(){
  const msg = chatInput.value.trim();
  if(!msg) return;
  addChatMessage(msg,"user");
  chatInput.value = "";
  chatSend.disabled = true;
  setTimeout(()=>{
    const reply = nexaiChatReply(msg);
    addChatMessage(reply,"ai");
    chatSend.disabled = false;
  },150);
}

chatSend.addEventListener("click",sendChat);
chatInput.addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});

/* ========= INIT ========= */
aiSummary.innerHTML = summarizeQuery(query);
renderResults();
</script>
