<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexSearch – Résultats</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #3B82F6;
      font-family: "Poppins", sans-serif;
    }

    .topbar {
      width: 100%;
      padding: 20px;
      background: #020617;
      border-bottom: 1px solid #1E3A8A;
      display: flex;
      justify-content: center;
    }

    .search-box {
      width: 600px;
      max-width: 90%;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 1px solid #1F2937;
      background: #000;
      color: #3B82F6;
      font-size: 1rem;
      outline: none;
    }

    .search-box input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 2px #2563EB;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      margin-top: 25px;
    }

    .section-title {
      font-size: 1.4rem;
      margin-top: 30px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #3B82F6;
    }

    .result {
      background: #020617;
      border: 1px solid #1E3A8A;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 18px;
      transition: 0.2s;
    }

    .result:hover {
      border-color: #2563EB;
      transform: translateX(4px);
    }

    .title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #60A5FA;
      margin-bottom: 6px;
    }

    .url {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .snippet {
      font-size: 1rem;
      color: #93C5FD;
      white-space: pre-line;
    }
  </style>
</head>

<body>
  <!-- BARRE DE RECHERCHE -->
  <div class="topbar">
    <form class="search-box" action="results.html" method="GET">
      <input type="text" name="q" id="searchInput" placeholder="Rechercher..." autocomplete="off" />
    </form>
  </div>

  <div class="container">
    <div id="results"></div>
  </div>

  <script>
    // 1. Récupération de la requête
    const params = new URLSearchParams(window.location.search);
    const query = (params.get("q") || "").trim();
    document.getElementById("searchInput").value = query;

    const resultsContainer = document.getElementById("results");

    // 2. Redirections directes vers des sites (mode "raccourci")
    const siteShortcuts = {
      "amazon": "https://www.amazon.fr",
      "youtube": "https://www.youtube.com",
      "yt": "https://www.youtube.com",
      "wikipedia": "https://fr.wikipedia.org",
      "wiki": "https://fr.wikipedia.org",
      "bing": "https://www.bing.com",
      "google": "https://www.google.com",
      "reddit": "https://www.reddit.com",
      "twitter": "https://x.com",
      "x": "https://x.com",
      "instagram": "https://instagram.com",
      "github": "https://github.com",
      "marmiton": "https://www.marmiton.org"
    };

    if (siteShortcuts[query.toLowerCase()]) {
      window.location.href = siteShortcuts[query.toLowerCase()];
    }

    // 3. Module de calcul
    function isMathExpression(str) {
      return /^[0-9+\-*/().\s]+$/.test(str) && /[0-9]/.test(str);
    }

    function calculateExpression(str) {
      try {
        return Function("return " + str)();
      } catch {
        return null;
      }
    }

    // 4. "IA" maison : règles + mini base de connaissances
    function aiEngine(q) {
      const lower = q.toLowerCase();
      const recs = [];
      let answer = "";

      // Cas cuisine / recettes
      if (
        lower.includes("cake") ||
        lower.includes("gâteau") ||
        lower.includes("gateau") ||
        lower.includes("recette") ||
        lower.includes("cuisine")
      ) {
        answer =
          "Voici une idée simple de recette de cake :\n\n" +
          "- Préchauffe ton four à 180°C.\n" +
          "- Mélange 3 œufs, 150 g de sucre et 100 g de beurre fondu.\n" +
          "- Ajoute 200 g de farine, 1 sachet de levure et une pincée de sel.\n" +
          "- Tu peux ajouter : pépites de chocolat, citron, vanille ou fruits.\n" +
          "- Verse dans un moule beurré et enfourne 35 à 45 minutes.\n\n" +
          "Vérifie la cuisson avec la pointe d’un couteau : si elle ressort sèche, ton cake est prêt.";

        recs.push(
          {
            name: "Marmiton – Recettes de cakes",
            url: "https://www.marmiton.org/recettes/recherche.aspx?aqt=" + encodeURIComponent(q),
            snippet: "Des dizaines de recettes de cakes notées et commentées (sucrés, salés, faciles, rapides)."
          },
          {
            name: "750g – Idées de cakes",
            url: "https://www.750g.com/recherche?q=" + encodeURIComponent(q),
            snippet: "Autres variantes de cakes, astuces de cuisson et idées originales."
          }
        );
        return { answer, recs };
      }

      // Cas programmation
      if (
        lower.includes("javascript") ||
        lower.includes("python") ||
        lower.includes("code") ||
        lower.includes("programmation") ||
        lower.includes("developer") ||
        lower.includes("développeur")
      ) {
        answer =
          "Tu sembles chercher quelque chose lié au code ou à la programmation.\n\n" +
          "En général, pour progresser efficacement :\n" +
          "- Choisis un langage (ex : JavaScript ou Python).\n" +
          "- Suis un tutoriel structuré étape par étape.\n" +
          "- Pratique en construisant de petits projets concrets.\n" +
          "- Lis la documentation officielle et des exemples de code.\n\n" +
          "Si tu précises ta question (ex : \"comment faire un bouton en JavaScript ?\"), NexSearch peut te guider plus finement.";

        recs.push(
          {
            name: "MDN Web Docs – JavaScript",
            url: "https://developer.mozilla.org/fr/docs/Web/JavaScript",
            snippet: "Documentation officielle, exemples et guides pour JavaScript."
          },
          {
            name: "W3Schools – Tutoriels Web",
            url: "https://www.w3schools.com/",
            snippet: "Tutoriels simples pour HTML, CSS, JavaScript et plus."
          }
        );
        return { answer, recs };
      }

      // Cas questions "comment", "pourquoi", "qu'est-ce que"
      if (
        lower.startsWith("comment ") ||
        lower.startsWith("pourquoi ") ||
        lower.startsWith("qu'est-ce que") ||
        lower.startsWith("qu est ce que") ||
        lower.startsWith("c'est quoi") ||
        lower.startsWith("c est quoi")
      ) {
        answer =
          "Tu poses une question de type explicative :\n\n" +
          "« " + q + " »\n\n" +
          "NexSearch te propose une approche :\n" +
          "- Commence par une définition simple du sujet.\n" +
          "- Identifie les étapes ou les causes principales.\n" +
          "- Cherche un exemple concret ou une analogie.\n\n" +
          "Les sites ci-dessous sont de bons points de départ pour approfondir.";

        recs.push(
          {
            name: "Wikipédia",
            url: "https://fr.wikipedia.org/wiki/" + encodeURIComponent(q.replace(/comment |pourquoi |qu'est-ce que |qu est ce que |c'est quoi |c est quoi /i, "")),
            snippet: "Article encyclopédique pour comprendre le contexte, l’historique et les notions clés."
          },
          {
            name: "Bing – Résultats détaillés",
            url: "https://www.bing.com/search?q=" + encodeURIComponent(q),
            snippet: "Résultats variés (articles, vidéos, forums) pour explorer différentes réponses."
          }
        );
        return { answer, recs };
      }

      // Cas générique : recherche classique
      answer =
        "Je n’ai pas détecté de domaine spécifique (cuisine, code, etc.), mais voici une sélection de sources pertinentes pour « " +
        q +
        " ».\n\n" +
        "Tu peux affiner ta requête avec des mots-clés comme :\n" +
        "- \"recette\", \"tutoriel\", \"avis\", \"définition\", \"exemple\"…";

      recs.push(
        {
          name: "Bing – Résultats pour « " + q + " »",
          url: "https://www.bing.com/search?q=" + encodeURIComponent(q),
          snippet: "Résultats complets (sites, vidéos, actualités, forums) pour ta recherche."
        },
        {
          name: "YouTube – Vidéos sur « " + q + " »",
          url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(q),
          snippet: "Tutoriels, explications et contenus vidéo liés à ta requête."
        },
        {
          name: "Wikipédia – Article potentiel",
          url: "https://fr.wikipedia.org/wiki/" + encodeURIComponent(q),
          snippet: "Si un article existe, tu auras une vue d’ensemble structurée."
        }
      );

      return { answer, recs };
    }

    // 5. Rendu
    function render() {
      if (!query) {
        resultsContainer.innerHTML = `
          <div class="section-title">Aucune requête</div>
          <div class="result">
            <div class="snippet">Tape quelque chose dans la barre de recherche pour lancer NexSearch.</div>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = "";

      // Bloc calcul si applicable
      if (isMathExpression(query)) {
        const calc = calculateExpression(query);
        if (calc !== null && calc !== undefined && !Number.isNaN(calc)) {
          resultsContainer.innerHTML += `
            <div class="section-title">Calcul</div>
            <div class="result">
              <div class="title">${query} = ${calc}</div>
              <div class="snippet">Résultat calculé directement par NexSearch.</div>
            </div>
          `;
        }
      }

      // IA maison
      const { answer, recs } = aiEngine(query);

      resultsContainer.innerHTML += `
        <div class="section-title">Réponse IA NexSearch</div>
        <div class="result">
          <div class="snippet">${answer.replace(/\n/g, "<br>")}</div>
        </div>
      `;

      // Sites recommandés
      resultsContainer.innerHTML += `<div class="section-title">Sites recommandés</div>`;

      recs.forEach(r => {
        resultsContainer.innerHTML += `
          <div class="result">
            <div class="title">${r.name}</div>
            <div class="url">${r.url}</div>
            <div class="snippet">${r.snippet}</div>
          </div>
        `;
      });
    }

    render();
  </script>
</body>
</html>
