function qType(q){const t=nrm(q);return{word:t.includes("word"),ms:t.includes("microsoft")||t.includes("windows")||t.includes("office"),cop:t.includes("copilot"),amz:t.includes("amazon"),nfx:t.includes("netflix"),yt:t.includes("youtube"),dev:t.includes("github")||t.includes("code")||t.includes("dev")||t.includes("programmation")||t.includes("scratch"),img:t.includes("image")||t.includes("photo")||t.includes("pixabay")||t.includes("unsplash"),msg:t.includes("whatsapp")||t.includes("telegram")||t.includes("discord"),ai:t.includes("ia")||t.includes("ai")||t.includes("chatgpt")||t.includes("claude")||t.includes("copilot")||t.includes("perplexity"),shop:t.includes("amazon")||t.includes("fnac")||t.includes("cdiscount")||t.includes("zalando")||t.includes("aliexpress")}}
function relevant(s,q,t,c){const x=nrm(c),n=nrm(s.name),tags=s.tags||[],direct=n.includes(x)||x.includes(n)||tags.some(v=>x.includes(v));if(t.word)return tags.includes("word")||tags.includes("office")||tags.includes("microsoft");if(t.ms)return tags.includes("microsoft")||tags.includes("office")||tags.includes("windows")||tags.includes("word")||tags.includes("copilot");if(t.cop||t.ai)return tags.includes("copilot")||tags.includes("ai")||tags.includes("chatgpt")||tags.includes("claude")||tags.includes("perplexity")||tags.includes("microsoft");if(t.amz||t.shop)return tags.includes("amazon")||tags.includes("shopping");if(t.nfx)return tags.includes("netflix")||tags.includes("video")||tags.includes("streaming");if(t.yt)return tags.includes("youtube")||tags.includes("video")||tags.includes("music");if(t.dev)return tags.includes("dev")||tags.includes("docs")||tags.includes("questions")||tags.includes("scratch")||tags.includes("code");if(t.img)return tags.includes("images")||tags.includes("photos")||tags.includes("pixabay")||tags.includes("unsplash");if(t.msg)return tags.includes("messaging")||tags.includes("whatsapp")||tags.includes("telegram")||tags.includes("discord");return direct}
function buildResults(q){const{normalized:c}=normQuery(q),t=qType(c),rel=SITES.filter(s=>relevant(s,q,t,c)),sc=rel.map(s=>{const x=nrm(c);let score=s.w||.5,n=nrm(s.name);if(n===x)score+=.5;if(n.includes(x)||x.includes(n))score+=.3;return{site:s,score}});sc.sort((a,b)=>b.score-a.score);return{type:t,cq:c,res:sc.map(e=>({name:e.site.name,url:e.site.url.replace("{q}",encodeURIComponent(c)),tags:e.site.tags,score:e.score}))}}
function actions(q,t,c){const a=[{label:"Voir sur Bing",url:"https://bing.com/search?q="+encodeURIComponent(c)}];if(t.ms||t.word||t.cop||t.ai){a.push({label:"Microsoft",url:"https://microsoft.com/search?q="+encodeURIComponent(c)});a.push({label:"Copilot",url:"https://copilot.microsoft.com/?q="+encodeURIComponent(c)})}if(t.amz||t.shop)a.push({label:"Amazon",url:"https://amazon.fr/s?k="+encodeURIComponent(c)});if(t.nfx)a.push({label:"Netflix",url:"https://netflix.com/search?q="+encodeURIComponent(c)});if(t.yt)a.push({label:"YouTube",url:"https://youtube.com/results?search_query="+encodeURIComponent(c)});if(t.dev){a.push({label:"GitHub",url:"https://github.com/search?q="+encodeURIComponent(c)});a.push({label:"Stack Overflow",url:"https://stackoverflow.com/search?q="+encodeURIComponent(c)})}if(t.img)a.push({label:"Pixabay",url:"https://pixabay.com/images/search/"+encodeURIComponent(c)+"/"});if(t.msg){a.push({label:"WhatsApp Web",url:"https://web.whatsapp.com/"});a.push({label:"Telegram Web",url:"https://web.telegram.org/k/"});a.push({label:"Discord",url:"https://discord.com/channels/@me"})}return a}

function addMsg(t,f){const log=document.getElementById("nexai-log"),d=document.createElement("div");d.className="nexai-msg "+(f==="user"?"nexai-msg-user":"nexai-msg-ai");d.textContent=(f==="user"?"Vous : ":"NexAI : ")+t;log.appendChild(d);log.scrollTop=log.scrollHeight}

function runSearch(q){if(!q.trim())return;const calc=tryCalc(q),{type:t,cq,res}=buildResults(q),acts=actions(q,t,cq);MEM.lastQuery=cq;MEM.lastType=t;setTitle(cq);const meta=document.getElementById("results-meta");meta.textContent='Requête : "'+q+'"'+(cq!==q?' → corrigée en : "'+cq+'"':"");const sum=document.getElementById("results-summary");sum.textContent=aiSummary(q,cq,res,calc);const list=document.getElementById("results-list");list.innerHTML="";res.forEach(r=>{const a=document.createElement("a");a.className="result-item-link";a.href=r.url;a.target="_blank";a.rel="noopener noreferrer";const it=document.createElement("div");it.className="result-item";const cont=document.createElement("div");cont.className="result-content";const ti=document.createElement("div");ti.className="result-item-title";ti.textContent=r.name;const u=document.createElement("div");u.className="result-item-url";u.textContent=r.url;const tg=document.createElement("div");tg.className="result-item-tags";tg.textContent="Tags : "+(r.tags||[]).join(", ");cont.appendChild(ti);cont.appendChild(u);cont.appendChild(tg);const fv=document.createElement("div");fv.className="result-favicon";const img=document.createElement("img");img.src=favUrl(r.url);img.alt=r.name;img.onerror=()=>{img.style.display="none";fv.textContent=r.name[0]||"?"};fv.appendChild(img);it.appendChild(cont);it.appendChild(fv);a.appendChild(it);list.appendChild(a)});const actDiv=document.getElementById("results-actions");actDiv.innerHTML="";acts.forEach(b=>{const bt=document.createElement("button");bt.className="action-btn";bt.textContent=b.label;bt.onclick=()=>window.open(b.url,"_blank");actDiv.appendChild(bt)});document.getElementById("nexai-summary").textContent=aiSummary(q,cq,res,calc)}
