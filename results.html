<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Recherche NexSearch</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root {
      --bg-main: #02040a;
      --bg-panel: #050816;
      --border-panel: #111827;
      --accent: #2563eb;
      --accent-soft: #1d4ed8;
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --text-soft: #6b7280;
      --success: #22c55e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #020617 0, #000 55%, #020617 100%);
      color: var(--text-main);
      overflow-y: auto;
      overflow-x: hidden;
    }

    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      position: relative;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 14px;
      background: #020617;
      border-bottom: 1px solid #111827;
    }

    .top-left {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .logo-main {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8 60%, #020617 100%);
      box-shadow: 0 0 16px rgba(37,99,235,0.9);
      position: relative;
    }

    .logo-main::after {
      content: "";
      position: absolute;
      inset: 4px;
      border-radius: 50%;
      border: 1px solid rgba(15,23,42,0.9);
      box-shadow: inset 0 0 10px rgba(15,23,42,0.9);
    }

    .logo-text {
      font-weight: 700;
      font-size: 1rem;
      letter-spacing: 0.04em;
    }

    .top-right {
      font-size: 0.78rem;
      color: var(--text-soft);
    }

    /* Layout principal */
    .main-layout {
      flex: 1;
      display: grid;
      grid-template-columns: 2.1fr 1.1fr;
      gap: 10px;
      padding: 10px 14px 80px 14px;
    }

    .panel {
      background: var(--bg-panel);
      border: 1px solid var(--border-panel);
      border-radius: 8px; /* plus carré / Metro */
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
      padding: 8px;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 4px;
    }

    .panel-title {
      font-size: 0.9rem;
      font-weight: 600;
      color: #bfdbfe;
    }

    .panel-sub {
      font-size: 0.75rem;
      color: var(--text-soft);
    }

    /* Résultats */
    .results-panel {
      overflow: hidden;
    }

    #results-meta {
      font-size: 0.78rem;
      color: var(--text-soft);
      margin-bottom: 4px;
    }

    #results-summary {
      margin-bottom: 6px;
      padding: 6px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #1f2937;
      font-size: 0.82rem;
      max-height: 110px;
      overflow-y: auto;
    }

    #results-list {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
      margin-bottom: 6px;
    }

    .result-item {
      display: flex;
      gap: 8px;
      padding: 7px;
      border-radius: 6px;
      border: 1px solid #111827;
      background: #020617;
      margin-bottom: 5px;
      transition: background 0.12s ease, border-color 0.12s ease, transform 0.12s ease;
    }

    .result-item:hover {
      background: #02081a;
      border-color: #2563eb;
      transform: translateY(-1px);
    }

    .result-favicon {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: #020617;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      color: #e5e7eb;
      flex-shrink: 0;
      overflow: hidden;
    }

    .result-favicon img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 4px;
    }

    .result-content {
      flex: 1;
      min-width: 0;
    }

    .result-item-title {
      font-weight: 600;
      color: #bfdbfe;
      font-size: 0.88rem;
      margin-bottom: 1px;
    }

    .result-item-title a {
      color: inherit;
      text-decoration: none;
    }

    .result-item-title a:hover {
      text-decoration: underline;
    }

    .result-item-url {
      font-size: 0.74rem;
      color: var(--text-muted);
      margin-bottom: 1px;
      word-break: break-all;
    }

    .result-item-tags {
      font-size: 0.7rem;
      color: var(--text-soft);
    }

    .result-score {
      font-size: 0.7rem;
      color: #a5b4fc;
    }

    /* Actions globales (en bas du panneau résultats) */
    .results-actions-wrapper {
      border-top: 1px solid #111827;
      padding-top: 4px;
    }

    .actions-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .action-btn {
      padding: 5px 9px;
      border-radius: 999px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.78rem;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .action-btn:hover {
      background: #0b1120;
      border-color: #2563eb;
    }

    /* NexAI */
    .nexai-panel {
      overflow: hidden;
    }

    .nexai-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 0;
    }

    #nexai-summary {
      padding: 6px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #14532d;
      font-size: 0.82rem;
      max-height: 90px;
      overflow-y: auto;
    }

    #nexai-log {
      flex: 1;
      overflow-y: auto;
      border-radius: 6px;
      border: 1px solid #111827;
      background: #020617;
      padding: 6px;
      font-size: 0.82rem;
    }

    .nexai-msg {
      margin-bottom: 5px;
      white-space: pre-wrap;
    }

    .nexai-msg-user {
      color: #93c5fd;
    }

    .nexai-msg-ai {
      color: #a7f3d0;
    }

    .nexai-input-row {
      display: flex;
      gap: 6px;
      margin-top: 2px;
    }

    .nexai-input-row input {
      flex: 1;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #1f2937;
      background: #020617;
      color: var(--text-main);
      font-size: 0.82rem;
    }

    .nexai-input-row button {
      padding: 6px 10px;
      border-radius: 4px;
      border: none;
      background: var(--success);
      color: #022c22;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .nexai-input-row button:hover {
      filter: brightness(1.05);
    }

    /* Barre de recherche en bas */
    .bottom-dock {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 8px;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 20;
    }

    .bottom-bar {
      width: min(900px, 100% - 24px);
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 9px;
      border-radius: 6px;
      background: #020617;
      border: 1px solid #111827;
      box-shadow: 0 12px 30px rgba(0,0,0,0.9);
      pointer-events: auto;
    }

    .bottom-logo {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #60a5fa, #1d4ed8 60%, #020617 100%);
      box-shadow: 0 0 14px rgba(37,99,235,0.9);
      cursor: pointer;
      position: relative;
    }

    .bottom-logo::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      border: 1px solid rgba(15,23,42,0.9);
      box-shadow: inset 0 0 8px rgba(15,23,42,0.9);
    }

    .bottom-input {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      background: #020617;
      border-radius: 4px;
      padding: 3px 6px;
      border: 1px solid #1f2937;
    }

    .bottom-input input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text-main);
      font-size: 0.86rem;
    }

    .bottom-input button {
      padding: 4px 10px;
      border-radius: 4px;
      border: none;
      background: var(--accent);
      color: #f9fafb;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
    }

    .bottom-input button:hover {
      filter: brightness(1.05);
    }

    /* Scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #1f2937;
      border-radius: 999px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #374151;
    }

    @media (max-width: 900px) {
      .main-layout {
        grid-template-columns: 1fr;
        padding-bottom: 90px;
      }
      .nexai-panel {
        order: -1;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- Top bar -->
    <header class="top-bar" id="home-link-top">
      <div class="top-left">
        <div class="logo-main"></div>

      </div>
      <div class="top-right">
        IA locale · Metro / Copilot hybride
      </div>
    </header>

    <!-- Layout principal -->
    <main class="main-layout">
      <!-- Panel résultats -->
      <section class="panel results-panel">
        <div class="panel-header">

          </div>
        </div>

        <div id="results-meta"></div>
        <div id="results-summary"></div>
        <div id="results-list"></div>

        <div class="results-actions-wrapper">
          <div style="font-size:0.78rem;color:#9ca3af;margin-bottom:2px;">Actions rapides</div>
          <div id="results-actions" class="actions-bar"></div>
        </div>
      </section>

      <!-- Panel NexAI -->
      <aside class="panel nexai-panel">
        <div class="panel-header">
          <div>
            <div class="panel-title">NexAI – IA locale</div>

        <div class="nexai-body">
          <div id="nexai-summary"></div>

    </main>

    <!-- Barre de recherche en bas -->

      <div class="bottom-bar">
        <div class="bottom-logo" id="home-link-bottom"></div>

          <input id="search-input" type="text" placeholder="Rechercher avec NexSearch (abrévs, fautes, tout accepté)...">
          <button id="search-btn">Rechercher</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // =========================
    // 1) Utilitaires
    // =========================
    function normalizeText(str) {
      return str
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9 ]+/g, " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function levenshtein(a, b) {
      const m = a.length;
      const n = b.length;
      const dp = Array.from({ length: m + 1 }, () => new Array(n + 1).fill(0));
      for (let i = 0; i <= m; i++) dp[i][0] = i;
      for (let j = 0; j <= n; j++) dp[0][j] = j;
      for (let i = 1; i <= m; i++) {
        for (let j = 1; j <= n; j++) {
          const cost = a[i - 1] === b[j - 1] ? 0 : 1;
          dp[i][j] = Math.min(
            dp[i - 1][j] + 1,
            dp[i][j - 1] + 1,
            dp[i - 1][j - 1] + cost
          );
        }
      }
      return dp[m][n];
    }

    // =========================
    // 2) Abréviations / corrections avancées
    // =========================
    const ADVANCED_ABBREV_MAP = {
      "ms": "microsoft",
      "msoft": "microsoft",
      "mivkoft": "microsoft",
      "microsof": "microsoft",
      "microsft": "microsoft",
      "win": "windows",
      "w11": "windows 11",
      "yt": "youtube",
      "youtub": "youtube",
      "ytb": "youtube",
      "spoti": "spotify",
      "deeze": "deezer",
      "amz": "amazon",
      "amazn": "amazon",
      "fnc": "fnac",
      "cdisc": "cdiscount",
      "ali": "aliexpress",
      "gh": "github",
      "so": "stack overflow",
      "mdn": "mdn web docs",
      "tw": "twitter",
      "x": "twitter",
      "ig": "instagram",
      "fb": "facebook"
    };

    const ADVANCED_CANONICAL = [
      "microsoft",
      "windows",
      "youtube",
      "spotify",
      "deezer",
      "amazon",
      "fnac",
      "cdiscount",
      "aliexpress",
      "github",
      "stack overflow",
      "mdn web docs",
      "twitter",
      "instagram",
      "facebook",
      "bing",
      "copilot"
    ];

    function advancedNormalizeQuery(q) {
      const original = q;
      let norm = normalizeText(q);
      const tokens = norm.split(" ");
      const outTokens = [];

      for (let tok of tokens) {
        if (!tok) continue;

        if (ADVANCED_ABBREV_MAP[tok]) {
          outTokens.push(ADVANCED_ABBREV_MAP[tok]);
          continue;
        }

        let best = tok;
        let bestDist = Infinity;
        for (const cand of ADVANCED_CANONICAL) {
          const d = levenshtein(tok, cand);
          if (d < bestDist) {
            bestDist = d;
            best = cand;
          }
        }
        if (bestDist <= 2 && best !== tok) {
          outTokens.push(best);
        } else {
          outTokens.push(tok);
        }
      }

      const corrected = outTokens.join(" ");
      return { original, normalized: corrected };
    }

    // =========================
    // 3) NexAI – réseau de neurones ~150k paramètres
    // =========================
    const NEXAI_VOCAB = "abcdefghijklmnopqrstuvwxyz0123456789 ?!.,";
    const EMBED_DIM = 256;
    const HIDDEN_DIM1 = 512;
    const HIDDEN_DIM2 = 256;
    const N_INTENTS = 18;

    function randn() {
      return (Math.random() * 2 - 1) * 0.08;
    }

    const W_embed = Array.from({ length: NEXAI_VOCAB.length }, () =>
      Array.from({ length: EMBED_DIM }, randn)
    );

    const W_h1 = Array.from({ length: EMBED_DIM }, () =>
      Array.from({ length: HIDDEN_DIM1 }, randn)
    );
    const b_h1 = Array.from({ length: HIDDEN_DIM1 }, randn);

    const W_h2 = Array.from({ length: HIDDEN_DIM1 }, () =>
      Array.from({ length: HIDDEN_DIM2 }, randn)
    );
    const b_h2 = Array.from({ length: HIDDEN_DIM2 }, randn);

    const W_out = Array.from({ length: HIDDEN_DIM2 }, () =>
      Array.from({ length: N_INTENTS }, randn)
    );
    const b_out = Array.from({ length: N_INTENTS }, randn);

    function textToIndices(text) {
      text = text.toLowerCase();
      const idxs = [];
      for (const ch of text) {
        const i = NEXAI_VOCAB.indexOf(ch);
        if (i >= 0) idxs.push(i);
      }
      return idxs;
    }

    function embedAverage(text) {
      const idxs = textToIndices(text);
      if (idxs.length === 0) return Array(EMBED_DIM).fill(0);
      const v = Array(EMBED_DIM).fill(0);
      for (const i of idxs) {
        for (let d = 0; d < EMBED_DIM; d++) {
          v[d] += W_embed[i][d];
        }
      }
      for (let d = 0; d < EMBED_DIM; d++) v[d] /= idxs.length;
      return v;
    }

    function relu(v) {
      return v.map(x => Math.max(0, x));
    }

    function matVec(W, v, b) {
      const out = Array(W[0].length).fill(0);
      for (let j = 0; j < W[0].length; j++) {
        let s = b ? b[j] : 0;
        for (let i = 0; i < W.length; i++) {
          s += W[i][j] * v[i];
        }
        out[j] = s;
      }
      return out;
    }

    function softmax(logits) {
      const m = Math.max(...logits);
      const exps = logits.map(x => Math.exp(x - m));
      const sum = exps.reduce((a, b) => a + b, 0);
      return exps.map(x => x / sum);
    }

    function nexaiInferIntents(text) {
      const emb = embedAverage(text);
      const h1 = relu(matVec(W_h1, emb, b_h1));
      const h2 = relu(matVec(W_h2, h1, b_h2));
      const logits = matVec(W_out, h2, b_out);
      return softmax(logits);
    }

    const NEXAI_INTENTS = [
      "system_help",
      "os_windows",
      "recipe",
      "definition",
      "search_help",
      "tech_general",
      "smalltalk",
      "music",
      "video",
      "shopping",
      "object_info",
      "place",
      "software",
      "web_general",
      "greeting",
      "calc",
      "about_site",
      "fallback"
    ];

      ],
      system_help: [

        "Pour un cake basique : mélange œufs + sucre, ajoute beurre fondu, puis farine + levure. Tu peux ajouter du chocolat, des fruits ou des épices selon tes goûts."
      ],
      definition: [
        "Tu me demandes une définition. Reformule avec : « c’est quoi X ? » et je vais essayer de détailler le concept.",
        "Pour une définition claire, précise ce que tu veux : « c’est quoi Windows ? », « c’est quoi Amazon ? », « c’est quoi NexSearch ? », etc."
      ],
      search_help: [
        "Tu peux taper ce que tu veux dans NexSearch, même avec des abréviations ou des fautes. Je corrige et je classe les résultats pour toi.",
        "NexSearch détecte si tu cherches des vidéos, de la musique, des objets, des lieux ou des logiciels, et te propose les meilleurs sites pour ça."
      ],
      tech_general: [
        "En informatique, tout tourne autour de systèmes d’exploitation, de logiciels, de matériel et de réseaux. Les navigateurs comme Edge ou les IA comme Copilot s’appuient sur ces couches.",
        "Le monde numérique repose sur des OS (Windows, Linux, macOS), des navigateurs, des applis, des services en ligne et des protocoles réseau."
      ],
      smalltalk: [
        "On peut discuter de tech, de Windows, de sites web, de jeux, de musique… ou de comment tu construis NexSearch.",
        "Tu peux me poser des questions sur la technologie, les systèmes, les outils, ou juste parler de ce que tu construis."
      ],
      music: [
        "Tu sembles parler de musique. NexSearch peut te proposer YouTube, Spotify, Deezer ou Amazon Music pour écouter ou découvrir des titres.",
        "Pour la musique, tape un artiste, un titre ou un album, et NexSearch te proposera des liens vers les plateformes adaptées."
      ],
      video: [
        "Tu sembles parler de vidéos. NexSearch peut te proposer YouTube, Twitch ou Bing Vidéos pour trouver ce que tu veux.",
        "Pour les vidéos, indique le nom d’une chaîne, d’un clip, d’un film ou d’un streamer, et NexSearch te donnera les bons liens."

      ],
      about_site: [
        "Tu sembles demander des infos sur un site (par ex. Amazon, YouTube, Microsoft). NexAI peut te donner un mini résumé et NexSearch te propose les liens.",
        "Pour un site précis, tu peux taper son nom (ex : Amazon, YouTube, Microsoft) et je t’expliquerai rapidement ce que c’est."
      ],
      fallback: [
        "Je ne suis pas sûr de bien comprendre. Reformule ta question ou sois un peu plus précis.",
        "Là tu me poses une colle. Essaie de détailler ce que tu veux savoir ou ce que tu cherches."
      ]
    };

    function pickRandom(arr) {
      return arr[Math.floor(Math.random() * arr.length)];
    }

    function nexaiClassifyIntent(text) {
      const probs = nexaiInferIntents(text);
      let bestIdx = 0;
      let bestVal = probs[0];
      for (let i = 1; i < probs.length; i++) {
        if (probs[i] > bestVal) {
          bestVal = probs[i];
          bestIdx = i;
        }
      }
      return { intent: NEXAI_INTENTS[bestIdx], confidence: bestVal };
    }

    function nexaiRuleIntentOverride(text, intent) {
      const t = normalizeText(text);

      if (t.includes("bonjour") || t.includes("salut") || t.includes("hey")) return "greeting";
      if (t.includes("windows")) return "os_windows";
      if (t.includes("recette") || t.includes("cake") || t.includes("gateau")) return "recipe";
      if (t.startsWith("c est quoi") || t.startsWith("qu est ce que")) return "definition";
      if (t.includes("comment tu marche") || t.includes("comment tu marches") || t.includes("qui es tu")) return "system_help";
      if (t.includes("nexsearch") || t.includes("recherche")) return "search_help";

      if (t.includes("musique") || t.includes("song") || t.includes("lyrics") || t.includes("album")) return "music";
      if (t.includes("youtube") || t.includes("video") || t.includes("clip")) return "video";
      if (t.includes("acheter") || t.includes("prix") || t.includes("euros") || t.includes("€")) return "shopping";
      if (t.includes("souris") || t.includes("clavier") || t.includes("casque") || t.includes("ecran") || t.includes("tele") || t.includes("smartphone")) return "object_info";
      if (t.includes("adresse") || t.includes("ville") || t.includes("restaurant") || t.includes("hotel")) return "place";
      if (t.includes("excel") || t.includes("word") || t.includes("powerpoint") || t.includes("logiciel")) return "software";

      if (t.includes("amazon") || t.includes("youtube") || t.includes("microsoft") || t.includes("spotify") || t.includes("deezer")) return "about_site";

      if (/[0-9+\-*/()%]/.test(text) && /[0-9]/.test(text)) return "calc";

      return intent;
    }

    function tryCalcExpression(expr) {
      try {
        if (!/^[0-9+\-*/().,%\s]+$/.test(expr)) return null;
        const safe = expr.replace(/%/g, "/100");
        const result = Function('"use strict";return (' + safe + ')')();
        if (typeof result === "number" && isFinite(result)) {
          return result;
        }
        return null;
      } catch {
        return null;
      }
    }

    function nexaiAnswer(text) {
      const { intent, confidence } = nexaiClassifyIntent(text);
      const finalIntent = nexaiRuleIntentOverride(text, intent);

      if (finalIntent === "calc") {
        const calcRes = tryCalcExpression(text);
        if (calcRes !== null) {
          return `Résultat du calcul : ${calcRes}\n\n[Intent=calc, conf=${confidence.toFixed(2)}]`;
        }
      }

      let bucket = NEXAI_KB[finalIntent] || NEXAI_KB.fallback;
      let answer = pickRandom(bucket);

      const meta = `\n\n[Intent=${finalIntent}, conf=${confidence.toFixed(2)}]`;
      return answer + meta;
    }

    async function nexaiChatReply(userText) {
      return nexaiAnswer(userText);
    }

    function nexaiBuildSummaryForQuery(q, correctedQ, typeInfo) {
      const base = [];

      if (!q.trim()) {
        return "Tape une requête en bas, même avec des abréviations ou des fautes : je corrige, j’analyse et je résume ce que tu cherches.";
      }

      if (correctedQ !== q) {
        base.push(`J’ai corrigé ta requête en : « ${correctedQ} ».`);
      } else {
        base.push(`Requête analysée : « ${q} ».`);
      }

      if (typeInfo.isVideo) base.push("Ça ressemble à une recherche de vidéos.");
      if (typeInfo.isMusic) base.push("Ça ressemble à une recherche de musique ou d’artiste.");
      if (typeInfo.isObject) base.push("Ça ressemble à une recherche de produit ou d’objet.");
      if (typeInfo.isPlace) base.push("Ça ressemble à une recherche de lieu ou d’adresse.");
      if (typeInfo.isMicrosoft) base.push("Ça semble lié à Microsoft ou Windows.");

      if (correctedQ.includes("amazon")) {
        base.push("Amazon est une entreprise américaine spécialisée dans le e-commerce et les services cloud (AWS).");
      }
      if (correctedQ.includes("microsoft")) {
        base.push("Microsoft est une entreprise américaine qui développe Windows, Office, Xbox et de nombreux services cloud.");
      }
      if (correctedQ.includes("youtube")) {
        base.push("YouTube est une plateforme de partage de vidéos appartenant à Google.");
      }

      if (base.length === 0) {
        base.push("Je n’ai pas détecté de type particulier, mais j’ai classé les sites les plus pertinents pour ta requête.");
      }

      return base.join(" ");
    }

    function detectQueryType(q) {
      const t = normalizeText(q);

      const isVideo =
        t.includes("clip") || t.includes("trailer") || t.includes("official video") ||
        t.includes("youtube") || t.includes("youtuber") || t.includes("video");

      const isMusic =
        t.includes("song") || t.includes("musique") || t.includes("lyrics") ||
        t.includes("album") || t.includes("single") || t.includes("feat");

      const isObject =
        t.includes("acheter") || t.includes("prix") || t.includes("euros") ||
        t.includes("souris") || t.includes("clavier") || t.includes("casque") ||
        t.includes("pc") || t.includes("ecran") || t.includes("tele") ||
        t.includes("smartphone") || t.includes("chargeur") || t.includes("ordinateur");

      const isPlace =
        t.includes("pres de") || t.includes("near me") || t.includes("adresse") ||
        t.includes("ville") || t.includes("restaurant") || t.includes("hotel");

      const isMicrosoft =
        t.includes("windows") || t.includes("office") || t.includes("excel") ||
        t.includes("word") || t.includes("powerpoint") || t.includes("onenote") ||
        t.includes("microsoft") || t.includes("ms");

      return { isVideo, isMusic, isObject, isPlace, isMicrosoft };
    }

    function scoreSiteForQuery(site, q, typeInfo, correctedQ) {
      const t = normalizeText(correctedQ);
      let score = site.weight || 0.5;

      const nameNorm = normalizeText(site.name);

      if (nameNorm === t) score += 0.7;
      if (nameNorm.includes(t) || t.includes(nameNorm)) score += 0.4;

      if (t.includes("microsoft") || t.includes("windows")) {
        if (site.tags.includes("microsoft")) score += 0.8;
      }
      if (t.includes("amazon")) {
        if (site.name.toLowerCase().includes("amazon")) score += 0.8;
      }
      if (t.includes("youtube") || t.includes("yt")) {
        if (site.name.toLowerCase().includes("youtube")) score += 0.8;
      }

      if (typeInfo.isVideo && site.tags.includes("video")) score += 0.6;
      if (typeInfo.isMusic && site.tags.includes("music")) score += 0.6;
      if (typeInfo.isObject && site.tags.includes("shopping")) score += 0.6;
      if (typeInfo.isPlace && site.tags.includes("maps")) score += 0.6;
      if (typeInfo.isMicrosoft && site.tags.includes("microsoft")) score += 0.6;

      score += (Math.random() - 0.5) * 0.1;

      return score;
    }

    function buildResultsForQuery(q) {
      const { normalized: correctedQ } = advancedNormalizeQuery(q);
      const typeInfo = detectQueryType(correctedQ);

      const scored = SITES_DB.map(site => ({
        site,
        score: scoreSiteForQuery(site, q, typeInfo, correctedQ)
      }));

      scored.sort((a, b) => b.score - a.score);

      return {
        typeInfo,
        correctedQ,
        results: scored.slice(0, 12).map(entry => {
          const url = entry.site.url.replace("{q}", encodeURIComponent(correctedQ));
          return {
            name: entry.site.name,
            url,
            tags: entry.site.tags,
            score: entry.score,
            favicon: entry.site.favicon
          };
        })
      };
    }

    function buildActionButtons(q, typeInfo, correctedQ) {
      const buttons = [];

      buttons.push({ label: "Voir sur Bing", url: "https://www.bing.com/search?q=" + encodeURIComponent(correctedQ) });
      buttons.push({ label: "Copilot Search", url: "https://copilot.microsoft.com/?q=" + encodeURIComponent(correctedQ) });
      buttons.push({ label: "Images", url: "https://www.bing.com/images/search?q=" + encodeURIComponent(correctedQ) });
      buttons.push({ label: "Maps", url: "https://www.bing.com/maps?q=" + encodeURIComponent(correctedQ) });

      if (typeInfo.isVideo || typeInfo.isMusic) {
        buttons.push({ label: "YouTube", url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(correctedQ) });
      }
      if (typeInfo.isMusic) {
        buttons.push({ label: "Spotify", url: "https://open.spotify.com/search/" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Deezer", url: "https://www.deezer.com/search/" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Amazon Music", url: "https://music.amazon.fr/search/" + encodeURIComponent(correctedQ) });
      }
      if (typeInfo.isObject) {
        buttons.push({ label: "Amazon", url: "https://www.amazon.fr/s?k=" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Fnac", url: "https://www.fnac.com/SearchResult/ResultList.aspx?Search=" + encodeURIComponent(correctedQ) });
        buttons.push({ label: "Cdiscount", url: "https://www.cdiscount.com/search/10/" + encodeURIComponent(correctedQ) + ".html" });
        buttons.push({ label: "AliExpress", url: "https://www.aliexpress.com/wholesale?SearchText=" + encodeURIComponent(correctedQ) });
      }

      return buttons;
    }

    // =========================
    // 5) Intégration UI
    // =========================
    function appendNexAIMsg(text, from) {
      const log = document.getElementById("nexai-log");
      const div = document.createElement("div");
      div.className = "nexai-msg " + (from === "user" ? "nexai-msg-user" : "nexai-msg-ai");
      div.textContent = (from === "user" ? "Tu: " : "NexAI: ") + text;
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function runNexSearch(q) {
      if (!q.trim()) return;

      const { typeInfo, correctedQ, results } = buildResultsForQuery(q);
      const actions = buildActionButtons(q, typeInfo, correctedQ);

      const metaDiv = document.getElementById("results-meta");
      metaDiv.textContent = `Requête : "${q}"` + (correctedQ !== q ? ` → corrigée en : "${correctedQ}"` : "");

      const summaryDiv = document.getElementById("results-summary");
      summaryDiv.textContent = nexaiBuildSummaryForQuery(q, correctedQ, typeInfo);

      const listDiv = document.getElementById("results-list");
      listDiv.innerHTML = "";
      results.forEach(r => {
        const item = document.createElement("div");
        item.className = "result-item";

        const fav = document.createElement("div");
        fav.className = "result-favicon";
        if (r.favicon) {
          const img = document.createElement("img");
          img.src = r.favicon;
          img.alt = r.name;
          fav.appendChild(img);
        } else {
          fav.textContent = r.name[0] || "?";
        }

        const content = document.createElement("div");
        content.className = "result-content";

        const title = document.createElement("div");
        title.className = "result-item-title";
        const link = document.createElement("a");
        link.href = r.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = r.name;
        title.appendChild(link);

        const url = document.createElement("div");
        url.className = "result-item-url";
        url.textContent = r.url;

        const tags = document.createElement("div");
        tags.className = "result-item-tags";
        const scoreSpan = document.createElement("span");
        scoreSpan.className = "result-score";
        scoreSpan.textContent = `score=${r.score.toFixed(2)}`;
        tags.textContent = "Tags : " + r.tags.join(", ") + " · ";
        tags.appendChild(scoreSpan);

        content.appendChild(title);
        content.appendChild(url);
        content.appendChild(tags);

        item.appendChild(fav);
        item.appendChild(content);

        listDiv.appendChild(item);
      });

      const actionsDiv = document.getElementById("results-actions");
      actionsDiv.innerHTML = "";
      actions.forEach(b => {
        const btn = document.createElement("button");
        btn.className = "action-btn";
        btn.textContent = b.label;
        btn.onclick = () => window.open(b.url, "_blank");
        actionsDiv.appendChild(btn);
      });

      const nexaiSummary = document.getElementById("nexai-summary");
      nexaiSummary.textContent = nexaiBuildSummaryForQuery(q, correctedQ, typeInfo);
    }

    function initUI() {
      const searchInput = document.getElementById("search-input");
      const searchBtn = document.getElementById("search-btn");
      const nexaiInput = document.getElementById("nexai-input");
      const nexaiSend = document.getElementById("nexai-send");
      const homeTop = document.getElementById("home-link-top");
      const homeBottom = document.getElementById("home-link-bottom");

      const goHome = () => {
        window.location.href = "./index.html";
      };

      homeTop.onclick = goHome;
      homeBottom.onclick = goHome;

      searchBtn.onclick = () => {
        const q = searchInput.value.trim();
        if (!q) return;
        runNexSearch(q);
      };
      searchInput.onkeydown = e => {
        if (e.key === "Enter") searchBtn.click();
      };

      nexaiSend.onclick = async () => {
        const msg = nexaiInput.value.trim();
        if (!msg) return;
        nexaiInput.value = "";
        appendNexAIMsg(msg, "user");
        const reply = await nexaiChatReply(msg);
        appendNexAIMsg(reply, "ai");
      };
      nexaiInput.onkeydown = e => {
        if (e.key === "Enter") nexaiSend.click();
      };

      document.getElementById("nexai-summary").textContent =
        "Tape une requête en bas (abrévs, fautes, tout accepté) : je corrige, j’analyse et je résume ce que tu cherches.";

      // Recherche auto si ?q=... dans l’URL (depuis la page d’accueil)
      const params = new URLSearchParams(window.location.search);
      const qParam = params.get("q");
      if (qParam) {
        searchInput.value = qParam;
        runNexSearch(qParam);
      }
    }

    window.addEventListener("DOMContentLoaded", initUI);
