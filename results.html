<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Recherche IA NexSearch</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;background:#05060a;color:#e5f0ff;font-family:Segoe UI,system-ui}
header{padding:16px 20px;text-align:center;font-size:26px;font-weight:600;color:#e5f0ff}
main{padding:10px 12px 90px;max-width:1100px;margin:0 auto;display:flex;flex-direction:column;gap:14px}
.card{background:rgba(15,18,30,0.85);border-radius:18px;padding:16px 18px;backdrop-filter:blur(18px);box-shadow:0 18px 40px rgba(0,0,0,0.55);transition:transform .2s ease,box-shadow .2s ease,background .2s ease}
.card:hover{transform:translateY(-2px);box-shadow:0 22px 50px rgba(0,0,0,0.7);background:rgba(18,22,36,0.9)}
.card-title{font-size:18px;font-weight:600;margin-bottom:8px;color:#e5f0ff}
.card-sub{font-size:13px;color:#9fb7ff;margin-bottom:6px}
#aiSummary{font-size:15px;line-height:1.6}
#resultsList{display:flex;flex-direction:column;gap:10px;margin-top:6px}
.result-item{display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border-radius:14px;background:rgba(10,12,20,0.9);cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,background .15s ease}
.result-item:hover{transform:translateY(-1px);box-shadow:0 10px 26px rgba(0,0,0,0.6);background:rgba(14,16,26,0.95)}
.result-logo{width:28px;height:28px;border-radius:50%;background:#111;flex-shrink:0}
.result-main{flex:1}
.result-title{font-size:15px;font-weight:600;color:#3aa7ff}
.result-url{font-size:12px;color:#7fa4ff;margin-top:2px;word-break:break-all}
.result-desc{font-size:13px;color:#c7d6ff;margin-top:4px}
#tabs{display:flex;justify-content:center;gap:18px;margin-top:8px}
#tabs a{font-size:14px;color:#9fb7ff;text-decoration:none;transition:color .15s ease,transform .15s ease}
#tabs a:hover{color:#cfe3ff;transform:translateY(-1px)}
#chatBox{display:flex;flex-direction:column;gap:10px}
#chatMessages{max-height:260px;overflow-y:auto;padding-right:4px;scrollbar-width:thin}
.chat-msg{margin-bottom:8px;display:flex}
.chat-user,.chat-ai{display:inline-block;padding:8px 10px;border-radius:14px;font-size:14px;max-width:100%;transition:transform .15s ease,background .15s ease}
.chat-user{background:rgba(40,60,120,0.9);color:#e5f0ff;margin-left:auto}
.chat-ai{background:rgba(15,18,30,0.95);color:#e5f0ff;border:1px solid rgba(90,130,255,0.4);margin-right:auto}
.chat-user:hover,.chat-ai:hover{transform:translateY(-1px)}
#chatInputRow{display:flex;gap:8px;margin-top:4px}
#chatInput{flex:1;border-radius:999px;border:1px solid rgba(90,130,255,0.6);background:#05060a;color:#e5f0ff;padding:8px 12px;font-size:14px;transition:border-color .15s ease,box-shadow .15s ease}
#chatInput:focus{outline:none;border-color:#7fd0ff;box-shadow:0 0 0 1px rgba(127,208,255,0.6)}
#chatSend{border-radius:999px;border:none;background:linear-gradient(135deg,#4b7dff,#7fd0ff);color:#05060a;padding:8px 14px;font-size:14px;font-weight:600;cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,opacity .15s ease}
#chatSend:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(75,125,255,0.6)}
#chatSend:disabled{opacity:.5;cursor:default;box-shadow:none;transform:none}
#bottomBar{position:fixed;bottom:0;left:0;width:100%;background:rgba(5,6,10,0.95);backdrop-filter:blur(16px);padding:8px 12px;display:flex;align-items:center;gap:10px;border-top:1px solid rgba(70,110,255,0.4)}
#logo{font-size:16px;font-weight:600;color:#e5f0ff;text-decoration:none;white-space:nowrap;transition:color .15s ease,transform .15s ease}
#logo:hover{color:#cfe3ff;transform:translateY(-1px)}
#addressBar{flex:1;border-radius:999px;border:1px solid rgba(90,130,255,0.7);background:#05060a;color:#e5f0ff;padding:8px 12px;font-size:14px;transition:border-color .15s ease,box-shadow .15s ease}
#addressBar:focus{outline:none;border-color:#7fd0ff;box-shadow:0 0 0 1px rgba(127,208,255,0.6)}
@media(max-width:700px){
main{padding:8px 10px 90px}
card{padding:14px 14px}
result-item{padding:8px 10px}
header{font-size:22px}
}
</style>
</head>
<body>

<header>NexSearch</header>

<main>
  <section class="card">
    <div class="card-title">NexAI – Résumé intelligent</div>
    <div class="card-sub">Analyse de ta recherche et contexte général</div>
    <div id="aiSummary"></div>
  </section>

  <section class="card">
    <div class="card-title">Sites liés à ta recherche</div>
    <div class="card-sub">Triés par pertinence (site principal en premier)</div>
    <div id="resultsList"></div>
    <div id="tabs">
      <a id="imgTab" target="_blank">Images</a>
      <a id="mapTab" target="_blank">Maps</a>
      <a id="bingTab" target="_blank">Voir sur Bing</a>
    </div>
  </section>

  <section class="card">
    <div class="card-title">Chat avec NexAI</div>
    <div class="card-sub">Assistant hybride : recherche + conversation</div>
    <div id="chatBox">
      <div id="chatMessages"></div>
      <div id="chatInputRow">
        <input id="chatInput" placeholder="Parle à NexAI… (ex : ça va ?)">
        <button id="chatSend">Envoyer</button>
      </div>
    </div>
  </section>
</main>

<div id="bottomBar">
  <a id="logo" href="index.html">NexSearch</a>
  <input id="addressBar" placeholder="Rechercher…">
</div>

<script>
const GEMINI_KEY="AIzaSyAAa2qc6Gjr3BMiMSAOP5aTKAD7VvRIP4I"; // oui, entre guillemets

const params=new URLSearchParams(location.search),query=(params.get("q")||"").trim();
addressBar.value=query;
addressBar.addEventListener("keydown",e=>{if(e.key==="Enter"){location.href="results.html?q="+encodeURIComponent(addressBar.value)}});

imgTab.href="https://www.bing.com/images/search?q="+encodeURIComponent(query);
mapTab.href="https://www.bing.com/maps?q="+encodeURIComponent(query);
bingTab.href="https://www.bing.com/search?q="+encodeURIComponent(query);

function blocked(q){
return["porn","porno","viol","gore","snuff","décapitation"].some(w=>q.toLowerCase().includes(w));
}

function detectCategory(q){
q=q.toLowerCase();
const cats={
microsoft:["microsoft","windows","office","word","excel","powerpoint","outlook","onedrive","teams","onenote"],
education:["scratch","ent","pronote","ecoledirecte","moodle","cours","devoir","parcoursup","geogebra","khan","pix","lumni","openclassrooms"],
social:["youtube","tiktok","instagram","facebook","snapchat","twitter","x ","discord","reddit","twitch","pinterest"],
shopping:["amazon","fnac","cdiscount","darty","rueducommerce","acheter","prix","promo","deal"],
gaming:["xbox","playstation","ps5","nintendo","switch","roblox","minecraft","jeu","gaming","steam","epic"],
ai:["copilot","chatgpt","claude","gemini","ia","intelligence artificielle","openai","anthropic","perplexity"],
providers:["orange","free","bouygues","sfr","red","sosh"],
video:["netflix","prime video","disney","crunchyroll","film","série","serie","streaming"]
};
for(const k in cats)if(cats[k].some(w=>q.includes(w)))return k;
return"general";
}

function buildSites(query){
const q=query.toLowerCase(),cat=detectCategory(q);
let sites=[];
if(cat==="microsoft"){
sites=[
{name:"Microsoft (site principal)",url:"https://www.microsoft.com"},
{name:"Microsoft 365 / Office",url:"https://www.office.com"},
{name:"Outlook (messagerie)",url:"https://outlook.com"},
{name:"OneDrive (stockage)",url:"https://onedrive.live.com"},
{name:"Teams (collaboration)",url:"https://teams.microsoft.com"},
{name:"Word",url:"https://www.microsoft.com/fr-fr/microsoft-365/word"},
{name:"Excel",url:"https://www.microsoft.com/fr-fr/microsoft-365/excel"},
{name:"PowerPoint",url:"https://www.microsoft.com/fr-fr/microsoft-365/powerpoint"},
{name:"Learn Microsoft",url:"https://learn.microsoft.com/fr-fr"},
{name:"Support Microsoft",url:"https://support.microsoft.com/fr-fr"}
];
}
else if(cat==="education"){
sites=[
{name:"Scratch (programmation visuelle)",url:"https://scratch.mit.edu"},
{name:"Pronote / ENT",url:"https://www.index-education.com/fr/pronote.php"},
{name:"ÉcoleDirecte",url:"https://www.ecoledirecte.com"},
{name:"Moodle",url:"https://moodle.org"},
{name:"Khan Academy",url:"https://www.khanacademy.org"},
{name:"Pix",url:"https://pix.fr"},
{name:"Lumni",url:"https://www.lumni.fr"},
{name:"OpenClassrooms",url:"https://openclassrooms.com/fr"},
{name:"GeoGebra",url:"https://www.geogebra.org"},
{name:"WolframAlpha",url:"https://www.wolframalpha.com"}
];
}
else if(cat==="social"){
sites=[
{name:"YouTube",url:"https://www.youtube.com"},
{name:"TikTok",url:"https://www.tiktok.com"},
{name:"Instagram",url:"https://www.instagram.com"},
{name:"Facebook",url:"https://www.facebook.com"},
{name:"X (Twitter)",url:"https://twitter.com"},
{name:"Snapchat",url:"https://www.snapchat.com"},
{name:"Discord",url:"https://discord.com"},
{name:"Reddit",url:"https://www.reddit.com"},
{name:"Twitch",url:"https://www.twitch.tv"},
{name:"Pinterest",url:"https://www.pinterest.fr"}
];
}
else if(cat==="shopping"){
sites=[
{name:"Amazon",url:"https://www.amazon.fr"},
{name:"Fnac",url:"https://www.fnac.com"},
{name:"Cdiscount",url:"https://www.cdiscount.com"},
{name:"Darty",url:"https://www.darty.com"},
{name:"RueDuCommerce",url:"https://www.rueducommerce.fr"}
];
}
else if(cat==="gaming"){
sites=[
{name:"Xbox",url:"https://www.xbox.com"},
{name:"PlayStation",url:"https://www.playstation.com"},
{name:"Nintendo",url:"https://www.nintendo.com"},
{name:"Steam",url:"https://store.steampowered.com"},
{name:"Epic Games Store",url:"https://www.epicgames.com/store"},
{name:"Roblox",url:"https://www.roblox.com"},
{name:"Minecraft",url:"https://www.minecraft.net"},
{name:"Micromania",url:"https://www.micromania.fr"}
];
}
else if(cat==="ai"){
sites=[
{name:"Microsoft Copilot",url:"https://copilot.microsoft.com"},
{name:"ChatGPT",url:"https://chat.openai.com"},
{name:"Claude",url:"https://claude.ai"},
{name:"Gemini",url:"https://gemini.google.com"},
{name:"Perplexity",url:"https://www.perplexity.ai"},
{name:"Hugging Face",url:"https://huggingface.co"}
];
}
else if(cat==="providers"){
sites=[
{name:"Orange",url:"https://www.orange.fr"},
{name:"Free",url:"https://www.free.fr"},
{name:"Bouygues Telecom",url:"https://www.bouyguestelecom.fr"},
{name:"SFR",url:"https://www.sfr.fr"},
{name:"RED by SFR",url:"https://www.red-by-sfr.fr"},
{name:"Sosh",url:"https://www.sosh.fr"}
];
}
else if(cat==="video"){
sites=[
{name:"YouTube",url:"https://www.youtube.com"},
{name:"Netflix",url:"https://www.netflix.com"},
{name:"Prime Video",url:"https://www.primevideo.com"},
{name:"Disney+",url:"https://www.disneyplus.com"},
{name:"Crunchyroll",url:"https://www.crunchyroll.com"}
];
}
else{
sites=[
{name:"Bing (recherche générale)",url:"https://www.bing.com/search?q="+encodeURIComponent(query)},
{name:"Wikipedia",url:"https://fr.wikipedia.org/wiki/"+encodeURIComponent(query)},
{name:"Qwant",url:"https://www.qwant.com/?q="+encodeURIComponent(query)},
{name:"DuckDuckGo",url:"https://duckduckgo.com/?q="+encodeURIComponent(query)}
];
}
return sites;
}

function faviconUrl(url){
try{
const u=new URL(url);
return "https://www.google.com/s2/favicons?sz=64&domain="+u.hostname;
}catch{return "";}
}

function renderResults(){
const list=buildSites(query),container=document.getElementById("resultsList");
container.innerHTML="";
list.forEach(site=>{
const div=document.createElement("div");
div.className="result-item";
div.onclick=()=>{window.open(site.url,"_blank")};
div.innerHTML=
`<img class="result-logo" src="${faviconUrl(site.url)}" alt="">
<div class="result-main">
  <div class="result-title">${site.name}</div>
  <div class="result-url">${site.url}</div>
  <div class="result-desc" data-name="${site.name}"></div>
</div>`;
container.appendChild(div);
});
}

async function callGeminiSummary(){
const target=document.getElementById("aiSummary");
if(!query){target.innerHTML="<p>Entre une recherche pour que NexAI puisse te répondre.</p>";return;}
if(blocked(query)){target.innerHTML="<p>Contenu non autorisé pour NexAI.</p>";return;}
target.innerHTML="<p>Analyse NexAI en cours…</p>";
try{
const prompt=`Tu es NexAI, IA premium NexSearch/Copilot+. Tu dois :
1) saluer l’utilisateur (style moderne, amical).
2) expliquer brièvement ce qu’est "${query}" (ex : pour "Microsoft" : "Microsoft est une multinationale fondée en 1975 par Bill Gates et Paul Allen...").
3) annoncer que tu as trouvé des sites liés à cette recherche.
Si la requête ressemble à un calcul (ex : "1+1", "3*5"), donne aussi le résultat du calcul.
Réponds en HTML enrichi (<p>, <b>, <ul>, <li>) en français. Ton style doit être clair, moderne, légèrement technique. Ne produis pas de contenu violent ou pornographique.`;
const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+GEMINI_KEY,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
});
const data=await res.json();
let text=data?.candidates?.[0]?.content?.parts?.[0]?.text||null;
if(!text)text="<p>Salut ! Voici un résumé intelligent de ta recherche, ainsi que des sites liés.</p>";
target.innerHTML=text;
}catch(e){
target.innerHTML="<p>Salut ! NexAI a eu un souci temporaire, mais voici quand même des sites liés à ta recherche.</p>";
}
}

async function callGeminiDescriptions(){
const sites=buildSites(query);
const descNodes=document.querySelectorAll(".result-desc");
if(!sites.length||descNodes.length===0)return;
try{
const prompt=`Tu es NexAI, IA premium NexSearch. On te donne une liste de sites liés à la recherche "${query}".
Pour chaque site, renvoie une courte description en français (1 phrase), dans un JSON de la forme :
[
 {"name":"Nom du site","desc":"Description courte"},
 ...
]
Sites :
${sites.map(s=>s.name+" - "+s.url).join("\n")}
Ne mets que du JSON, sans texte autour.`;
const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+GEMINI_KEY,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
});
const data=await res.json();
let raw=data?.candidates?.[0]?.content?.parts?.[0]?.text||"[]";
let json;
try{json=JSON.parse(raw);}catch{json=[];}
descNodes.forEach(node=>{
const name=node.getAttribute("data-name");
const match=json.find(x=>x.name===name);
node.textContent=match?match.desc:"Site lié à ta recherche.";
});
}catch(e){
descNodes.forEach(node=>node.textContent="Site lié à ta recherche.");
}
}

const chatMessages=document.getElementById("chatMessages"),chatInput=document.getElementById("chatInput"),chatSend=document.getElementById("chatSend");

function addChatMessage(text,from){
const div=document.createElement("div");
div.className="chat-msg";
const span=document.createElement("div");
span.className=from==="user"?"chat-user":"chat-ai";
span.innerHTML=text;
div.appendChild(span);
chatMessages.appendChild(div);
chatMessages.scrollTop=chatMessages.scrollHeight;
}

async function sendChat(){
const msg=chatInput.value.trim();
if(!msg)return;
if(blocked(msg)){addChatMessage("<p>Contenu non autorisé.</p>","ai");chatInput.value="";return;}
addChatMessage(msg,"user");
chatInput.value="";
chatSend.disabled=true;
try{
const prompt=`Tu es NexAI, IA premium NexSearch/Copilot+. Tu es en mode chat conversationnel.
Contexte de la recherche actuelle : "${query}".
Message de l’utilisateur : "${msg}".
Réponds en français, en HTML simple (<p>, <b>, <ul>, <li>), avec un ton amical, moderne, parfois un peu complice. Tu peux répondre à des questions générales (ex : "ça va ?" -> "Oui et toi ?") ou donner des explications sur la recherche en cours. Ne produis pas de contenu violent ou pornographique.`;
const res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key="+GEMINI_KEY,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({contents:[{parts:[{text:prompt}]}]})
});
const data=await res.json();
let text=data?.candidates?.[0]?.content?.parts?.[0]?.text||"<p>Je suis NexAI, et je suis là pour discuter avec toi 🙂</p>";
addChatMessage(text,"ai");
}catch(e){
addChatMessage("<p>Oups, NexAI a eu un petit souci technique, mais je suis toujours là 😉</p>","ai");
}
chatSend.disabled=false;
}

chatSend.addEventListener("click",sendChat);
chatInput.addEventListener("keydown",e=>{if(e.key==="Enter")sendChat();});

renderResults();
callGeminiSummary();
callGeminiDescriptions();
</script>
</body>
</html>
