<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NexSearch – Résultats</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #000;
      color: #3B82F6;
      font-family: "Poppins", sans-serif;
      overflow-x: hidden;
    }

    /* Top search bar */
    .topbar {
      width: 100%;
      padding: 20px;
      background: #020617;
      border-bottom: 1px solid #1E3A8A;
      display: flex;
      justify-content: center;
      position: relative;
    }

    .search-box {
      width: 600px;
      max-width: 90%;
      display: flex;
      gap: 10px;
    }

    .search-box input {
      flex: 1;
      padding: 0.8rem 1rem;
      border-radius: 999px;
      border: 1px solid #1F2937;
      background: #000;
      color: #3B82F6;
      font-size: 1rem;
      outline: none;
    }

    .search-box input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 2px #2563EB;
    }

    /* NexAI toggle button */
    .nexai-toggle {
      position: absolute;
      right: 20px;
      top: 50%;
      transform: translateY(-50%);
      background: #111827;
      border: 1px solid #1E3A8A;
      color: #3B82F6;
      padding: 0.4rem 0.8rem;
      border-radius: 999px;
      font-size: 0.9rem;
      cursor: pointer;
    }

    .nexai-toggle:hover {
      border-color: #2563EB;
    }

    /* Main results container */
    .container {
      width: 90%;
      max-width: 900px;
      margin: auto;
      margin-top: 25px;
      padding-bottom: 40px;
    }

    .section-title {
      font-size: 1.4rem;
      margin-top: 30px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #3B82F6;
    }

    .result {
      background: #020617;
      border: 1px solid #1E3A8A;
      padding: 18px;
      border-radius: 10px;
      margin-bottom: 18px;
      transition: 0.2s;
    }

    .result:hover {
      border-color: #2563EB;
      transform: translateX(4px);
    }

    .title {
      font-size: 1.2rem;
      font-weight: 600;
      color: #60A5FA;
      margin-bottom: 6px;
    }

    .url {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-bottom: 8px;
      word-break: break-all;
    }

    .snippet {
      font-size: 1rem;
      color: #93C5FD;
      white-space: pre-line;
    }

    /* NexAI sidebar */
    .nexai-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 340px;
      max-width: 100%;
      height: 100vh;
      background: #020617;
      border-left: 1px solid #1E3A8A;
      transform: translateX(100%);
      transition: transform 0.25s ease-out;
      display: flex;
      flex-direction: column;
      z-index: 999;
    }

    .nexai-panel.open {
      transform: translateX(0);
    }

    .nexai-header {
      padding: 16px;
      border-bottom: 1px solid #1E3A8A;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #3B82F6;
      font-weight: 600;
    }

    .nexai-close {
      cursor: pointer;
      font-size: 1.2rem;
      color: #60A5FA;
    }

    .nexai-messages {
      flex: 1;
      padding: 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .msg {
      max-width: 90%;
      padding: 8px 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .msg-user {
      align-self: flex-end;
      background: #111827;
      color: #93C5FD;
    }

    .msg-ai {
      align-self: flex-start;
      background: #020617;
      border: 1px solid #1E3A8A;
      color: #BFDBFE;
    }

    .nexai-input-area {
      padding: 10px;
      border-top: 1px solid #1E3A8A;
      display: flex;
      gap: 8px;
    }

    .nexai-input-area input {
      flex: 1;
      padding: 0.6rem 0.8rem;
      border-radius: 999px;
      border: 1px solid #1F2937;
      background: #000;
      color: #3B82F6;
      font-size: 0.9rem;
      outline: none;
    }

    .nexai-input-area input:focus {
      border-color: #2563EB;
      box-shadow: 0 0 0 1px #2563EB;
    }

    .nexai-send {
      padding: 0.5rem 0.9rem;
      border-radius: 999px;
      border: 1px solid #1E3A8A;
      background: #111827;
      color: #3B82F6;
      font-size: 0.85rem;
      cursor: pointer;
    }

    .nexai-send:hover {
      border-color: #2563EB;
    }

    .nexai-status {
      font-size: 0.75rem;
      opacity: 0.7;
      padding: 0 12px 6px;
      color: #60A5FA;
    }

    @media (max-width: 768px) {
      .nexai-panel {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <!-- BARRE DE RECHERCHE -->
  <div class="topbar">
    <form class="search-box" action="results.html" method="GET">
      <input type="text" name="q" id="searchInput" placeholder="Rechercher..." autocomplete="off" />
    </form>
    <button class="nexai-toggle" id="nexaiToggle">💬 NexAI</button>
  </div>

  <!-- CONTENU PRINCIPAL -->
  <div class="container">
    <div id="results"></div>
  </div>

  <!-- PANEL NEXAI -->
  <div class="nexai-panel" id="nexaiPanel">
    <div class="nexai-header">
      <span>NexAI</span>
      <span class="nexai-close" id="nexaiClose">×</span>
    </div>
    <div class="nexai-status" id="nexaiStatus">
      Modèle IA connecté via Eden AI (LLM).
    </div>
    <div class="nexai-messages" id="nexaiMessages"></div>
    <div class="nexai-input-area">
      <input type="text" id="nexaiInput" placeholder="Écris un message..." autocomplete="off" />
      <button class="nexai-send" id="nexaiSend">Envoyer</button>
    </div>
  </div>

  <script>
    /* -----------------------------
       1. Récupération de la requête
    ------------------------------ */
    const params = new URLSearchParams(window.location.search);
    const query = (params.get("q") || "").trim();
    document.getElementById("searchInput").value = query;

    const resultsContainer = document.getElementById("results");

    /* -----------------------------
       2. Redirections directes
    ------------------------------ */
    const siteShortcuts = {
      "amazon": "https://www.amazon.fr",
      "youtube": "https://www.youtube.com",
      "yt": "https://www.youtube.com",
      "wikipedia": "https://fr.wikipedia.org",
      "wiki": "https://fr.wikipedia.org",
      "bing": "https://www.bing.com",
      "google": "https://www.google.com",
      "reddit": "https://www.reddit.com",
      "twitter": "https://x.com",
      "x": "https://x.com",
      "instagram": "https://instagram.com",
      "github": "https://github.com",
      "marmiton": "https://www.marmiton.org"
    };

    if (siteShortcuts[query.toLowerCase()]) {
      window.location.href = siteShortcuts[query.toLowerCase()];
    }

    /* -----------------------------
       3. Module calculatrice
    ------------------------------ */
    function isMathExpression(str) {
      return /^[0-9+\-*/().\s]+$/.test(str) && /[0-9]/.test(str);
    }

    function calculateExpression(str) {
      try {
        return Function("return " + str)();
      } catch {
        return null;
      }
    }

    /* -----------------------------
       4. Résultats intelligents simples
       (liens externes, pas d'IA ici)
    ------------------------------ */
    const smartResults = [
      {
        name: "Bing",
        url: "https://www.bing.com/search?q=" + encodeURIComponent(query),
        snippet: "Résultats complets provenant du moteur Bing."
      },
      {
        name: "YouTube",
        url: "https://www.youtube.com/results?search_query=" + encodeURIComponent(query),
        snippet: "Vidéos et contenus liés à « " + query + " »."
      },
      {
        name: "Wikipédia",
        url: "https://fr.wikipedia.org/wiki/" + encodeURIComponent(query),
        snippet: "Article encyclopédique détaillé (si disponible)."
      }
    ];

    function renderMain() {
      if (!query) {
        resultsContainer.innerHTML = `
          <div class="section-title">Aucune requête</div>
          <div class="result">
            <div class="snippet">Tape quelque chose dans la barre de recherche pour lancer NexSearch.</div>
          </div>
        `;
        return;
      }

      resultsContainer.innerHTML = "";

      // Calcul
      if (isMathExpression(query)) {
        const calc = calculateExpression(query);
        if (calc !== null && calc !== undefined && !Number.isNaN(calc)) {
          resultsContainer.innerHTML += `
            <div class="section-title">Calcul</div>
            <div class="result">
              <div class="title">${query} = ${calc}</div>
              <div class="snippet">Résultat calculé directement par NexSearch.</div>
            </div>
          `;
        }
      }

      // Résultats intelligents
      resultsContainer.innerHTML += `<div class="section-title">Résultats intelligents</div>`;
      smartResults.forEach(r => {
        resultsContainer.innerHTML += `
          <div class="result">
            <div class="title">${r.name}</div>
            <div class="url">${r.url}</div>
            <div class="snippet">${r.snippet}</div>
          </div>
        `;
      });
    }

    renderMain();

    /* -----------------------------
       5. NexAI – vrai chat IA via Eden AI
    ------------------------------ */

    const nexaiPanel = document.getElementById("nexaiPanel");
    const nexaiToggle = document.getElementById("nexaiToggle");
    const nexaiClose = document.getElementById("nexaiClose");
    const nexaiMessages = document.getElementById("nexaiMessages");
    const nexaiInput = document.getElementById("nexaiInput");
    const nexaiSend = document.getElementById("nexaiSend");
    const nexaiStatus = document.getElementById("nexaiStatus");

    let chatHistory = [];

    nexaiToggle.addEventListener("click", () => {
      nexaiPanel.classList.add("open");
      nexaiInput.focus();
      if (chatHistory.length === 0) {
        addAIMessage("Bonjour ! Je suis NexAI. Pose-moi une question ou dis-moi ce que tu veux faire.");
      }
    });

    nexaiClose.addEventListener("click", () => {
      nexaiPanel.classList.remove("open");
    });

    nexaiSend.addEventListener("click", sendUserMessage);
    nexaiInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        sendUserMessage();
      }
    });

    function addUserMessage(text) {
      const div = document.createElement("div");
      div.className = "msg msg-user";
      div.textContent = text;
      nexaiMessages.appendChild(div);
      nexaiMessages.scrollTop = nexaiMessages.scrollHeight;
    }

    function addAIMessage(text) {
      const div = document.createElement("div");
      div.className = "msg msg-ai";
      div.textContent = text;
      nexaiMessages.appendChild(div);
      nexaiMessages.scrollTop = nexaiMessages.scrollHeight;
    }

    async function sendUserMessage() {
      const text = nexaiInput.value.trim();
      if (!text) return;
      nexaiInput.value = "";
      addUserMessage(text);

      chatHistory.push({ role: "user", content: text });

      nexaiStatus.textContent = "NexAI réfléchit...";
      const reply = await callEdenAI(chatHistory);
      nexaiStatus.textContent = "Modèle IA connecté via Eden AI (LLM).";

      if (reply) {
        addAIMessage(reply);
        chatHistory.push({ role: "assistant", content: reply });
      } else {
        addAIMessage("Je n’ai pas pu générer de réponse pour le moment.");
      }
    }

    async function callEdenAI(history) {
      const API_KEY = "YOUR_EDENAI_API_KEY"; // 🔁 Remplace par ta clé réelle
      const url = "https://api.edenai.run/v2/text/chat";

      // On convertit l'historique en format messages
      const messages = history.map(m => ({
        role: m.role,
        content: m.content
      }));

      // On ajoute un message système pour cadrer le comportement
      messages.unshift({
        role: "system",
        content:
          "Tu es NexAI, une IA générale intégrée dans un moteur de recherche public. " +
          "Tu réponds en français, de manière claire, concise et utile. " +
          "Tu ne mentionnes jamais le nom de l'utilisateur. " +
          "Tu peux proposer des recettes, des idées, des explications, des conseils. " +
          "Si la question concerne la nourriture, tu peux proposer une recette simple et éventuellement suggérer un site comme Marmiton ou autre, sans inventer d’URL précises."
      });

      const body = {
        providers: ["openai"],   // ou autre provider supporté par Eden AI
        text: messages,          // format chat
        temperature: 0.4,
        max_tokens: 256
      };

      try {
        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${API_KEY}`
          },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        // Structure typique : data.openai.generated_text
        if (data && data.openai && data.openai.generated_text) {
          return data.openai.generated_text.trim();
        }
        return null;
      } catch (e) {
        console.error(e);
        return null;
      }
    }
  </script>
</body>
</html>
